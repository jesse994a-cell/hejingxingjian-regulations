<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>603 公車時刻表 — 和境心見社區</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:linear-gradient(135deg,#0f2540 0%,#1a3a5c 60%,#2d6a9f 100%);
  min-height:100vh;display:flex;flex-direction:column;color:#fff}

header{padding:1.2rem 2rem;display:flex;align-items:center;gap:1rem;
  background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.1)}
.back-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:.4rem .9rem;border-radius:6px;font-size:.82rem;
  cursor:pointer;text-decoration:none;transition:background .2s;
}
.back-btn:hover{background:rgba(255,255,255,.22)}
header h1{font-size:1.1rem;font-weight:600}
header p{font-size:.75rem;opacity:.6;margin-top:.15rem}

/* ── Main card ── */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:2.5rem 2rem;max-width:480px;width:100%;
  text-align:center;
}
.bus-number{
  font-size:5rem;font-weight:900;line-height:1;
  color:#e8c547;text-shadow:0 0 40px rgba(232,197,71,.4);
  margin-bottom:.3rem;
}
.bus-label{font-size:.8rem;letter-spacing:.2em;opacity:.6;text-transform:uppercase;margin-bottom:2rem}
.route-info{
  background:rgba(255,255,255,.06);border-radius:12px;
  padding:1rem 1.2rem;margin-bottom:2rem;text-align:left;
}
.route-row{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;font-size:.88rem}
.route-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.08)}
.route-row span:first-child{opacity:.55;font-size:.78rem;width:60px;flex-shrink:0}
.route-row strong{color:#e8c547}

.open-btn{
  display:block;width:100%;
  background:linear-gradient(135deg,#e8c547,#f0a500);
  color:#1a3a5c;font-size:1.05rem;font-weight:800;
  padding:1rem 1.5rem;border-radius:12px;
  text-decoration:none;letter-spacing:.05em;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 8px 24px rgba(232,197,71,.35);
}
.open-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(232,197,71,.45)}
.open-btn:active{transform:translateY(0)}

.note{font-size:.72rem;opacity:.4;margin-top:1rem;line-height:1.6}

footer{text-align:center;padding:.9rem;font-size:.72rem;opacity:.35;
  border-top:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>

<header>
  <a class="back-btn" href="javascript:history.back()">← 返回</a>
  <div>
    <h1>公車時刻表</h1>
    <p>和境心見社區對外交通查詢</p>
  </div>
</header>

<main>
  <div class="card">
    <div class="bus-number">603</div>
    <div class="bus-label">桃園市公共汽車</div>

    <div class="route-info">
      <div class="route-row">
        <span>路線</span>
        <div>文化路(桃) ↔ 龜山(文桃路)</div>
      </div>
      <div class="route-row">
        <span>站點</span>
        <div>沿途停靠桃園火車站、文化路各站</div>
      </div>
      <div class="route-row">
        <span>資料</span>
        <div><strong>雲端公車 yunbus.tw</strong></div>
      </div>
    </div>

    <a class="open-btn"
       href="https://yunbus.tw/lite/route.php?id=TAO6030"
       target="_blank">
      🚌 開啟即時時刻表 →
    </a>

    <div class="note">
      點擊後將於新視窗開啟雲端公車網站<br>
      可查詢即時到站時間、各站停靠資訊
    </div>
  </div>
</main>

<footer>和境心見社區管委會 · 時刻表資料由雲端公車（yunbus.tw）提供</footer>

</body>
</html>
