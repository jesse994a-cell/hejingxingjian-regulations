**文件性質：** 社區住戶管理規約（正式版）
**訂立日期：** 中華民國 114 年 08 月 03 日
**效力：** 經全體區分所有權人同意，對本社區全體區分所有權人、無權佔有人及住戶均有拘束力

> 本規約依據《公寓大廈管理條例》規定訂定，為本社區各項管理辦法（A01–K01）之母規約，位階高於管委會通過之各項管理辦法。

---

## 前言

本「和境心見」（以下簡稱本社區）全體區分所有權人、無權佔有人及住戶，為增進本社區公共安全、確保良好生活環境，就本社區使用與管理，特依據《公寓大廈管理條例》（以下簡稱本條例）規定訂定社區住戶管理規約（以下簡稱本規約），經全體區分所有人同意，俾本社區全體區分所有權人、無權佔有人及住戶遵循。

---

## 第一條（本規約法源及效力所及範圍）

一、本規約效力及於本社區全體區分所有權人、無權佔有人及住戶，且區分所有權人之繼受人應繼受原區分所有權人依本條例或本規約所定之一切權利義務。

二、本規約所指「住戶」係指本社區區分所有權人、承租戶或經區分所有權人同意而為專有部分之使用人。

三、本社區之範圍為（110）桃市都建執照字第會龜 01727-02 號建照執照中所載之基地、建築物及附屬設施。

---

## 第二條（專有部分、共用部分、約定專用部分、約定共用部分）

一、本公寓大廈專有部分、共用部分、約定專有部分、約定共用部分之範圍界定如下：

（一）**專有部分**：係指編訂獨立門牌號碼或所在地址證明之家戶，並登記為區分所有權人所有者。

（二）**共用部分**：係指不屬專有部分與專有附屬建物，而供共同使用者。

（三）**約定專用部分**：本公寓大廈共有部分約定供特定區分所有權人使用者。

（四）**約定共用部分**：公寓大廈專有部分經約定供共同使用者。

二、**社區地下室：**

（一）**共有部分**：本社區地下室共四層，除供作停車空間（B1F～B3F）、防空避難室兼停車空間（B4F）、戶外安全梯、一般安全梯、無障礙安全梯、樓梯間、電梯間、門廳、梯廳、排煙室、**垃圾處理室**、受電箱位置、地下室進排風管道、發電機室、電信室、機房、電錶箱、消防泵浦室、污水及雨水回收機房、電梯機房、蓄水池、水箱、消防水箱、台電配電場所、管委會使用空間一至三、汽機車停車位及部分車道、屋頂突出物、緊急升降機、無障礙電梯及其他依法令應列入共有部分之設施外，由本社區全體住戶共同依設備物之性質為使用管理，並由管理負責人或管理委員會依區分所有權人會議決議、規約約定或職權進行清潔、維護、修繕、一般改良及管理。

（二）**約定專用部分**：本社區地下室除前項之共有部分外，由和境建設股份有限公司統一規劃為汽機車停車場，約定專用。其使用約定如下：

　1. **汽車停車位**：本社區地下第一至四層汽車停車位共 197 位（法定車位 119 位；自設車位 75 位；行動不便車位 3 位）。汽車停車位所有人同意每月依規定按時繳納清潔、管理、電費、保養費及必要維修費用等，緊急時應供防空及避難之用。

　2. 管理負責人或管理委員會應依區分所有權人會議決議、規約約定或職權進行清潔、維護、修繕、一般改良及管理（可酌定每月維護清潔費用及違規停車罰款之標準）。

　3. **機車位**：本社區地下第一層共有 212 位機車停車位，統一點交於管委會管理使用，並授權管理委員會評估將自行車格調整為機車格使用，以滿足社區一戶一機車格。

三、本大樓之法定空地、開放空間、露台、管委會使用空間、公共空間及外觀等，均由社區全體住戶共同依設備物之性質為使用及維護管理。

四、本社區一樓店舖 S1 戶後陽台連接法定空地之圍牆範圍，及二樓住家 A1、A7、B1、B2、B5、B6、C1、C7 戶連接之露台，均規劃標示為「約定專用」區域（附圖二），依本戶規劃之各戶專用，不得增建違章、採光罩、遮雨棚、鐵窗、廣告物、無線電發射基地台或為其他有損害於社區住戶之行為。

五、本社區一樓之管委會使用空間一至三，不論產權歸屬（主建物部份），均應供本社區全體住戶依設備之性質管理使用。

六、屋頂突出物如電梯機房、樓梯間、水箱等為共有部分，不得約定為專用或由任一住戶私自占用，且不得搭蓋違建、採光罩、遮雨棚、鐵窗、廣告物或無線電發射基地台。

七、汽車、機車、自行車停車位由和境建設股份有限公司統一依核准圖說之汽機車位置編轄圖畫線設置。

八、本公寓大廈周圍上下、外牆面為共用部分，由全體住戶共同維護及使用，日後如要懸掛或設置廣告物，除另有約定外，應依管理規約或區分所有權人會議之決議。

九、本社區開放空間應依區分所有權人會議之決議或管理委員會成立後訂定之管理辦法使用，但其決議或辦法不得違背法令。

十、依本條各項之約定，住戶如有任何違規使用情形，住戶同意由管理委員會聘僱之管理服務公司制止或依法申報拆除、排除，其因此所支出之費用並由該住戶負擔。

十一、各住戶與和境建設股份有限公司簽訂之房屋買賣契約書所約定分管、共有或專用者，均視為本規約約定之分管、共有或專用部分，住戶不得異議。

十二、住戶了解空調室外機應設置於和境建設股份有限公司規劃之區域位置，住戶不得任意變動。住戶如有任意變動空調室外機設置位置之情事，本社區管理負責人或管理委員會有權制止並要求拆除；住戶如經制止並要求拆除仍不拆除，視同住戶願意每月繳付雙倍管理費，以補償社區權益之損失，直至自行復原至規劃區域為止。

十三、本社區之樓梯、電梯及公共設施，因屬共用性質，全體住戶應依原規劃共同使用及維護之，如有私自設置障礙（如鞋櫃、堆積物品等）妨害他人使用者，應對其他共有人負損害賠償之責。

---

## 第三條（區分所有權人會議）

一、區分所有權人會議由本社區全體區分所有權人組成，其定期會議及臨時會議之召開，依據本條例第二十五條之規定，召集人由具區分所有權人身分之管理負責人或管理委員會主任委員擔任。

二、區分所有權人會議應由召集人於開會前十日以書面載明開會內容，通知各區分所有權人；但有急迫情事需召開臨時會者，得於公佈欄公告之，公告日期不得少於兩日。管理委員之選任事項，應在前項開會通知中載明並公告之，不得以臨時動議提出。

三、下列各款事項，應經區分所有權人會議決議：

（一）規約之訂定或變更。

（二）本社區之重大修繕或改良。

（三）本社區有本條例第十三條第二款或第三款情形之一須重建者。

（四）住戶之強制遷離或區分所有權人之強制出讓。

（五）約定專用或約定共用事項。

（六）管理委員執行費用之支付項目及支付辦法。

（七）其他依法令需由區分所有權人會議決議之事項。

四、會議之目的如為專有部分之約定共用事項，應先經該專有部分之區分所有權人書面同意，始得成為議案。

五、會議之目的如對某專有部分之承租者或使用者有利害關係時，該等承租者或使用者經該專有部分之區分所有權人同意，得列席區分所有權人會議陳述其意見。

六、約定專用部分變更時，應經使用該約定專用部分之區分所有權人同意。

七、各專有部分之區分所有權人有一表決權。數人共有一專有部分者，該表決權應推由一人行使。

八、區分所有權人因故無法出席區分所有權人會議時，得以書面委託配偶、有行為能力之直系血親、其他區分所有權人或承租人代理出席。但受託人受託之區分所有權占全部區分所有權五分之一以上，或以單一區分所有權計算之人數超過區分所有權人數五分之一者，其超過部分不予計算。代理人應於簽到前提出區分所有權人之出席委託書。

九、開會通知之發送，以開會前十日登錄之區分所有權人名冊為據。

十、區分所有權人會議討論事項，除本條第三項第一款至第五款應有區分所有權人二分之一以上及其區分所有權比例合計二分之一以上出席，以出席人數四分之三以上及其區分所有權比例占出席人數區分所有權四分之三以上之同意行之外，其餘決議均應有區分所有權人過半數及其區分所有權比例合計過半數之出席，以出席人數過半數及其區分所有權比例占出席人數區分所有權合計過半數之同意行之。

十一、區分所有權人會議依第十項規定未獲致決議，或出席人數未達定額者，召集人得就同一議案重新召集會議；其開議應有區分所有權人三人並五分之一以上及其區分所有權比例合計五分之一以上出席，以出席人數過半數及其區分所有權比例合計過半數之同意作成決議。前揭決議之會議記錄依本條例第三十四條第一項規定送達各區分所有權人後，各區分所有權人得於七日內以書面表示反對意見；書面反對意見未超過全體區分所有權人及其區分所有權比例合計半數時，該決議視為成立。會議主席應於會議決議成立後十日內以書面送達全體區分所有權人並公告之。

十二、區分所有權人會議之出席人數與表決權之計算，於任一區分所有權人之區分所有權占全部區分所有權五分之一以上者，或任一區分所有權所有之專有部分之個數超過全部專有部分個數總合之五分之一以上者，其超過部分不予計算（惟計算應出席總戶數時仍應計入）。

十三、區分所有權人會議之決議事項，應作會議記錄，由主席簽名，於會後十五日內送達各區分所有權人並公告之。

十四、會議記錄應包括下列內容：

（一）開會時間、地點。

（二）出席區分所有權人總數、出席區分所有權人之區分所有權比例總數及所佔比例。

（三）討論事項之經過概要及決議事項內容。

---

## 第四條（公寓大廈有關文件之保管責任）

一、規約、會議記錄、簽到簿、代理出席委託書、使用執照影本、竣工圖說及有關文件應由管理委員會負保管之責，區分所有權人或利害關係人如有書面請求閱覽時，不得拒絕。

---

## 第五條（管理委員會委員人數）

為處理區分所有關係所生事務，本社區由區分所有權人選任住戶為管理委員組成管理委員會。管理委員會組成如下：

（一）主任委員一名。

（二）副主任委員一名。

（三）財務委員一名。

（四）監察委員一名。

（五）委員三名。

前項委員之名額，合計為七名。

主任委員、監察委員、財務委員，由具區分所有權人身分或配偶任之，且須設置戶籍至本社區。

主任委員、副主任委員、財務委員、監察委員及管理委員選任時應予公告，解任時亦同。

一般委員由具區分所有權人身分或配偶、直系親屬任之，且須設置戶籍至本社區。

---

## 第六條（管理委員會會議之召開）

一、主任委員應至少每兩個月召開管理委員會會議一次。

二、管理委員會會議，應由主任委員於開會前七日以書面載明開會內容，通知各管理委員。

三、發生大事故有及時處理之必要，或經三分之一以上委員請求召開管理委員會會議時，主任委員應儘速召開臨時管理委員會會議。

四、管理委員會會議應有過半數以上委員出席參加，其討論事項應經出席委員過半數以上之決議通過。管理委員因故無法出席管理委員會會議，得以書面委託其他管理委員出席，但以代理一名委員為限。

五、有關管理委員會會議記錄，應包括下列內容：

（一）開會時間、地點。

（二）出席人員及列席人員名單。

（三）討論事項之經過概要及決議事項內容。

六、管理委員會會議之決議事項，應作成會議記錄，由主席簽名，於會後十五日內公告之。

---

## 第七條（管理委員之資格及選任）

一、主任委員、副主任委員、財務委員、監察委員由管理委員互選之。

二、委員應以下列方式選任：採無記名單記法選舉，社區最高票當選不分區委員一名；各棟票數次高者兩名當選，票數第三高依序為該棟候補委員，得票同票數者，由該選區區分所有權人抽籤決定候補委員，未出席抽籤者，由管理委員會代為抽籤。

三、委員之任期為一年，連選得連任一次。管理委員參與委員會議（不含委託出席），以每月每次會議為上限，可領取乙次新台幣 500 元會議出席車馬費、誤餐費。

四、主任委員、副主任委員、財務委員、監察委員及管理委員有下列情事之一者，即當然解任：

（一）主任委員、副主任委員、財務委員、監察委員喪失區分所有權人資格者。

（二）管理委員喪失住戶資格者。

（三）任期內達三次未向主任委員請假且未委託出席者，得經管理委員會決議解任。

五、主任委員、副主任委員、財務委員、監察委員出缺時，應由管理委員重新互選之；管理委員出缺時，由候補委員依序遞補。

六、管理委員、主任委員及管理負責人任期屆滿未再選任或有本條例第二十條第二項所定之拒絕移交者，自任期屆滿日起，視同解任。

七、各管理委員在任期內欲辭任者，應於辭任一個月前提出於管理委員會，並經管理委員會同意後始得離任。

---

## 第八條（主任委員等取消資格之事由）

有下列情事之一者，不得充任主任委員、副主任委員、財務委員、監察委員，其已充任者即當然解任：

一、曾犯詐欺、背信、侵占罪或違反工商管理法令，經受有期徒刑一年以上刑期之宣告，服刑期滿尚未逾二年者。

二、曾服公職虧空公款，經判決確定，服刑期滿尚未逾二年者。

三、受破產之宣告，尚未復權者。

四、有重大喪失債信情事，尚未了結或了結尚未逾二年者。

五、無行為能力或限制行為能力者。

---

## 第九條（管理委員之權限）

一、主任委員對外代表管理委員會，並依管理委員會決議執行本條例第三十六條規定事項。

二、主任委員應於定期區分所有權人會議中，對所有區分所有權人報告前一會計年度之有關執行事務。

三、主任委員得經管理委員會決議，對共用部分投保火災保險、責任保險及其他財產保險。

四、主任委員得經管理委員會決議通過將其一部分之職務，委任其他委員處理。

五、副主任委員應輔佐主任委員執行業務，於主任委員因故不能行使職權時代理其職務。

六、財務委員掌管公共基金、管理及維護分擔費用（以下簡稱為管理費）、使用費等之收取、保管、運用及支出等事務。

七、管理委員應遵守法令、規約及區分所有權人會議、管理委員會之決議，為全體區分所有權人之利益，誠實執行職務。

八、管理委員得為工作之需要支領費用或接受報酬，其給付方式，應依區分所有權人會議之決議為之，但其決議或辦法不得違背法令。

九、監察委員應監督管理委員、管理委員會，遵守法令、規約及區分所有權人會議、管理委員會之決議執行職務。

十、管理委員參與委員會議（不含委託出席），以每月每次會議為上限，可領取乙次新台幣 500 元會議出席車馬費、誤餐費。

十一、公共安全檢查與消防安全設備檢修之申報及改善之執行。

---

## 第十條（公共基金、管理費之繳納）

一、為充裕共用部分在管理上必要之經費，區分所有權人應遵照區分所有權人會議決議之規定向管理委員會繳交下列款項：

（一）公共基金。

（二）管理費。

二、管理費由各區分所有權人依照區分所有權人會議之決議分攤之：

| 費用類別 | 費率 |
|---------|------|
| 房屋管理費 | 每月每坪新臺幣 **80 元** |
| 汽車位管理費 | 每月每位新台幣 **500 元** |
| 機車位管理費 | 每月每位新台幣 **100 元** |

並授權管理委員會得視社區財務運行狀況評估管理費年繳優惠方案。

三、各項費用之收繳、支付方法，授權管理委員會訂定。管理委員會得委由管理服務人代為執行管理費之收繳與支付，但區分所有權人會議另有決議者，應依其決議。

四、管理費以足敷開支為原則，公共基金依每月管理費百分之五至百分之二十收繳，其費率由管理委員會訂定之，如達一定金額時，得經區分所有權人會議之決議停止收繳。

五、區分所有權人若在規定之日期前未繳納金額時，管理委員會得訴請法院命其給付應繳之金額及另外收取遲延利息，以未繳金額之年息 10％ 計算，且相關催繳及訴訟程序費用，含委任律師費，均由該區分所有權人負擔。

---

## 第十一條（管理費、公共基金之管理及運用）

一、管理委員會為執行財務運作業務，應以管理委員會名義開設銀行或郵局儲金帳戶。

二、管理費用途如下：

（一）委任或僱傭管理服務人之報酬。

（二）共用部分、約定共用部分之管理、維護費用或使用償金。

（三）有關共用部分之火災保險費、責任保險費及其他財產保險費。

（四）管理組織之辦公室、電話費及其他事務費。

（五）稅捐及其他徵收之稅賦。

（六）其他基地及共用部分等之經常管理費用。

（七）因管理事務洽詢律師、建築師等專業顧問之諮詢費用。

三、公共基金用途如下：

（一）每經一定之年度，所進行之計劃性修繕者。

（二）因意外事故或其他臨時急需之特別事由，必須修繕者。

（三）共用部分及相關設施之拆除、重大修繕或改良。

（四）供墊付前項之費用，但應由收繳之管理費歸墊。

（五）其他基地及共用部分等之經常管理費用，但應由收繳之管理費歸墊。

---

## 第十二條（重大修繕或改良之標準）

前條第三項第三款共用部分及其相關設施之拆除、重大修繕或改良，指其工程金額超過共用部分、約定共用部分之半個月管理維護費用者。

---

## 第十三條（共用部分修繕費用之負擔比例）

共用部分之修繕，由管理委員會為之。其費用由公共基金支付，公共基金不足時，由區分所有權人按所有建物坪數及車位個數分攤之。但修繕費係因可歸責於區分所有權人或住戶之事由所致者，由該區分所有權人或住戶負擔。

---

## 第十四條（共有部分及約定共用部分之使用）

住戶對共有部分及約定共用部分之使用應依其設置目的及通常使用方法為之。

---

## 第十五條（專有部分及約定專用部分之使用限制）

一、區分所有權人及住戶對專有部分及約定專用部分之使用，應依法依約為之。

二、區分所有權人及住戶對於專有部分及約定專用部分應符合法令規定之方式使用，並不得有損害建築物主要構造及妨害建築物環境品質之行為。在本公寓大廈內施工時，應遵守管理委員會之規定。

---

## 第十六條（公共環境維護）

一、各住戶應依建築法及相關法令之規定使用建築物。

二、各住戶應按時繳交管理費，遵行管理委員會決議之相關規章與規定。

三、各住戶不得飼養家禽（如雞、鴨等會產生危害公共環境衛生之家禽）。

四、不隨地便溺、吐痰或拋棄果皮、煙蒂、紙屑與廢物。

五、自家飼養貓狗的糞便應隨地立即清除。

六、使用電梯應注意公共衛生及不得任意塗畫。

七、在公共場所或非曬衣陽台不得晾曬衣物。

八、維護生活環境、不踐踏草坪、攀折花木或破壞環境設施。

九、為保持本社區空氣新鮮，住戶僅能使用電力、瓦斯，禁止使用煤炭、柴油、重油等高污染油品為燃料，或存放會散發刺鼻味之物料。

十、社區所有住戶除原起造人設計外，非經管委會同意，不得於戶外任何地點裝設招牌、雨庇、鐵鋁窗等影響外觀一致性之設施，如有違規行為，得由管理負責人或管理委員會派工逕行拆除修復，所需費用由違規人自行負擔。

十一、禁止私自變更外牆結構，破壞社區整體外觀。

十二、搬運物品如有垃圾或紙屑遺留公共區域，應隨即撿拾。

十三、垃圾應妥善分類包裝，以確保清潔與衛生。

十四、非經管委會同意禁止於外牆任何位置或公共區域張貼海報、告示，如欲張貼時應依統一規定之方式及地點張貼之。

---

## 第十七條（公共秩序安全維護）

一、凡易燃、易爆、有毒及異味及其他任何危險物品，均不得攜入社區，以維公共安全。

二、不私自接用公共水電並注意水電安全。

三、公共場所通道及樓梯間等公共空間不放置物品或佔用，以保暢通。

四、不在戶內及陽台燃放鞭炮或焚燒冥紙、紙張、衣物以及其他發煙物品，以免梯間偵煙警報器感應鈴聲響誤傳火警。

五、不在本社區經營色情或危及公共安全或違反公序良俗之行業。

六、機車、腳踏車不得隨便停在公共空間。

七、本社區所有有關大樓結構安全之樑、柱、牆（合併戶之隔戶牆除外），在依圖施工完成交予住戶後，絕對不做任何破壞，否則管委會有權制止，住戶及僱用之裝潢工人並負造成公共危險之刑責，本社區各所有權人均有權提出訴訟。

八、不得招呼小販或推銷人員進入本大樓販賣物品。

九、不得在禁止停車地點隨意停放車輛。

十、使用電梯應小心輕用，嚴禁人數超過及客梯載貨使用。

十一、不作妨害社區良好秩序行為，並支持警衛人員執行安全勤務。

十二、公共區域種植之盆栽，應維護其安全及美觀。

十三、外出前檢查門窗是否關好，並留意左鄰右舍，做好守望相助工作。

十四、發現盜賊侵入，應立即向警察機關報案並通知服務中心採取緊急措施。

十五、禁止於住宅內設置工廠。

十六、約束兒童不得以「電梯」為玩具，不玩弄「對講機」及緊急按鈕，不隨意按下「消防箱」之按鈕。

十七、住戶於維護修繕或行使權利時，不得妨害其他住戶之安寧、安全。

十八、管委會因維護、修繕共用部分或設置管線必須進入住戶屋內時，住戶不得拒絕。住戶於維護、修繕專有部分、約定專有部分或設置管線，必須使用共用部分時，應經管理負責人或管理委員會之同意後始得為之。

---

## 第十八條（財務運作之監督規定）

一、管理委員會之會計年度自每年一月一日起至當年十二月三十一日止。（除第一屆管理委員會為 114 年 08 月 03 日至 115 年 12 月 31 日止。）

二、管理委員會應製作並保管財務會計帳簿、會計憑證、公共基金餘額、財務報表、欠繳公共基金與應分攤或其他應負擔費用情形、公共設施設備及附屬設施清冊、固定資產與雜項購置明細帳冊、區分所有權人與區分所有權比例名冊等。如區分所有權人或利害關係人以書面請求閱覽或影印時，不得加以拒絕，但得指定閱覽或影印之日期、時間與地點。

三、管委會應於每月十五日前公佈本社區上一月份之財務報表，明列收入、支出及結餘情形。

四、財務報表應經主任委員、副主任委員、財務委員、監察委員簽認後始可公佈，以昭公信。

---

## 第十九條（糾紛之協調程序）

一、本社區區分所有權人或住戶間發生糾紛時，由管理委員會邀集雙方當事人進行協調。

二、有關區分所有權人、管理委員會或利害關係人間訴訟時，應以管轄本社區所在地之地方法院為第一審法院。

三、住戶有下列各目之情事，管理委員會應促請區分所有權人或住戶改善，於三個月內仍未改善者，管理委員會得依區分所有權人會議之決議，訴請法院強制其遷離。而住戶若為區分所有權人時，亦得訴請法院命其出讓區分所有權及其基地所有權應有部分：

（一）積欠依本條例及規約規定應分擔費用，經強制執行再度積欠金額達其區分所有權總價百分之一者。

（二）違反本條例相關規定經依本條例第四十九條第一項第一款至第四款處以罰鍰後，仍不改善或續犯者。

（三）其他違反法令或規約，情節重大者。

（四）住戶違反本條例第十七條第一項至第四項之規定有破壞公共安全、公共衛生、公共安寧等行為時，應予制止，或召集當事人協調處理，經制止而不遵從者，得報請地方主管機關處理。

四、區分所有權人或住戶有妨害建築物正常使用及違反共同利益行為時，管委會應依相關規定處理，包括請求主管機關介入或訴請法院為必要之處置。

五、強制出讓所有權於判決確定後三個月內不自行出讓並完成移轉登記手續者，管理委員會得聲請法院拍賣之。

---

## 第二十條（其他事項）

一、共用部分及約定共用部分之使用管理事項，本規約未規定者，得授權管理委員會另訂使用規則。

二、區分所有權人資格有異動時，取得資格者應以書面提出登記資料。

三、區分所有權人將其專有部分出租他人或供他人使用時，該承租者或使用者亦應遵守本規約各項約定。

四、區分所有權人應在租賃（或使用）契約書載明承租人（或使用人）不得違反本規約之規定。

五、本規約未規定之事項，應依《公寓大廈管理條例》、《公寓大廈管理條例施行細則》及其他相關法令之規定辦理。

六、有關建築物陽台外緣裝飾性質之柱、版、透空欄柵部份應依審核通過之設置原則，不得擅自變更。社區區分所有權人及公寓大廈管理委員會應負起管理維護之責。

七、建築基地範圍內，依法留設、退縮及設置之開放空間（人行步道、廣場）、公共設備（庭園燈、街道家具），社區區分所有權人及公寓大廈管理委員會應負起管理維護之責。

八、本公寓大廈外牆之修繕、管理、維護，由管理負責人或管理委員會為之。管理負責人或管理委員會每年至少應檢視一次外牆磁磚或飾面材料之劣化情形，並作成紀錄。外牆磁磚或飾面材料如有新增剝落或浮起之情形，管理負責人或管理委員會除應請求召集人於一個月內召開區分所有權人會議討論相關修繕、管理、維護事宜外，如有影響公共安全之虞，應立即設置相關安全緊急處理措施（如防護網或警戒帶），並通報相關單位處理。

九、本社區併案申請室內裝修，爾後如涉及室內裝修時，依據《建築物室內裝修管理辦法》規定辦理。

十、社區若有設置行動不便者使用設施，社區區分所有權人及公寓大廈管理委員會應負起管理維護之責。

十一、本社區基地內不得搭蓋棚架、建築物或作其他使用，其留設之開放空間應常時開放供公眾通行或休憩。

十二、本社區建築周圍上下、外牆面、樓頂平臺及不屬專有部分之防空避難設備，由全體區分所有權人及住戶共同依起造人原設計之外觀（含色系、招牌及社區 LOGO 等）維護使用。其餘本社區建築周圍上下及外牆面如要懸掛或設置廣告物，則依本社區規約約定或區分所有權人會議之決議。

十三、區分所有權人及住戶對於陽臺、花臺、窗戶不得裝設鐵窗、鋁窗及花架等違建。如因安全顧慮需裝置鐵窗時，不得妨礙消防逃生及救災機能，並經管理委員會會議決議，方得由社區統一裝設。本公寓大廈有十二歲以下或六十五歲以上老人之住戶，外牆開口部或陽臺內得設置不妨礙逃生且不突出外牆面之防墜設施。防墜設施設置後，如因設置理由消失且不符前款規定者，區分所有權人應予改善或回復原狀。

十四、區分所有權人於社區內不得於露台、陽台、挑空及上下樓板間及法定空地加蓋任何構造物，如有違建情事發現屬實者，願無條件自行或接受拆除並負擔拆除費用。

十五、區分所有權人或使用人不得於建築物二次施工。

十六、社區室內隔間之機電設備空間，不得擅自拆除或作其他使用。

十七、社區各主要出入口及車道出入口及屋頂避難平台出入口裝設監視錄影系統（如有），公共設施點交時應列入點交項目。

十八、共用部份及約定共用部份劃設機車停車位及自行車車位，供住戶之機車及自行車停放，其相關管理規範依區分所有權人會議決議為之。

十九、住戶於維護修繕或行使權利時，不得妨礙其他住戶之安寧、安全。

二十、管委會因維護、修繕共用部分或設置管線必須進入住戶室內時，住戶不得拒絕。住戶於維護、修繕專有部分、約定專有部分或設置管線，必須使用共用部分時，應經管理負責人或管理委員會之同意後始得為之。

---

## 第二十一條（本規約訂立日期）

本規約訂立於中華民國 **114 年 08 月 03 日**。

## 第一章 總則

### 第一條（目的）

為健全本社區管理委員會（以下簡稱管委會）之組織架構、明確職權分工、規範委員選任及會議運作，確保管委會依法合規、有效執行社區管理事務，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》（民國 84 年制定，歷次修正）

二、本社區住戶管理規約（114 年正式版）

三、相關行政命令及主管機關解釋函令

### 第三條（適用範圍）

本辦法適用於本社區管委會全體委員，包括主任委員（以下簡稱主委）、副主任委員（以下簡稱副主委）、監察委員（以下簡稱監委）、財務委員、工務委員、康樂委員、環保委員及總幹事，凡涉及管委會組織、選任、職務執行及會議運作者，均依本辦法辦理。

### 第四條（名詞定義）

一、**管委會**：依規約及條例組成，負責執行區分所有權人會議決議及處理社區日常管理事務之機構。

二、**主委**：管委會之當然代表人及主持人，對外代表社區處理公務。

三、**副主委**：輔佐主委，於主委不能執行職務時代行其職務。

四、**監委**：負責監督管委會財務收支及業務執行之委員。

五、**財務委員**：協助監督社區帳務、核閱收支報表，並配合監委執行財務審查工作。

六、**工務委員**：負責公共設施維護、修繕工程發包及廠商管理等相關事務。

七、**康樂委員**：負責規劃社區活動及公共空間使用安排等事務。

八、**環保委員**：負責垃圾分類督導、環境清潔維護及資源回收管理等事務。

九、**總幹事**：由管委會聘任，負責執行日常管理業務之專業人員。


---


## 第二章 委員組成與選任


---

### 第五條（委員人數及任期）

一、本社區管委會委員人數依住戶管理規約規定辦理，設委員七人，含主任委員、副主任委員、監察委員、財務委員、工務委員、康樂委員、環保委員各一人；候補委員各棟均設三位，依選舉票數高低順序列位，票數相同者以抽籤決定順序。

二、委員之任期為一年，連選得連任一次。

三、委員任期屆滿前三十日，應召開區分所有權人會議完成改選。

### 第六條（委員資格）

一、主委、監委、財委，由具區分所有權人身分或配偶，且須設置戶籍至本社區任之；其他委員，由具區分所有權人身分或配偶、直系親屬任之，且須設置戶籍至本社區。

二、有下列情形之一者，不具委員資格：

（一）欠繳管理費連續三個月以上，且未與管委會達成分期還款協議者。

（二）曾因違規行為受管委會書面警告未改善，尚在紀錄期間者。

（三）依法受監護宣告或輔助宣告尚未撤銷者。

（四）主任委員、副主任委員、財務委員、監察委員喪失區分所有權人資格者。

（五）管理委員喪失住戶資格者。

（六）任期內達三次未向主任委員請假且未委託出席者，得經管理委員會決議解任。

### 第七條（主委、副主委、財委及監委之選任）

一、主任委員、副主任委員、財務委員、監察委員由管理委員互選之。

二、主任委員、副主任委員、財務委員、監察委員及管理委員選任時應予公告，解任時亦同。

三、主委出缺時，由副主委代理，副主委亦出缺時，由全體委員互推一人代理；管理委員出缺時，由候補委員依序遞補，若無法補滿則需於三十日內召開臨時區分所有權人會議補選。

### 第八條（委員辭職與補選）

一、委員因故辭職，應於辭任一個月前以書面提出於管理委員會，並經管理委員會同意後始得離任。

二、委員出缺達委員總額三分之一時，應於六十日內召開臨時區分所有權人會議補選之。

三、補選委員之任期至原任期屆滿之日止。


---


## 第三章 委員職責


---

### 第九條（主委職責）

主委應執行下列職務：

一、召集並主持管委會議及臨時管委會議。

二、對外代表管委會簽署公文、合約及相關法律文件。

三、監督總幹事執行日常管理業務。

四、處理社區緊急事故，必要時得先行決定應變措施，事後提報管委會追認。

五、執行區分所有權人會議及管委會決議事項。

六、應於定期區分所有權人會議中，對所有區分所有權人報告前一會計年度之有關執行事務。

### 第十條（副主委職責）

一、輔佐主委處理社區管理事務。

二、主委因故不能執行職務時，全權代理主委職務。

三、受主委委託，執行特定管理業務。

### 第十一條（監委職責）

一、監督管委會財務收支，核閱每月財務報告。

二、審查年度決算報告，並向區分所有權人會議提出審查意見。

三、發現管委會有違規或不當行為時，應即通知主委改善，情節重大者得要求召開臨時區分所有權人會議。

### 第十二條（財務委員職責）

一、協助監督社區日常帳務，定期核閱收支報表。

二、配合監察委員執行財務審查，提供必要之帳務資料。

三、協助編製年度預算草案，提交管委會審議。

四、公共基金、管理及維護分擔費用（以下簡稱為管理費）、使用費等之收取、保管、運用及支出等事務。

### 第十三條（工務委員職責）

一、負責公共設施之日常維護管理，定期巡檢並回報設施狀況。

二、辦理修繕工程之發包作業，協助比價及廠商評選。

三、監督廠商施工品質及進度，驗收完工成果。

### 第十四條（康樂委員職責）

一、規劃及執行社區各項活動，促進住戶交流。

二、協調公共空間之使用安排，處理住戶借用申請。

三、維護社區公告欄及公共空間之整潔與佈置。

### 第十五條（環保委員職責）

一、督導住戶確實執行垃圾分類及資源回收。

二、維護社區環境清潔，定期檢視清潔工作執行情形。

三、推動社區環保意識，必要時辦理相關宣導活動。


---


## 第四章 管委會議


---

### 第十六條（例行會議）

一、管委會例行會議每兩月至少召開一次，由主委召集並主持。

二、例行會議應於召開七日前以書面或電子郵件通知全體委員，通知應載明會議時間、地點及議程。

三、例行會議出席委員人數應達委員總額過半數以上，方得召開；議案之通過應有出席委員過半數之同意。

四、管理委員參與委員會議（不含委託出席），以每月每次會議為上限，可領取乙次新台幣 500 元會議出席車馬費、誤餐費。

### 第十七條（臨時會議）

一、有下列情形之一時，主委得召集臨時管委會議：

（一）社區發生緊急事故，需立即決議處理者。

（二）有委員三分之一以上聯署請求召開者。

（三）監委依職權通知召開者。

二、臨時會議得以電話、通訊軟體等方式緊急通知，惟應於會後七日內補發書面紀錄。

### 第十八條（決議效力與迴避）

一、管委會議決議須有出席委員過半數同意；正反票數相同時，由主委裁決。

二、委員於特定議案有自身利益衝突者，應主動申報並迴避該議案之討論及表決，不計入出席人數。

三、管委會決議不得牴觸區分所有權人會議之決議或現行法令規定。

### 第十九條（會議紀錄）

一、每次管委會議應製作會議紀錄，記載出席人員、討論事項、決議結果及執行期限。

二、會議紀錄應於會後七日內完成，由主委及記錄人員簽名確認後，於會後十五日內公告於社區公布欄，並保存備查。

三、會議紀錄應永久保存。


---


## 第五章 違規處理


---

### 第二十條（委員違規之認定）

委員有下列行為之一者，視為違規：

一、無故缺席例行會議連續三次以上。

二、於執行職務時洩漏住戶個人資料或社區機密文件。

三、藉職務之便謀取私利，或對承包商施以不當壓力。

四、未依本辦法規定迴避利益衝突之議案。

### 第二十一條（違規之處理程序）

一、委員違規情事，由監委或三分之一以上委員提出，交管委會議討論。

二、被提出之委員應有陳述意見之機會，陳述期限不得少於七日。

三、管委會議得依情節輕重，作成下列決議：

（一）書面警告，要求限期改善。

（二）暫停特定職務之執行。

（三）提請臨時區分所有權人會議討論解除委員職務。


---


## 第六章 附則


---

### 第二十二條（費用申報）

委員因執行職務所生之必要費用（如：參加主管機關辦理之教育訓練、代表社區出席相關會議之交通費），得依實支實付原則向管委會申請核銷，單筆超過新臺幣一千元者須附單據。

### 第二十三條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。如涉及委員任期、選任方式等基本事項之修正，應提請區分所有權人會議決議。

### 第二十四條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

## 第一章 總則

### 第一條（目的）

為規範本社區區分所有權人會議（以下簡稱區權人會議）之召集程序、會議運作及決議效力，確保全體區分所有權人之參與權及知情權，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 25 條至第 32 條

二、本社區住戶管理規約（114 年正式版）

三、相關主管機關解釋令及行政函釋

### 第三條（適用範圍）

本辦法適用於本社區全體區分所有權人，凡涉及區權人會議之召集、出席、表決及決議執行者，均依本辦法辦理。

### 第四條（名詞定義）

一、**區分所有權人**：持有本社區各戶或停車位所有權狀者，簡稱所有權人。

二、**應有部分**：所有權人依法持有之公共設施持分比例。

三、**委任書**：所有權人委任他人代為出席並行使表決權之書面授權文件。

四、**書面決議**：依法以書面徵詢方式取代召開實體會議所作成之決議。


---


## 第二章 會議類型與召集


---

### 第五條（會議類型）

區權人會議分為下列兩種：

一、**定期會議**：每年至少召開一次，通常於每年第一季或依規約規定之期間召開。

二、**臨時會議**：有下列情形之一時召開：

（一）管委會認有必要者。

（二）區分所有權人五分之一以上及其應有部分合計五分之一以上，連署請求召集者。

（三）監察委員依職權請求召開者。

### 第六條（召集程序）

一、定期會議由管委會主委召集；臨時會議由主委或依前條規定請求之人召集。

二、召集通知應於會議召開十五日前，以書面方式寄達全體區分所有權人，通知應載明：

（一）召集事由

（二）會議時間、地點

（三）議程（含所有提案事項）

（四）出席或委任方式說明

三、緊急情況下召開之臨時會議，通知期間得縮短為七日，但應於通知中說明緊急原因。

### 第七條（書面決議之使用）

一、下列事項得以書面決議方式辦理，無需召開實體會議：

（一）管委會依法應提報區權人會議追認之緊急處置。

（二）輕微規約修正，不涉及住戶權益重大變更者（須全體住戶四分之三以上同意）。

二、書面決議應於截止日期前送達全體區分所有權人，並自截止日起三十日內統計結果公告。


---


## 第三章 出席與表決


---

### 第八條（出席門檻）

一、區權人會議之召開，應有區分所有權人二分之一以上及其應有部分二分之一以上出席，方得開議。

二、區權人會議未達出席門檻或未獲致決議時，召集人得就同一議案重新召集會議；重新召集之會議，應有區分所有權人三人並五分之一以上及其應有部分合計五分之一以上出席，以出席人數過半數及其應有部分合計過半數之同意作成決議。

三、依前款重新召集之會議決議，應於決議成立後十日內以書面送達全體區分所有權人並公告；各區分所有權人得於收到後七日內以書面表示反對意見，書面反對意見未超過全體區分所有權人及其應有部分合計半數時，該決議視為成立。

### 第九條（表決權之計算）

一、每一區分所有權人之表決權，依其應有部分比例計算，另依規約規定每戶亦各享有一票之人頭票，兩者取其多者適用。

二、同一區分所有權人持有多戶者，其表決權依各戶應有部分合計計算，但人頭票不重複計算。

### 第十條（委任出席）

一、所有權人無法親自出席時，得出具委任書，委任代理人出席，委任對象限於：配偶、有行為能力之直系血親、其他區分所有權人或承租人。受託人受託之應有部分占全部應有部分五分之一以上，或以單一區分所有權計算之人數超過區分所有權人數五分之一者，其超過部分不予計算。

二、受委任人以代理一人為限，委任書應記載委任事項、範圍及授權期限，並由委任人簽名或蓋章；代理人應於簽到前提出委任書。

三、現場無法確認委任書真實性時，主席得要求受委任人提出補充證明，確認無誤後方得入場。

### 第十一條（普通決議）

普通決議由出席之區分所有權人及其應有部分各過半數同意通過，適用於下列事項：

一、管委會工作報告之審查。

二、年度收支決算之承認。

三、一般管理事項之決定。

四、除特別決議以外之其他事項。

### 第十二條（特別決議）

特別決議須有區分所有權人二分之一以上及其應有部分合計二分之一以上出席，以出席人數及其應有部分各四分之三以上同意通過，適用於下列事項：

一、規約之制定或修正。

二、公共設施重大改建或增設。

三、拆除或重建建築物（須依條例第 13 條規定辦理）。

四、其他法令規定應以特別決議通過之事項。


---


## 第四章 會議進行


---

### 第十三條（會議主席）

一、區權人會議由主委擔任主席；主委未出席時，由副主委擔任；副主委亦未出席時，由出席所有權人互推一人擔任。

二、主席負責維持會議秩序，決定議程之進行方式，並於表決結果相同時行使裁決權。

### 第十四條（議事規則）

一、發言應舉手示意，經主席許可後方得發言，每人每次發言以五分鐘為限。

二、議案之修正動議，應於原案表決前提出，並有出席人數十分之一以上附議。

三、程序動議（如：延期表決、散會等）得優先處理。

### 第十五條（投票方式）

一、一般事項以舉手或口頭方式表決。

二、選任委員及監委，應以無記名投票方式辦理。

三、出席人數十分之一以上要求記名投票時，主席應依請求辦理。

### 第十六條（會議紀錄與公告）

一、會議紀錄應於會後十五日內完成，由主席及紀錄人員簽名確認，並送達各區分所有權人及公告之。

二、會議紀錄應公告於社區公布欄至少三十日，並以書面或電子方式通知全體所有權人，無法送達者以公告代替通知。

三、所有區權人會議紀錄應永久保存，並配合每次會議整理成冊，由管委會妥善保管。


---


## 第五章 決議執行與異議


---

### 第十七條（決議之執行）

一、區權人會議決議，由管委會負責執行，並於決議後三十日內提出執行計畫。

二、執行結果應於下次區權人會議中報告，或另行公告。

三、決議之執行不得違反法令或侵害個別所有權人之合法權益。

### 第十八條（決議之異議）

一、所有權人對會議召集程序或決議方法有異議者，得於決議後三個月內，提起確認之訴或撤銷之訴。

二、異議之所有權人應先以書面向管委會表達異議，管委會應於三十日內書面回覆。

三、所有權人之異議不影響決議之效力，但法院判決確定前管委會應審慎評估是否暫緩執行。


---


## 第六章 附則


---

### 第十九條（會議費用）

區權人會議相關費用（場地租借、通知郵寄等必要支出）由管理費支應，並列入年度預算。

### 第二十條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。本辦法涉及區權人會議召集程序之重大修正，應提請區權人會議決議。

### 第二十一條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

## 第一章 總則

### 第一條（目的）

為確保本社區管理委員會（以下簡稱管委會）換屆交接作業之完整性、連續性及合法性，防範財務不清、資料遺失或業務中斷等風險，特制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 20 條（管理負責人或管理委員會之公告及移交義務）、第 36 條（管理委員會職務）

二、本社區住戶管理規約（114 年正式版）

三、A01 管理委員會組織與運作辦法

### 第三條（適用範圍）

本辦法適用於本社區管委會全體委員、主任委員（主委）、副主任委員（副主委）、監察委員（監委）及總幹事，凡涉及任期屆滿、委員辭職、解職或其他原因所發生之職務移交，均依本辦法辦理。

### 第四條（名詞定義）

一、**交接期間**：自新任管委會選出之日起，至完成全部移交作業止，原則上不得超過三十日。

二、**移交清冊**：記載所有應移交事項之書面清單，須由卸任主委及新任主委共同簽署確認。

三、**移交監督人**：由監委擔任，負責全程監督移交作業之公正性及完整性。


---


## 第二章 移交事項範圍


---

### 第五條（財務事項之移交）

下列財務相關事項，卸任管委會應完整移交：

一、社區管理費帳戶、公共基金帳戶及所有存摺（含網路銀行帳號、密碼及印鑑）。

二、截至移交日之財務結算報告，含應收未收管理費清單及應付未付款項明細。

三、現金零用金（如有），應核實清點，以盤點單為憑。

四、未結之應付帳款、合約義務及預付費用說明。

五、最近三年之財務帳冊、憑證、傳票及相關報表。

### 第六條（合約文件之移交）

下列合約及協議文件須完整移交：

一、清潔、保全、電梯維保、消防、水電等各項服務合約正本。

二、保險合約及保單正本。

三、尚在履約期間之承攬合約及施工合約。

四、各合約之聯絡廠商資訊、合約到期日及注意事項說明。

### 第七條（印信及鑰匙之移交）

一、管委會印章、主委印章（如有）及相關官方文件用印。

二、社區各公共設施之備用鑰匙，含機房、電梯機坑、屋頂、地下室管理室等。

三、門禁系統管理員帳號、密碼及相關設備控制器。

四、監控攝影系統之管理帳號及密碼。

### 第八條（行政文件之移交）

一、住戶名冊（含區分所有權人資料及租戶登記資料）。

二、歷屆區權人會議及管委會議紀錄（至少五年）。

三、歷年公告、通知、函文及往來信件存檔。

四、政府主管機關函文及歷年報備資料。

五、各類管理辦法、社區規約及相關法規彙整。

六、違規記錄及尚未結案之申訴案件。

七、工程維修紀錄及設備履歷。

### 第九條（財產清冊之移交）

一、卸任管委會應製作完整之**財產清冊**，分為下列兩類，於移交時逐項確認：

（一）**設備清冊**：記載社區所有公共設施、機電設備、保全器材、辦公設備及其他管委會保管之有形資產，應載明設備名稱、規格型號、數量、購置日期、所在位置及現況說明。

（二）**財務清冊**：記載所有帳戶存摺、印鑑、預付款項、應收款項（含管理費欠款）、應付款項及社區財務資產之現況，並附最新財務報表。

二、財產清冊應由**卸任主委及新任主委共同簽署確認**，監委作為見證人，一式三份，各存一份。

三、移交日應以實地點交方式逐項確認設備清冊所列各項設備之實際存在與狀態；如發現數量不符或設備損壞，應當場記載於移交紀錄，並釐清責任歸屬。

四、財產清冊未完成雙方簽署確認前，不得視為移交完成，卸任主委不得解除保管責任。


---


## 第三章 移交作業程序


---

### 第十條（移交前準備）

一、卸任主委應於任期屆滿前二十日，開始整理各項移交文件，並製作「移交清冊初稿」。

二、移交清冊初稿應涵蓋第五條至第八條所列全部事項，並逐項說明現況。

三、卸任主委應通知監委擔任移交監督人，並告知新任主委（或候任主委）移交時間表。

### 第十一條（移交清點作業）

一、移交清點應由下列人員共同在場辦理：

（一）卸任主委（或其指定之卸任委員）

（二）新任主委（或其指定之新任委員）

（三）移交監督人（監委）

（四）總幹事（協助確認及說明）

二、清點過程應逐項核對，如有疑義應當場提出，並記載於移交紀錄。

三、財務清點應於銀行營業時間內至銀行當面辦理帳戶管理員更換手續，確保帳戶控制權即時移轉。

### 第十二條（移交文件之簽署）

一、移交清冊應於所有事項清點完畢後，由卸任主委、新任主委及監委共同簽署確認，一式三份，各存一份。

二、移交清冊確認後，即視為移交完成，新任管委會承接全部管理責任。

三、如有事項無法於規定期限內完成移交（如訴訟中文件、尚未收回之押金等），應在移交清冊中載明原因及後續處理計畫，由新任管委會繼續追蹤。

### 第十三條（移交期限）

一、一般換屆交接，應自新任委員選出之日起三十日內完成全部移交作業。

二、委員因故中途辭職或解職，應於離職後十四日內完成個人保管事項之移交。

三、超過前述期限仍未完成移交者，移交監督人應向區權人會議報告，必要時依法追究責任。


---


## 第四章 移交後之責任歸屬


---

### 第十四條（卸任委員之義務）

一、移交完成後，卸任委員仍應保守在任期間所知悉之住戶個人資料及社區機密，不得洩漏或不當使用。

二、卸任委員如知悉有未完成或未揭露之事項，應主動通知新任管委會，不得隱匿。

三、移交清冊簽署後，如發現卸任委員隱匿或偽造資料，新任管委會得依法追究民事損害賠償責任。

### 第十五條（新任委員之義務）

一、新任管委會承接移交後，應於七日內完成對各事項之初步盤點確認，如有遺漏或不符，應立即告知卸任主委及移交監督人。

二、移交紀錄簽署後七日內若未提出異議，視為承認移交完整，不得再向卸任委員追究責任（但卸任委員故意隱匿者不在此限）。


---


## 第五章 違規處理


---

### 第十六條（移交遲延之處理）

一、卸任委員無正當理由逾期未完成移交者，移交監督人應提報區權人會議，並得依法聲請法院命其履行移交義務。

二、因移交遲延導致社區管理業務中斷或損害者，遲延之卸任委員應負賠償責任。

### 第十七條（移交文件不完整之處理）

一、發現移交文件有缺漏或毀損，且確認係卸任委員責任者，新任管委會應要求限期補件；逾期不補者，得函請主管機關協處。

二、財務帳目有不符情形，應交由專業會計人員查核，如有舞弊情事，應移送司法機關處理。


---


## 第六章 附則


---

### 第十八條（移交紀錄之保存）

移交清冊及相關紀錄應由管委會永久保存，每次換屆均另行製作，不得覆蓋或銷毀。

### 第十九條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第二十條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

## 第一章 總則

### 第一條（目的）

本準則作為本社區各項管理辦法之母法，用以明確本社區住戶管理規約、各項管理辦法之位階關係、適用順序及解釋原則，確保各辦法間不相牴觸，並保障全體住戶之合法權益。

### 第二條（法律依據）

本準則依下列法規制定：

一、《公寓大廈管理條例》全文

二、本社區住戶管理規約（114 年正式版）

三、相關法院判決及主管機關解釋函令

### 第三條（適用範圍）

本準則適用於本社區全體區分所有權人、住戶、承租人、使用人及其訪客，對本社區現行及未來制定之一切管理辦法，均依本準則之規定解釋與適用。

### 第四條（位階體系）

本社區管理文件之效力位階由高至低如下：

一、**第一位階**：現行法令（《公寓大廈管理條例》、《建築法》、《消防法》及其他相關法規）

二、**第二位階**：本社區住戶管理規約（114 年正式版）

三、**第三位階**：區分所有權人會議決議

四、**第四位階**：管委會通過之各項管理辦法（含本準則及 A01 至 L01 各辦法）

五、**第五位階**：管委會發布之公告、通知及函文

各位階文件不得牴觸上位法；如有牴觸，以上位法為準。

## 第二章 管理辦法之制定與修正


---

### 第五條（管理辦法之制定程序）

一、管理辦法草案由管委會起草，提交管委會議討論，以委員過半數同意通過後公告施行。

二、涉及住戶權益重大事項（如：罰款基準、使用限制等），應於公告後保留十四日之意見徵詢期，彙整意見後視需要修正再公告。

三、涉及規約修正事項，依 A02 辦法召開區權人會議以特別決議辦理。

### 第六條（管理辦法之修正程序）

一、管理辦法之修正，由管委會委員二人以上提案，或由五位以上住戶聯署提案。

二、提案應以書面敘明修正理由及修正對照表，送交主委後列入最近一次管委會議議程。

三、修正案通過後，依第五條相同程序公告施行。

### 第七條（管理辦法之廢止）

一、管理辦法之廢止，須有管委會議出席委員三分之二以上同意。

二、廢止前應評估是否有替代措施，以避免出現管理真空。

三、廢止後應於公布欄公告，並更新社區文件索引。


---


## 第三章 適用原則


---

### 第八條（特別法優先原則）

同一事項同時有多項辦法規定時，以較具體、特定之辦法優先適用；如停車管理事項，H01 車輛與門禁管理辦法優先於一般性規定。

### 第九條（新法優先原則）

針對同一事項，後制定或修正之辦法優先適用；但若明確指定排除適用之情形除外。

### 第十條（從寬解釋原則）

對住戶課予義務或限制住戶權利之規定，應從嚴解釋，不得類推適用至明文未規範之情形；賦予住戶權利之規定，得從寬解釋。

### 第十一條（比例原則）

管委會依本社區各辦法採取管理或裁罰措施時，應遵守下列原則：

一、所採取之措施應能達成管理目的（適當性）。

二、應選擇對住戶限制最小之措施（必要性）。

三、措施對住戶造成之不利益，不得明顯超過所達成之管理目的（相稱性）。

### 第十二條（正當程序原則）

對住戶採取裁罰或限制措施前，應依下列正當程序辦理：

一、確認違規事實，並留存相關證據。

二、給予住戶至少七日之陳述意見期間。

三、由管委會議作成決議，並以書面通知住戶。

四、告知住戶申訴管道及期限。


---


## 第四章 住戶之基本權利與義務


---

### 第十三條（住戶之基本義務）

本社區全體住戶應遵守下列基本義務：

一、依時繳納管理費及相關費用。

二、遵守社區規約及各項管理辦法。

三、維護公共設施及共用部分之整潔，不得損壞。

四、尊重其他住戶之安寧與隱私。

五、配合管委會執行合法之管理業務。

### 第十四條（住戶之基本權利）

本社區全體住戶享有下列基本權利：

一、依規定正常使用社區公共設施之權利。

二、對管委會決策表達意見及申訴之權利。

三、依規定出席區權人會議並行使表決權（限區分所有權人）。

四、查閱管委會財務報告及會議紀錄之權利（依規定程序申請）。

五、不受歧視，受公平對待之權利。

### 第十五條（租戶之義務）

承租人在租賃期間應遵守本社區規約及各項管理辦法，所有人（區分所有權人）應確保其承租人知悉並遵守相關規定；因承租人違規所致之法律責任，由所有人與承租人連帶負責。


---


## 第五章 公告與通知


---

### 第十六條（公告方式）

管委會發布之管理辦法、公告及通知，依下列方式為之：

一、張貼於社區公布欄（大廳及各樓層公告區）。

二、以書面或電子郵件通知全體住戶。

三、以社區通訊群組或 APP 等數位方式輔助通知。

四、法定應書面通知事項（如裁罰通知），須以掛號郵件或親自送達。

### 第十七條（公告效力）

一、在公布欄張貼公告之日起算三日後，視為已通知全體住戶，住戶不得以不知為由拒絕遵守。

二、個別住戶之裁罰通知，以住戶收受書面通知之日或掛號郵件受取日為準；如住戶拒不收受，以留置通知或公告代替送達。


---


## 第六章 違規處理


---

### 第十八條（本辦法之違規認定）

違反本準則所定之適用原則或正當程序者，管委會所為之決議或措施得被認定無效，受影響之住戶得依第 A02 辦法規定申請區權人會議審查或循法律途徑救濟。

### 第十九條（管委會之責任）

管委會委員執行職務時，如有下列情形，應向社區負損害賠償責任：

一、故意或重大過失違反本準則之規定，導致住戶受有損害者。

二、未依正當程序對住戶實施裁罰，且無法補正者。


---


## 第七章 附則


---

### 第二十條（現行辦法之銜接）

本準則施行前已存在之管理辦法，若未與本準則牴觸，繼續有效；若有牴觸，應於本準則施行後六個月內完成修正，逾期未修正者，以本準則之規定為準。

### 第二十一條（施行日期）

本準則經管委會通過後公告施行，修正時亦同。

### 第二十二條（未盡事宜）

本準則未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

## 第一章 總則

### 第一條（目的）

為維護本社區公共秩序、保障全體住戶生命財產安全，並依據《公寓大廈管理條例》相關規定，建立統一、公平、透明之違規處理機制，訂定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 25 條、第 47 條、第 49 條

二、本社區住戶管理規約（114 年正式版）

三、B01 住戶規約與各項管理辦法適用準則

### 第三條（適用範圍）

本辦法適用於本社區全體區分所有權人、住戶、承租人及訪客，凡在本社區範圍內發生之違規行為，均依本辦法處理。

### 第四條（處理原則）

一、**比例原則**：裁罰措施應與違規情節相符，輕微違規以勸導為優先。

二、**程序正義**：給予住戶陳述意見之機會，重大案件提交管委會決議。

三、**公開透明**：違規記錄依規定公告，維護社區知情權。

四、**罰款用途**：收取之罰款一律存入社區公共基金，不得作其他用途。


---


## 第二章 管委會處理權限


---

### 第五條（兩層處理機制）

本社區違規處理分為兩層：

**第一層（管委會自治執行）：**

一、口頭或書面勸導、警告。

二、限期改善通知。

三、停止或限制違規住戶使用特定公共設施。

四、依規約向違規住戶收取罰款（需載入規約）。

五、代為清除並追償費用。

六、違規記錄公告。

**第二層（向政府主管機關申請執行）：**

一、依《公寓大廈管理條例》第 47、49 條裁處罰鍰。

二、強制執行改善義務。

### 第六條（罰款執行限制）

管委會**不得**採取下列方式強制執行罰款：

一、自住戶管理費中逕行扣抵（須住戶書面同意）。

二、鎖車、扣押財物。

三、斷水、斷電。

如住戶拒繳，管委會得提起民事訴訟請求給付，或拒絕提供相關服務（如車輛移入登記等）。


---


## 第三章 違規分級與處理流程


---

### 第七條（違規分級）

| 分級 | 定義 |
|------|------|
| **A 級（輕微）** | 情節輕微、初次發生、未造成立即危害 |
| **B 級（一般）** | 反覆發生、造成他人困擾或損害公共利益 |
| **C 級（重大）** | 危及公共安全、造成實際損害、持續拒不改善 |

### 第八條（標準處理流程）

| 步驟 | A 級輕微 | B 級一般 | C 級重大 |
|------|---------|---------|---------|
| 第一步 | 口頭勸導 | 書面警告 | 書面警告＋限期改善 |
| 第二步 | 書面通知限期改善 | 限期改善＋依規約收取罰款 | 停用公共設施＋收取罰款 |
| 第三步 | 公告違規記錄 | 停用公共設施＋報請主管機關 | 報請主管機關裁罰 |
| 第四步 | — | 提報管委會決議 | 提起法律訴訟 |

## 第四章 各項違規裁罰基準

## 第五章 政府主管機關法定罰則（供參）


---

### 第十七條（條例第 47 條）

由直轄市、縣（市）主管機關裁處**新臺幣 3,000 元以上 15,000 元以下罰鍰**，屆期不改善者得連續處罰：

一、區分所有權人會議召集人違反第 25 條或第 28 條所定之召集義務。

二、住戶違反第 16 條第一項（任意棄置垃圾、排放污染物、惡臭物質或製造噪音、振動等）。

三、住戶違反第 16 條第四項規定。

四、住戶違反第 6 條，經通知限期改善屆期仍未改善。

### 第十八條（條例第 49 條）

由直轄市、縣（市）主管機關裁處**新臺幣 4 萬元以上 20 萬元以下罰鍰**，並得連續處罰：

一、住戶違反第 16 條第二項（於私設通路、防火巷弄、樓梯間、共同走廊、防空避難設備等處堆置雜物、設置柵欄門扇或妨礙逃生等）或第三項（飼養動物妨礙公共衛生、安寧及安全）。

二、住戶擅自變更使用，違反第 8 條第一項或第 9 條第二項規定；或違反第 15 條第一項擅自變更專有或約定專用部分之使用。

三、住戶違反第 17 條所定投保責任保險之義務。

四、區分所有權人違反第 18 條第一項第二款規定，未繳納公共基金。

五、管理負責人、主任委員或管理委員違反第 20 條所定之公告或移交義務。

## 第一章 總則

### 第一條（目的）

為健全本社區財務管理制度，確保管理費及公共基金之收支透明、帳目清晰、資金安全，保障全體住戶之共同財務權益，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 18 條至第 20 條

二、本社區住戶管理規約（114 年正式版）

三、一般公認會計原則（GAAP）之相關規範

### 第三條（適用範圍）

本辦法適用於本社區管委會，凡涉及社區財務收支、帳務處理、預算編製、資金保管及稽核，均依本辦法辦理。

### 第四條（財務負責人）

一、主委為本社區財務之最終負責人，對外代表管委會簽署財務文件。

二、管委會得指定一名財務委員協助主委處理日常財務事務。

三、總幹事負責財務帳目之日常登記、整理及報表製作。

四、監委負責財務之獨立監督，每月核閱財務報告，並於年度決算時出具審查意見。


---


## 第二章 費用收取


---

### 第五條（管理費）

一、管理費依各住戶建物坪數比例計算，或依規約規定之計算方式收取。

二、管理費以一個月為一期。管委會授權管理服務人應於每月 **五號前**製作管理費繳費通知單發送各住戶；住戶若使用超商繳費，請於**二十號前**完成，逾二十號後超商繳費代碼將失效，僅能透過永豐銀行臨櫃繳款或網路銀行轉帳進行繳費。

三、繳費方式包含：超商繳費、永豐銀行臨櫃繳款、網路銀行轉帳，及透過**智生活 APP** 線上繳費；信用卡繳費功能已於 115 年 2 月開啟，需事先向管理中心登記。

四、管理費**年繳優惠為 5%**，如需申請年繳請提前向管理中心申請；年繳金額大於新臺幣四萬元者，無法使用超商繳費，僅能透過網路銀行轉帳或臨櫃繳款。

五、管理費費率之調整，應由管委會提案，經區權人會議普通決議通過後施行。

### 第六條（公共基金）

一、公共基金為依法提撥或區權人會議決議提列之社區儲備資金，用於公共設施重大修繕、緊急支出及其他區權人會議決議之用途。

二、公共基金每年提列標準依規約規定辦理，或由區權人會議決議調整。

三、公共基金帳戶應獨立設立，不得與管理費帳戶混用，動用公共基金應有區權人會議或三分之二以上委員決議同意。

### 第七條（其他收入）

一、設施使用費、場地租借費、廣告收入、違規罰款等其他收入，均應存入管理費帳戶，列入年度收支計算。

二、所有收入均應開立統一收據，不得以私人名義收款。


---


## 第三章 預算管理


---

### 第八條（年度預算之編製）

一、管委會應於每年年底（十二月）前完成次年度收支預算草案，提交區權人會議審議通過。

二、年度預算應包含：

（一）預計管理費收入及其他收入。

（二）各項日常支出（清潔、保全、水電、設備維護等）。

（三）公共基金提列額。

（四）重大工程及設備更新計畫（如有）。

三、預算草案應於區權人會議召開前七日以書面發給全體住戶。

### 第九條（預算之執行）

一、各項支出應在年度預算範圍內執行；超出預算百分之二十以上之單項支出，須提交管委會議追加核准。

二、單筆支出超過新臺幣三萬元者，須取得至少三家廠商報價，並以書面記錄報價比較結果。

三、單筆支出超過新臺幣十萬元者，須依 D01 資產與採購管理辦法之採購程序辦理。

### 第十條（預算之變更）

一、因緊急情況或業務需要，須變更年度預算時，得由管委會議以三分之二以上委員同意通過；變更幅度超過原預算百分之三十時，應於最近一次區權人會議追認。

二、預算變更記錄應保存備查，並於下次區權人會議時報告。


---


## 第四章 支出管理


---

### 第十一條（支出原則）

一、所有支出均須有合法憑證（發票、收據或付款證明）。

二、金額在新臺幣一千元以下之雜項支出，得以白單自製憑證記帳，但每月合計不得超過新臺幣三千元。

三、支出憑證須於發生後三十日內完成報銷，逾期須附說明。

### 第十二條（簽核權限）

| 金額 | 審核層級 |
|------|---------|
| 新臺幣 1 萬元以下 | 總幹事審核，主委備查 |
| 新臺幣 1 萬元至 5 萬元 | 主委審核同意 |
| 新臺幣 5 萬元至 10 萬元 | 主委及財務委員聯合審核 |
| 新臺幣 10 萬元以上 | 管委會議決議通過 |

### 第十三條（付款方式）

一、所有支付款項，優先以銀行轉帳或支票方式辦理，以便留存紀錄；超過新臺幣一萬元以上之款項，不得以現金支付。

二、零用金額度最高不得超過新臺幣**一萬元**，由總幹事（管理服務人）保管，用於採購社區公共區域日常所需用品、文具、電話費等；於每月財務報表內明列支出項目、金額、數量，並於次月補足所花費之金額。零用金使用所開立發票需打統編，或蓋有免稅章之收據。


---


## 第五章 帳務與報表


---

### 第十四條（帳務處理）

一、所有財務收支應依時序登入帳冊（可使用電子表格或會計軟體），並保留原始憑證。

二、帳目每月結算一次，製作月結報表，報表應包含：

（一）收入明細（管理費、其他收入）。

（二）支出明細（各分類）。

（三）本月淨損益及累計結餘。

（四）管理費帳戶及公共基金帳戶餘額。

### 第十五條（財務報告之公告）

一、月結報表應於每月十五日前完成，經主任委員、副主任委員、財務委員、監察委員四人簽認後，公告於社區公布欄及社區通訊群組。

二、年度決算報告應於每年一月三十一日前完成，提交區權人會議審查，並於審查後公告全體住戶。

三、住戶得申請查閱財務帳冊及憑證，申請後管委會應於七日內安排（查閱地點及時間由管委會指定，且須有總幹事在場）。


---


## 第六章 違規處理


---

### 第十六條（管理費拒繳之處理）

一、住戶欠繳管理費，管委會應於逾期後七日內由管理服務人專函通知限期繳納。

二、**住戶逾二期（即連續兩個月）**未繳交管理費，經催告仍不給付者，管委會得採取下列措施：

（一）公告該住戶門牌於社區公告欄及智生活 APP。

（二）停止該住戶使用所有公共設施，含取消所有車輛 Etag、停止使用健身房、兒童遊戲室及球藝教室。

（三）依規約訴請法院命其給付應繳之金額及**遲延利息（以未繳金額之年息 10% 計算）**，以及衍生相關訴訟費用。

三、管委會不得採取斷水電、鎖車等方式強制執行，如住戶拒繳，得提起民事訴訟請求給付。

### 第十七條（財務舞弊之處理）

一、管委會委員或總幹事如有財務舞弊行為（含挪用公款、偽造憑證等），管委會應立即暫停其職務，並召開臨時區權人會議說明情況。

二、查明有舞弊情事者，應依法移送司法機關追究刑事責任，並向物業公司提起民事損害賠償。

三、相關財務損失，優先由責任人、物業公司賠償，不足之數方由社區保險理賠補足。


---


## 第七章 附則


---

### 第十八條（財務帳冊之保存）

財務帳冊、憑證及報表應「永久保存」。

### 第十九條（外部會計查核）

區權人會議得決議委請外部會計師對社區財務進行專案查核，相關費用由管理費支應。

### 第二十條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第二十一條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

---

## 第一章 總則

### 第一條（目的）

為建立本社區公共資產管理制度，規範採購作業流程，防止資源浪費、確保採購效益，並維護各項公共設備之正常運作，依據本社區住戶管理規約及 C01 財務與預算暨基金管理辦法，制定本辦法。

### 第二條（法律依據）

本辦法依下列規範制定：

一、本社區住戶管理規約（114 年正式版）

二、C01 財務與預算暨基金管理辦法

三、《政府採購法》相關原則（參考適用）

### 第三條（適用範圍）

本辦法適用於管委會辦理之一切採購行為，包含設備購置、工程發包、服務委外（清潔、保全、維保等），以及資產之登錄、保管、盤點及報廢。

### 第四條（名詞定義）

一、**公共資產**：本社區共同所有之設備、物品及設施，含維保中之固定資產及消耗性物品。

二、**採購**：以契約取得財物、工程或勞務之行為。

三、**廠商**：與管委會訂立採購合約之自然人、法人或機構。


---


## 第二章 資產管理


---

### 第五條（資產登錄）

一、本社區所有公共資產應登錄於「資產清冊」，記載下列事項：

（一）資產名稱及型號。

（二）取得日期及金額。

（三）保管責任人（通常為總幹事）。

（四）所在位置。

（五）預估使用年限及現況。

二、資產清冊由總幹事維護，主委每季確認一次，監委每年核查一次。

### 第六條（資產保管）

一、公共資產由總幹事負責日常保管，不得私自外借、挪用或轉讓。

二、委員執行職務借用資產時，應填具借用申請，並於事畢歸還；如有損壞，依實際損害情形賠償。

三、設備發生故障或異常，總幹事應立即通報主委，並依維保合約或維修計畫辦理修復。

### 第七條（資產盤點）

一、管委會應每年至少辦理一次全面資產盤點，時間通常安排於年底（十一至十二月）。

二、盤點結果應記錄盤盈、盤虧情形，盤虧者應追查原因，由責任人說明並視情況賠償。

三、盤點完成後，更新資產清冊，並附盤點報告提交管委會議核備。

### 第八條（資產報廢）

一、資產達下列條件之一時，得申請報廢：

（一）使用年限屆滿且已無修復價值者。

（二）修復費用超過重置成本百分之五十者。

（三）已遭竊或滅失，有報案紀錄者。

二、報廢申請須經管委會議決議，並填具報廢單，由主委及監委簽署後，從資產清冊中除名。

三、報廢物品應依環保法規妥善處理，殘值得辦理拍賣或移交廢棄物處理業者，所得列入社區收入。


---


## 第三章 採購管理


---

### 第九條（採購分級）

| 採購金額 | 採購方式 | 核准層級 |
|---------|---------|---------|
| 新臺幣 1 萬元以下 | 直接採購（附憑證） | 總幹事核准 |
| 新臺幣 1 萬元至 3 萬元 | 詢價比較（至少 2 家） | 主委核准 |
| 新臺幣 3 萬元至 10 萬元 | 詢價比較（至少 3 家，書面記錄） | 主委及財務委員核准 |
| 新臺幣 10 萬元以上 | 公開招標或競標 | 管委會議決議 |

### 第十條（採購作業程序）

一、採購需求由總幹事或委員提出，填具採購申請單，載明採購品項、規格、數量、用途及預算。

二、採購申請單依前條分級，送交相應審核層級同意後，方得辦理詢價或招標。

三、詢價或招標結果應以書面彙整報告，標明各廠商報價及評選理由，以最低合理報價或最有利標決定廠商。

四、採購完成後，應核對收到之財物、工程或服務是否符合規格，確認無誤後方得支付款項。

### 第十一條（合約管理）

一、新臺幣三萬元以上之採購，均應簽訂書面合約，合約應載明：採購標的、數量或工項、金額、交貨或完工期限、驗收標準、付款條件及違約責任。

二、合約正本由主委保管，總幹事保存影本，並建立合約到期提醒機制，於合約到期前三個月提醒主委是否續約或重新招標。

三、合約執行期間如有變更，須以書面附件方式辦理，雙方簽字確認。

### 第十二條（廠商資格審核）

一、新合作廠商應提供下列文件備查：公司登記證明（或商業登記）、統一編號、負責人資料、相關執照或證明。

二、廠商如有下列情形，不得承接社區採購案：

（一）與管委會委員有配偶、三親等以內親屬關係，且未迴避者。

（二）曾因履約爭議被列為黑名單廠商者。

（三）無法提供完整公司登記文件者。

### 第十三條（緊急採購）

一、如遇社區設施緊急故障（電梯、消防設備、給排水系統等），危及住戶安全或基本生活需求，得免除比價程序，由主委授權緊急採購。

二、緊急採購金額以新臺幣五萬元以下為限；超過者，應事後七日內補提管委會議追認。

三、緊急採購應留存緊急情況說明及採購憑證，列入財務帳目。


---


## 第四章 服務委外管理


---

### 第十四條（委外服務之管理）

本社區委外服務包含清潔維護、保全服務、電梯維保、消防設備維保、給排水維保等，管委會應依下列原則管理：

一、每年至少一次評估委外服務之品質與效益，決定是否續約或重新招標。

二、委外服務合約應訂有明確之服務水準指標（KPI）及違約扣款機制。

三、總幹事負責對委外廠商之日常監督，每月填具服務品質評核表，送主委核閱。

四、發現委外廠商服務品質不符合約標準，應先發書面警告要求改善；屢勸不改者，依合約終止條款辦理並重新發包。


---


## 第五章 違規處理


---

### 第十五條（採購違規之認定）

下列行為視為採購違規：

一、未依本辦法規定辦理詢價或招標，逕行採購。

二、任一委員收受廠商饋贈或回扣。

三、刻意分散採購以規避比價規定。

四、偽造採購紀錄或憑證。

### 第十六條（違規之處理）

一、發現採購違規，監委應提報管委會議處理。

二、情節輕微者，書面警告並要求補正程序。

三、情節重大（如收受回扣、偽造紀錄）者，依 B02 違規管理與裁罰辦法辦理，並視情節移送司法機關。


---


## 第六章 附則


---

### 第十七條（採購紀錄之保存）

採購申請單、報價比較表、合約及驗收紀錄，應至少保存五年。

### 第十八條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十九條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約及相關法令規定辦理。

**文件編號：** E01

## 第一章 總則

### 第一條（目的）

為保障本社區全體住戶之生命財產安全，建立完善之防災準備、緊急應變及災後復原機制，依據《消防法》、《建築法》、《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《消防法》第 9 條（防火管理）、第 11 條（消防安全設備定期維護申報）及其施行細則

二、《建築法》第 77 條

三、《公寓大廈管理條例》第 10 條、第 16 條

四、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶、管委會委員、總幹事及到訪人員，凡涉及社區安全管理、消防設備維護、緊急應變及防災演練，均依本辦法辦理。

### 第四條（防災責任人）

一、主委為社區防災第一責任人，負責統籌防災工作及緊急應變指揮。

二、總幹事為防災日常管理執行人，負責消防設備日常維護、定期檢查及資料記錄。

三、管委會應指定一名防災委員，協助主委推動防災教育及演練。


---


## 第二章 消防設備管理


---

### 第五條（消防設備種類）

本社區消防設備包含但不限於：

一、自動撒水系統（如有）。

二、火警自動警報設備（煙霧偵測器、熱感應器）。

三、室內消防栓及消防箱。

四、緊急廣播系統。

五、緊急照明設備及避難方向指示燈。

六、滅火器（各樓層及停車場）。

七、防火門及防煙垂壁。

八、緊急發電機（如有）。

### 第六條（消防設備定期維護）

一、本社區消防設備應依《消防法》第 11 條規定，委請合格消防設備師（士）定期辦理維護保養及申報：

（一）每半年申報一次消防安全設備維護狀況（甲類場所標準）。

（二）每月由總幹事進行目視自主檢查，確認設備外觀無異常、標示清晰。

二、維保記錄應完整留存，至少保存五年，並配合主管機關查核。

三、發現設備故障或異常，應於二十四小時內通報廠商修復，修復前應採取臨時補救措施（如增設臨時滅火器），並公告住戶。

### 第七條（逃生通道管理）

一、各樓層走廊、樓梯間及逃生通道，嚴禁堆放任何雜物，並應隨時保持暢通。

二、防火門嚴禁使用門擋固定於開啟狀態，應保持自動關閉功能正常。

三、緊急出口及逃生指示燈每月自主檢查一次，確保正常亮燈。

四、違反前項規定者，依 B02 違規管理與裁罰辦法辦理。


---


## 第三章 監控與安全設備


---

### 第八條（監視錄影系統）

一、本社區監視錄影系統（CCTV）設置於大廳、電梯、停車場、地下室出入口等公共區域，用於維護社區安全。

二、監視錄影資料保存期限不少於三十日，期滿自動覆蓋。

三、監視錄影資料僅供安全調查用途，不得作其他用途；調閱紀錄應有主委書面授權，並記錄調閱人員、時間及原因。

四、監視錄影資料如涉及個人隱私爭議，應諮詢法律意見後再決定是否提供。

### 第九條（門禁管理配合）

社區門禁系統之管理，應與 H01 車輛與門禁管理辦法配合執行，以達整體安全管控效果。


---


## 第四章 緊急應變


---

### 第十條（緊急事故類型）

本辦法所稱緊急事故包含：

一、火災。

二、地震及其引發之次生災害。

三、水管爆裂、淹水。

四、電梯故障（含人員受困）。

五、煤氣洩漏。

六、社區人員傷亡事件。

七、其他危及公共安全之緊急事故。

### 第十一條（緊急應變程序）

發生緊急事故時，第一發現人應依下列程序處理：

一、立即撥打消防（119）或警察（110）。

二、通知總幹事或管理室值班人員。

三、總幹事或值班人員啟動緊急廣播，通知住戶依逃生計畫疏散。

四、主委統籌應變，並視情況啟動下列措施：

（一）指定安全集合地點，清點住戶人數。

（二）提供社區各層平面逃生動線圖，並協助消防人員進入現場。

（三）斷開相關電源（由具資格人員操作）。

（四）聯絡緊急維修廠商（電梯、水電等）。

### 第十二條（緊急聯絡資訊）

管委會應維護並更新下列緊急聯絡名單，張貼於大廳管理室及各樓層公告欄：

一、消防局（119）

二、警察局（110）

三、瓦斯公司緊急電話

四、自來水公司緊急電話

五、台電緊急電話

六、電梯維保廠商緊急電話

七、大樓管理緊急聯絡人（主委、副主委、總幹事）


---


## 第五章 防災演練與教育


---

### 第十三條（年度防災演練）

一、管委會應每年至少辦理一次社區防災疏散演練，通常於九至十月間辦理（配合政府防災月）。

二、演練前應公告全體住戶，說明演練時間、程序及注意事項，並邀請住戶踴躍參與。

三、演練後應完成演練報告，記錄參與人數、演練過程及改善建議，並提交管委會議備查。

### 第十四條（防災知識宣導）

一、管委會應不定期透過公告、通訊群組或住戶大會，宣導防災常識（如地震避難、火災逃生、滅火器使用等）。

二、新住戶遷入時，應發給防災資訊說明單，內容包含：逃生路線圖、緊急聯絡電話及基本避難程序。

### 第十五條（防災物資儲備）

一、管委會應於社區管理室備置基本防災物資，包含：急救箱、手電筒（含備用電池）、廣播器材及基本工具組。

二、防災物資每半年盤點一次，過期或耗損者應即時補充。


---


## 第六章 違規處理


---

### 第十六條（安全違規之處理）

一、住戶違反本辦法規定，危及社區安全者，依 B02 違規管理與裁罰辦法之 C 級重大違規處理，並得即時採取強制排除措施。

二、阻塞逃生通道、破壞消防設備者，除依社區規定處理外，亦將依《消防法》向主管機關申請裁處，最高得處新臺幣三萬元罰鍰。


---


## 第七章 附則


---

### 第十七條（防災文件之更新）

本辦法附件「逃生路線圖」及「緊急聯絡名單」應於每年一月完成更新確認，並重新張貼於各公告位置。

### 第十八條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十九條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《消防法》、《公寓大廈管理條例》及相關法令規定辦理。

---

## 第一章 總則

### 第一條（目的）

為維護本社區各項公共設施之正常運作、延長設備使用壽命、確保全體住戶公平使用權益，並防止設施損壞或不當占用，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 9 條至第 11 條

二、本社區住戶管理規約（114 年正式版）

三、相關建築設備法規

### 第三條（適用範圍）

本辦法適用於本社區全體住戶及其訪客，凡使用社區公共設施者，均依本辦法規定辦理。

### 第四條（公共設施範圍）

本辦法所稱公共設施包含：

一、**會議廳**：供住戶集會、會議使用，需事先預約。

二、**健身房**：設置於社區公設樓層，供住戶健身使用。

三、**兒童遊戲室**：供十二歲以下兒童使用，須有成年人陪同。

四、**球藝室**：供住戶休閒娛樂使用，需事先預約。

五、**頂樓天臺**：供住戶休憩使用，需事先預約，禁止私自占用或堆放物品。

六、**交誼廳大廳空間**：供住戶日常交流休憩使用。

七、**中庭花園**：社區戶外公共休憩空間，請愛護花木設施。

八、**空調公共區域**：大廳、電梯廳、公共廊道等設有中央空調或分離式冷氣之區域。

九、**地下室防空避難空間**：法定防空避難設施，兼供停車使用。

十、**電梯**：供住戶垂直移動之搭乘設施。

十一、**大廳及公共廊道**：建築物公共進出通道。

十二、**管理室**：總幹事日常辦公及接待區域。

十三、**屋頂及機房**：設備維護區域，非授權人員不得進入。


---


## 第二章 健身房使用規範


---

### 第五條（健身房使用資格）

一、健身房僅供本社區已完成登記之住戶及其同住家屬使用，訪客不得進入。

二、使用前應完成健身房使用登記（向管理室申請感應門禁設定）。

三、未滿十二歲之兒童，須有成年人陪同方可進入。

### 第六條（健身房使用時間）

一、健身房開放時間為每日 09:00 至 22:00。

二、超過開放時間請立即離開，並確認門禁關閉。

三、遇社區重大活動或設備維修，管委會得公告暫停開放，至少提前二十四小時通知。

### 第七條（健身房使用規則）

一、使用健身器材前，應確認器材狀況正常；如發現異常，應通知管理室，不得強行使用。

二、使用後應將器材歸位，並以提供之清潔用品擦拭使用過之設備。

三、健身房內嚴禁吸菸、飲食（飲水除外）、攜帶寵物入內。

四、請穿著運動服及運動鞋，赤腳或穿夾腳拖鞋者不得使用器材。

五、器材使用以三十分鐘為限（有人等候時），請主動讓出器材。

六、健身房內請保持安靜，不得大聲喧嘩或播放外放音樂（耳機除外）。

### 第八條（健身房設備損壞）

住戶使用不當導致健身器材損壞，應負賠償責任，賠償金額由管委會依維修費用評估後通知當事人。


---


## 第三章 空調公共區域使用規範


---

### 第九條（空調開放時間）

一、大廳及公共廊道空調（中央或分離式）之開放時間，由管委會依季節及用電效益訂定，並公告之。

二、一般原則：夏季（五至九月）公共空調全天開啟；其餘季節視實際需要開啟。

### 第十條（空調使用禁止事項）

一、住戶及訪客不得擅自調整公共區域之空調設定溫度或模式。

二、公共廊道請儘量關閉安全門，以維持空調效能、節約能源。

三、任何人不得堵塞空調出風口或回風口。

### 第十一條（節能原則）

管委會應每季檢視公共空調之用電量，並適時調整開放時段，以在舒適與節能間取得平衡，降低住戶管理費負擔。


---


## 第四章 地下室使用規範


---

### 第十二條（地下室使用性質）

地下室為法定防空避難設施，同時供車輛停放使用，詳細規範另依 H01 車輛與門禁管理辦法辦理，與本辦法共同適用。

### 第十三條（地下室禁止行為）

一、嚴禁任意堆放私人雜物、廢棄物或建材。

二、嚴禁停放汽車以外之車輛（紅、黃牌重型機車除外），停放規範依 H01 辦理。

三、嚴禁設置固定或半固定之占用設施。

四、嚴禁阻塞緊急逃生出口。

五、嚴禁在非指定區域充電或接電。


---


## 第五章 電梯使用規範


---

### 第十四條（電梯使用規則）

一、電梯應依額定載重使用，不得超重搭乘。

二、搬運大型家具、建材等大型物件，應使用貨梯或預約特定時段，並保護電梯內部不受損傷。

三、嚴禁在電梯內吸菸、飲食，寵物應放置籠具或以牽繩控制。

四、不得惡意破壞電梯設備（按鈕、鏡面、門軌等）。

### 第十五條（電梯故障處理）

一、發現電梯異常，應立即通知管理室，不得強行操作。

二、如人員受困電梯，應按緊急對講機聯絡管理室，靜候救援，不得強行開門。

三、電梯故障修復期間，管委會應公告預計修復時間，並確保行動不便住戶得到必要協助。


---


## 第六章 公共設施預約使用


---

### 第十六條（預約制設施）

如管委會設有需預約之公共設施，包含會議廳、健身房、球藝室、兒童遊戲室等，其預約規則另訂公告，並依下列原則辦理：

一、每戶每月預約次數限制由管委會依設施狀況訂定。

二、須使用智生活 APP 進行公設空間預約，並繳交押金（如有規定）。

三、使用後應恢復原狀，未恢復原狀者，押金不予退還，並視情況追加賠償。


---


## 第七章 管理費點數折抵制度


---

### 第十七條（點數制度說明）

一、本社區設立**管理費點數折抵制度**，鼓勵住戶按時繳費並積極參與社區公共設施管理。

二、點數由管委會統一核發，存儲於總幹事點數紀錄冊（或智生活 APP 相關功能，視系統是否支援）。

### 第十八條（點數累積方式）

一、每戶每月於繳費截止日前（當月 **20 日**）繳清管理費者，依總管理費用每百元累積 **1 點**。

二、點數不得轉讓、贈與或買賣，亦不得折換現金。

三、點數於每月底結算，未使用之點數不予累積至次年，自動歸零。

### 第十九條（點數使用規則）

一、點數可用於抵扣下列費用：

（一）預約需付費之公共設施（如會議廳、球藝室、頂樓天臺等）押金或使用費，每點抵新臺幣 **50 元**，每次最多抵扣 **5 點**。

（二）社區公告之其他點數兌換項目（由管委會不定期公告）。

二、使用點數時，住戶應於申請預約時一併告知，由總幹事確認點數餘額後扣除，並出具扣點紀錄。

### 第二十條（點數查詢）

住戶得隨時向管理中心查詢本戶之點數餘額及使用紀錄，管委會應於公共布告欄或社區通訊群組每季公告各戶點數使用情況。


---


## 第八章 違規處理


---

### 第二十一條（違規之認定）

住戶或訪客違反本辦法規定者，依違規情節，依 B02 違規管理與裁罰辦法辦理，情節包含：

一、A 級：初次輕微違規（如忘記清潔健身器材、小聲播放音樂等）。

二、B 級：反覆違規或造成他人困擾。

三、C 級：損壞設施、阻塞逃生通道等危害安全之行為。

### 第二十二條（暫停使用公共設施）

住戶或其同住人如有下列情形，管委會得暫停其使用特定公共設施三個月至一年：

一、違反本辦法規定達三次以上者。

二、造成公共設施損壞，拒絕賠償者。

三、有其他嚴重違規行為，經管委會議決議者。


---


## 第九章 附則


---

### 第二十三條（公共設施定期維護）

管委會應依各設施特性制定年度維護計畫，並確保維保合約完整有效，如發現設施有危險疑慮，應立即停止開放並進行修復。

### 第二十四條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第二十五條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

---

**文件編號：** G01
**制定日期：** 2026.04.26
**版本：** v0.1（草擬）

---

## 第一章 總則

### 第一條（目的）

為維護本社區居住環境品質、保障全體住戶之安寧與舒適，規範住戶日常生活行為，包含訪客管制、噪音防制及搬遷作業等事項，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。垃圾分類與資源回收另依 G02 辦法辦理；寵物管理另依 G03 辦法辦理。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 16 條

二、《噪音管制法》

三、《廢棄物清理法》

四、《動物保護法》

五、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶（含區分所有權人、承租人）及其訪客，凡在本社區公共空間或涉及其他住戶權益之行為，均依本辦法規定辦理。


---


## 第二章 住戶基本生活規範


---

### 第四條（公共空間使用原則）

一、走廊、樓梯間、大廳等公共空間，為全體住戶共用，應隨時保持整潔暢通，不得堆放任何私人物品。

二、公共空間不得作為私人倉庫、擺攤或從事任何商業行為。

三、不得在公共空間從事可能影響他人安全或造成環境污染之行為。

### 第五條（門窗與陽台管理）

一、住戶不得自陽台或窗戶向外拋物，違者依法負損害賠償責任。

二、晾曬衣物應限於設計允許之晾衣區域，不得於公共廊道側或朝街立面懸掛，以維護社區外觀。

三、陽台花盆應妥善固定，防止墜落危及行人安全。

### 第六條（公共設備使用及危險物品禁止事項）

一、不得任意拆卸、改裝或使用社區共用設備之電源（含充電樁以外之電源）。

二、電梯大廳及走廊請勿擺放鞋架、腳踏車、嬰兒車等物品，必要時應放置於自宅內。

三、消防緊急設備箱嚴禁上鎖或遮蔽。

四、嚴禁將易燃、易爆、有毒、異味及其他危險物品攜入或存放社區，以維護公共安全。（規約第十七條第一款）

五、住戶僅能使用電力、天然瓦斯為能源；嚴禁使用煤炭、柴油、重油或其他高污染油品為燃料，或存放散發刺鼻異味之物料。（規約第十六條第九款）

六、嚴禁在戶內、陽台或公共空間燃放鞭炮、焰火，或焚燒冥紙、紙張、衣物及其他發煙物品，以免觸發消防警報或危及公共安全。（規約第十七條第四款）


---


## 第三章 訪客管制


---

### 第七條（訪客入場管制）

一、訪客進入本社區，應於大廳管理室登記，包含：到訪時間、受訪住戶樓號及戶號、訪客姓名（或聯絡電話）。

二、受訪住戶得預先通知管理室，以簡化訪客入場程序。

三、如住戶拒絕接受或無法聯繫受訪住戶，訪客應自行離去，管理室不得擅自放行。

### 第八條（長期訪客之處理）

一、訪客持續造訪超過七日或有長期使用社區設施之情形，視同住戶，應依承租人登記程序向管委會辦理登記。

二、如有住戶違反本條規定，將視為轉租未申報，依 B02 違規管理與裁罰辦法辦理。

### 第九條（夜間訪客管制）

一、晚間 22:00 至翌日 08:00 為夜間管制時段，訪客進出應配合管理室確認。

二、夜間訪客如無法聯繫受訪住戶，管理室得拒絕其入場，必要時得通知警察協處。


---


## 第四章 噪音防制


---

### 第十條（噪音管制時段）

一、夜間安靜時間為每日 22:00 至翌日 08:00，此時段內應避免製造可能影響他人安眠之噪音。

二、全日管制之噪音行為：

（一）使用音量過大之音響設備（超過管制標準）。

（二）鄰居投訴且屢勸不改之噪音行為。

### 第十一條（裝修施工噪音）

一、裝修施工噪音之管制時段，依 K01 裝修與施工管理辦法之規定辦理。

二、非裝修性質之噪音（如：派對、音樂演奏、卡拉 OK），夜間管制時段內一律禁止。

### 第十二條（噪音投訴處理程序）

一、住戶遭受噪音侵擾，得向管理室投訴，管理室應立即記錄並通知施擾方改善。

二、施擾方於五分鐘內未改善者，由總幹事親自確認並勸導。

三、反覆投訴（一個月內三次以上），依 B02 違規管理與裁罰辦法辦理，並得函請環保主管機關裁罰。


---


## 第五章 搬遷作業管理


---

### 第十三條（搬遷預約）

一、住戶進行搬入或搬出作業，應提前七十二小時向管理室提出搬遷申請，告知搬遷日期、時間及使用之電梯。

二、管委會指定搬遷作業應使用貨梯（如有），或於允許之時段使用客梯，以避免影響其他住戶。

三、搬遷時段以平日 08:00 至 17:00 為原則，週末及國定假日原則上不受理（管委會得視情況例外核准）。

### 第十四條（搬遷作業規定）

一、搬遷過程中應保護電梯內部（使用毯子或保護墊），不得造成公共設施損傷。

二、搬運途中不得堵塞走廊超過三十分鐘，應盡快完成作業。

三、搬遷完成後，應確認公共空間已清潔，無遺留物品或垃圾。

四、如搬遷過程中造成公共設施損壞，應依實際損害賠償。


---


## 第六章 違規處理


---

### 第十五條（違規處理程序）

住戶違反本辦法各項規定，依違規情節輕重，依 B02 違規管理與裁罰辦法辦理：

一、A 級輕微：口頭勸導或書面警告，限期改善。

二、B 級一般：書面警告、限制使用公共設施、依規約收取罰款。

三、C 級重大（如寵物攻擊人、蓄意損壞公設等）：直接裁罰，並得報請主管機關處理。

## 第一章 總則

### 第一條（目的）

為落實垃圾減量、資源永續利用，維護本社區居住環境整潔，並依循桃園市政府垃圾分類政策，特制定本辦法，規範全體住戶之垃圾分類與資源回收行為。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《廢棄物清理法》

二、《資源回收再利用法》

三、桃園市政府環境保護局垃圾分類相關規定

四、本社區住戶管理規約（114 年正式版）第十六條

五、G01 住戶生活管理辦法

### 第三條（適用範圍）

本辦法適用於本社區全體住戶（含區分所有權人、承租人）及其訪客，凡在本社區範圍內產生之廢棄物，均應依本辦法規定分類處理。


---


## 第二章 社區垃圾處理設施與作業流程


---

### 第四條（社區垃圾處理設施）

本社區設有下列垃圾處理設施，供住戶使用：

一、**垃圾回收間**：位於地下一樓，設有垃圾冷藏設備，用於存放一般垃圾，防止垃圾腐敗發臭，維護環境衛生。

二、**資源回收分類桶**：設置於垃圾回收間，依紙類、塑膠、金屬、玻璃等類別分別設置。

三、**廚餘桶**：設置於垃圾回收間，供住戶投放廚餘。

四、**有害廢棄物回收箱**：設置於管理室附近，供住戶投放廢電池、廢燈管等有害廢棄物。

### 第五條（垃圾清運作業流程）

一、本社區清潔人員配合桃園市公所清潔隊，於指定清運時間前，將地下一樓垃圾回收間之垃圾子母車拖至一樓，交由公所清潔隊統一清運。

二、清運時間表由管委會依公所清潔隊之時刻表公告於垃圾回收間及大廳公布欄，住戶請配合公告時間投放垃圾。

三、住戶應於垃圾清運前，自行將垃圾送至地下一樓垃圾回收間投放，**不得**將垃圾留置於走廊、電梯廳或其他公共空間等待清運。

### 第六條（垃圾袋規定）

一、桃園市政府目前**尚未實施專用垃圾袋制度**，住戶投放一般垃圾可使用一般塑膠袋盛裝，以束口密封為原則，防止滲漏。

二、資源回收物及廚餘可另置於指定容器或清潔袋，分類放入對應回收桶。

三、如桃園市政府日後正式公告實施專用垃圾袋制度，本辦法將配合修訂，以政府公告為準。


---


## 第三章 垃圾分類種類


---

### 第七條（垃圾分類五大類）

本社區垃圾依性質分為以下五大類：

一、**一般垃圾**：無法回收再利用之廢棄物。

二、**資源回收物**：可回收再製之廢棄物，依本辦法第八條至第十二條分類處理。

三、**廚餘**：廚房及飲食產生之剩餘食物，依本辦法第十三條規定處理。

四、**有害廢棄物**：廢電池、廢燈管、廢藥品等，依本辦法第十五條規定處理。

五、**大型廢棄物**：廢家具、廢家電等，依本辦法第十六條規定處理。


---


## 第四章 資源回收分類規定


---

### 第八條（紙類回收）

一、**可回收紙類**：報紙、雜誌、書本、紙箱、紙板、牛奶盒、飲料紙盒（利樂包）。

二、**特別說明：**

（一）**乾淨紙餐盒、紙杯**（清洗壓扁後）→ **可回收**。

（二）**嚴重油污、潰爛之紙餐盒**（無法清洗者）→ **丟一般垃圾**，不得放入回收桶。

（三）**鋁箔包**（紙容器，如鋁箔包奶茶、牛奶盒等）清洗後 → **可回收**。

（四）**鋁箔袋**（複合材質，如薯片包、面膜包裝袋）→ **丟一般垃圾**，不可回收。

三、**回收前處理**：

（一）報紙、雜誌請捆紮整齊後放置。

（二）紙箱、紙板應拆平後放置，減少體積。

（三）牛奶盒、飲料紙盒請清洗後壓扁，或剪開展平。

四、**不可回收紙類**：

（一）沾染嚴重油脂、食物殘渣之紙類（如：嚴重油污的速食包裝紙、披薩盒底部）。

（二）衛生紙、紙巾、面紙。

（三）複寫紙、感熱紙（如：一般超市收據）。

### 第九條（塑膠類回收）

一、**可回收塑膠類**：標示 1 至 7 號之塑膠容器（寶特瓶、塑膠袋、保鮮盒、塑膠瓶等）。

二、**回收前處理**：

（一）容器請先清洗乾淨，去除殘餘食物或液體。

（二）寶特瓶請壓扁以節省空間。

三、**不可回收塑膠**：

（一）沾有食物殘渣且無法清洗之塑膠容器。

（二）光碟片（CD/DVD，另有處理管道）。

### 第十條（金屬類回收）

一、**可回收金屬類**：鐵罐（奶粉罐、食品罐）、鋁罐（飲料鋁罐）、金屬鍋具、鐵片等。

二、**回收前處理**：罐類請清洗後壓扁放置。

三、**特別注意**：廢廚房刀具、針頭等鋒利物品，應以紙箱或厚紙包裹並標明「利器」，再行投放。

### 第十一條（玻璃類回收）

一、**可回收玻璃類**：玻璃瓶、玻璃罐（醬油瓶、玻璃飲料瓶、調味料瓶等）。

二、**回收前處理**：請先清洗乾淨，瓶蓋應拆下分別放入對應回收桶。

三、**不可回收玻璃**：

（一）鏡子、燈泡（另見有害廢棄物處理）等非瓶罐類玻璃。

（二）碎玻璃：應以厚紙箱包裹並標明「碎玻璃」，以一般垃圾處理。

### 第十二條（其他資源回收物）

一、**布料與舊衣物**：整理打包後，放置於社區公告之舊衣回收箱。

二、**廢光碟片**：整批裝袋，標明「光碟回收」，放置資源回收區。


---


## 第五章 廚餘處理規定


---

### 第十三條（廚餘投放規定）

一、廚餘包含廚房及飲食過程產生之剩餘食物，包含：蔬菜葉皮、水果皮、果核、蛋殼、剩飯剩菜、麵包糕點、魚骨、肉骨、茶葉渣、咖啡渣等。

二、廚餘請投放至垃圾回收間之廚餘桶。

三、投放前應瀝除多餘水分，以密封袋或容器盛裝，防止滲漏及異味。

四、**下列物品不得投入廚餘桶**：

（一）竹籤、牙籤等尖銳木竹製品。

（二）硬質大型果核（如龍眼核、橄欖核、椰殼等）。

（三）大量鹽分食物之原汁（如醃漬物汁液）。

（四）塑膠袋、包裝材料等非食物類廢棄物。

### 第十四條（廚餘桶清潔管理）

廚餘桶由管委會安排每日清運及定期清洗消毒，住戶請依公告時間投放，避免廚餘桶滿溢。


---


## 第六章 有害廢棄物與大型廢棄物處理


---

### 第十五條（有害廢棄物處理）

下列有害廢棄物不得與一般垃圾或資源回收物混放，應送至社區指定收集點或政府公告之收受機構：

一、**廢電池**（乾電池、充電電池、鈕扣電池、鋰電池）：放置於管理室設置之廢電池回收箱。

二、**廢日光燈管、省電燈泡**：放置於管理室設置之廢燈管回收桶（請勿打破）。

三、**廢藥品**（過期藥、剩餘處方藥）：交由管理室，或送至附近指定藥局之藥品回收箱。

四、**廢油漆、強酸、強鹼等化學品**：禁止直接丟棄，請聯繫管委會或桃園市環保局安排特殊清運。

五、**廢輪胎、廢機油**：依政府規定送至汽機車維修廠或指定回收點處理。

### 第十六條（大型廢棄物處理）

一、廢棄家具、床墊、家電（冰箱、洗衣機、冷氣等）屬大型廢棄物，**嚴禁**丟棄於社區公共空間、停車場或垃圾回收間周邊。

二、預約清運方式：

（一）電話預約桃園市大型廢棄物清運專線：**0800-085-717**。

（二）網路預約桃園市環保局官網線上申辦。

三、廢家電（冷氣、電視、冰箱、洗衣機、電腦等）可申請政府「四合一回收」計畫，免費清運。

四、住戶需自行將大型廢棄物移至社區大門口或指定地點，配合清運人員作業。


---


## 第七章 禁止行為


---

### 第十七條（禁止行為）

下列行為嚴格禁止，違者依第十九條規定處理：

一、於社區公共走廊、樓梯間、電梯大廳、地下室停車場等公共空間任意堆置垃圾或廢棄物。

二、將垃圾或廢棄物棄置於他人門前或車位旁。

三、將有害廢棄物（電池、燈管、藥品、化學品等）混入一般垃圾或資源回收桶。

四、於社區外牆或公共設施附近棄置大型廢棄物。

五、故意污損或損壞社區垃圾處理設施（廚餘桶、回收桶、冷藏設備等）。

六、未配合清運時間，將垃圾留置於地下室垃圾回收間以外之公共場所。


---


## 第八章 垃圾分類宣導與設施維護


---

### 第十八條（垃圾分類宣導）

一、管委會應於垃圾回收間及大廳張貼清晰易懂之垃圾分類海報，並提供本辦法附件（垃圾分類海報圖示版、管理措施說明版）供住戶參閱。

二、垃圾分類海報及說明文件如有更新，管委會應及時更換，並於社區通訊群組通知住戶。

三、管委會得視需要舉辦垃圾分類宣導活動，提升住戶環保意識。

### 第十九條（資源回收設施維護）

一、垃圾回收間之回收桶應明確標示種類，每週清潔不少於一次。

二、廚餘桶應每日清運，並定期清洗消毒，防止異味及蟲害。

三、垃圾冷藏設備由管委會負責維護保養，發現故障應即通報廠商修復。

四、住戶不得任意移動或損壞回收設施；造成損壞者，應負擔修復或賠償費用。


---


## 第九章 違規處理


---

### 第二十條（違規裁處）

住戶違反本辦法，依違規情節，依 B02 違規管理與裁罰辦法辦理：

一、初次違規：書面勸導，限期改善。

二、再次違規：書面警告，並依 B02 辦法裁處罰款。

三、屢次違規（三次以上）：移送主管機關，並公告違規情形於社區公布欄。

### 第二十一條（情節重大之即時裁處）

下列行為視為情節重大，無需書面勸導，得直接依 B02 辦法裁罰並函請主管機關處理：

一、棄置有害廢棄物（電池、化學品等）於公共空間或環境中。

二、非法棄置大型廢棄物致阻礙逃生通道或消防設施。

三、故意破壞垃圾冷藏設備或回收設施。


---


## 第十章 附則


---

### 第二十二條（與其他辦法之關係）

一、本辦法為 G01 住戶生活管理辦法之補充細則，規範社區垃圾分類與資源回收事項，兩者應併同適用。

二、本辦法未規定事項，依 G01 住戶生活管理辦法、B02 違規管理與裁罰辦法及相關法令規定辦理。

### 第二十三條（修訂程序）

本辦法由管委會依實際需要修訂，包含配合政府政策調整（如桃園市實施專用垃圾袋制度時），修訂後公告施行，並適時更新張貼於社區公布欄及社區網路通訊群組。

### 第二十四條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

## 第一章 總則

### 第一條（目的）

為維護社區安寧、公共安全及環境衛生，保障全體住戶之居住品質，依本社區住戶管理規約及《公寓大廈管理條例》第 16 條，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《公寓大廈管理條例》第 16 條第三項及第四項

二、《動物保護法》

三、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶（含區分所有權人、承租人）及其訪客，凡在本社區範圍內飼養或帶入寵物之行為，均依本辦法辦理。

### 第四條（名詞定義）

本辦法所稱「寵物」係以廣泛角度定義：除人以外一切有生命之動物，均適用本辦法之規範。


---


## 第二章 飼養資格與基本規定


---

### 第五條（禁止飼養之動物）

本社區嚴禁飼養下列動物：

一、家禽（如雞、鴨等會危害公共環境衛生之家禽），依規約第十六條第三款規定。

二、具攻擊性之動物（如毒蛇、猛禽、大型爬蟲類等）。

三、具毒性之動物。

四、依法令列為保育類之動物。

五、依本社區規約禁止飼養之其他動物種類。

### 第六條（飼養基本義務）

一、住戶（飼主）應依法為所飼養之動物施打各種預防針；飼養貓、狗等動物者，除接種疫苗外，尚應依規定植入晶片，並辦理寵物登記。

二、寵物應飼養於室內，不得長期置於陽台或公共空間。

三、住戶（飼主）應採取必要措施，預防寵物污染環境，避免造成其他住戶困擾。


---


## 第三章 公共區域使用規定


---

### 第七條（進出公共區域之規範）

一、帶寵物進出本社區公共區域時，住戶（飼主）應使用寵物箱（貓及其他小動物）或繫上牽繩（犬隻），不得讓寵物自由行走。

二、搭乘電梯時，應注意避免與其他住戶造成衝突；如有其他住戶表示不適，應禮讓或等下一班電梯。

三、寵物應避免於梯間、中庭、大廳、停車場等公共區域逗留。

### 第八條（嚴禁遛寵物之公共區域）

下列公共區域**嚴禁**帶寵物進入或遛寵物：

一、梯間（各樓層電梯廳、樓梯間）

二、大廳

三、中庭

四、頂樓花園

五、地下停車場

六、健身房

七、兒童遊戲室

八、球藝室

九、其他管委會公告之公共設施區域

### 第九條（環境清潔義務）

一、寵物於共用部分便溺或造成污染，或隨地踐踏社區花草樹木時，飼主應立即清理復原。

二、若有損毀社區公共財物之情事，應依原價賠償。

三、住戶（飼主）有義務禁止寵物亂吠、製造噪音或產生異味，避免造成其他住戶困擾。


---


## 第四章 違規處理


---

### 第十條（違規處理程序）

住戶違反本辦法各項規定，依下列程序處理：

一、**A 級輕微（首次違規）**：口頭勸導，要求立即改善。

二、**B 級一般（再次違規）**：書面警告，並依 B02 違規管理與裁罰辦法辦理。

三、**C 級重大（寵物攻擊他人、飼養禁止動物、屢勸不改）**：書面警告並直接裁罰，報請主管機關依《公寓大廈管理條例》第 49 條處以新臺幣四萬元以上二十萬元以下罰鍰，並得要求限期將寵物移出社區。

### 第十一條（寵物攻擊事件之處理）

寵物於社區公共空間攻擊他人時，飼主應：

一、立即將寵物帶離現場，安撫受傷住戶，必要時協助就醫。

二、負擔受害人之醫療費用及損失賠償。

三、向管委會提出書面說明，並承諾採取防止再犯措施。

四、情節嚴重者，管委會得要求限期將寵物移出社區，並依法提起損害賠償。


---


## 第五章 附則


---

### 第十二條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十三條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》、《動物保護法》及相關法令規定辦理；管委會得依實際需要決議修訂之。

---

*（草擬版本，尚待管委會審議通過）*

  "和境心見社區-G04-代收郵件領取管理辦法(草擬).md": `# 和境心見社區 — 代收郵件領取管理辦法（草擬）

**文件編號：** G04
**制定日期：** 2026.04.27
**版本：** v0.1（草擬）
**參考依據：** 代收郵件領取管理辦法（115 年 02 月 22 日，第二版）

---

## 第一章 總則

### 第一條（目的）

為規範本社區郵件代收與領取作業，明確管理中心之代收責任範圍，並保障住戶郵件安全，依本社區住戶管理規約及相關郵政法規，制定本辦法。

### 第二條（法律依據）

本辦法依下列規定制定：

一、《郵政法》相關規定

二、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶（含區分所有權人、承租人）及使用本社區地址收件之相關人員。

### 第四條（郵件分類）

本社區郵件依性質分為兩類：

一、**一般信件**：印刷品、平信、限時專送等，由管理中心人員直接投遞至住戶信箱。

二、**代收郵件**：掛號、包裹及宅配快遞，由管理中心人員代收，經智生活 APP 登錄後通知住戶領取。


---


## 第二章 代收與通知程序


---

### 第五條（一般信件處理）

每日一般信件送至社區後，管理中心人員即予分送各住戶郵箱；大型無法投遞郵箱之一般信件，併同掛號、包裹郵件辦理領取。

### 第六條（代收郵件通知）

各類掛號、包裹、宅配、快遞等送至社區後，由管理中心人員登錄智生活 APP，並由智生活 APP 發送訊息通知，住戶接收通知後請至管理中心辦理簽收領件。

### 第七條（代收責任範圍）

一、上述社區掛號、宅配、包裹均由郵政人員、快遞業者送至社區，惟一般信件不具保管簽證責任。

二、管理中心人員有權要求領取人必要時出示相關證件，以確認領取人身分。

三、請住戶切勿未經管理中心人員同意，自行查閱、翻動、攜提郵件，以免產生不必要之爭議。


---


## 第三章 特殊郵件處理規定


---

### 第八條（需本人親領之郵件）

下列郵件需由收件人本人親領，管理中心不予代收：

一、法律文件（如法院傳票、存證信函等）

二、有價證券

三、報值掛號

四、兵單

五、其他需本人簽收之重要文件

### 第九條（貨到付款）

貨到付款物品，請住戶事先告知並安排，管理中心無代墊貨款服務。

### 第十條（冷凍包裹）

冷凍包裹、物品等因有保存條件因素，請收件人於接獲通知後 **48 小時內**完成領取；逾期管理中心得移至他處放置，不負相關保存責任。如當日領取後發生物件變質腐壞等情況，管理中心可協助釐清責任。

### 第十一條（逾期未領之郵件）

除本辦法第八條所列應本人親領之郵件外，掛號、包裹郵件如 **7 日以上**未領取，處理方式如下：

一、郵件、掛號：退回寄件人。

二、包裹：退回寄件人或移至他處放置。

### 第十二條（郵件遺失）

管理中心人員及郵件簽收人之疏失致使郵件遺失時，得依《郵政法》之規定辦理。


---


## 第四章 包裹拆解與廢棄物處理


---

### 第十三條（大型包裹拆解規定）

住戶購買之大型包裹，如含有保護木架、保護板、氣泡保護層或其他包裝材料，**嚴禁**於社區公共區域（含大廳、梯廳、走道、出入口等）進行拆解、整理或丟棄。

### 第十四條（包裝廢棄物清理）

一、相關包裝廢棄物若需委請社區協助清理，依廢棄物清理廠商報價收費。

二、前述行為如影響住戶通行，或造成公共設施、地面、牆面之污損、刮傷或其他損害，應由行為人自行負責清理及相關修復責任。

### 第十五條（海關商品包裝）

海關商品之包裹相關保護材，若需委請社區處理，依廢棄物清理廠商報價收費。


---


## 第五章 附則


---

### 第十六條（施行日期）

本辦法經管委會決議通過後，公告施行之，修訂時亦同。

### 第十七條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《郵政法》及相關法令規定辦理。

---

*（草擬版本，尚待管委會審議通過）*

  "和境心見社區-H01-車輛與門禁管理辦法(草擬).md": `# 和境心見社區 — 車輛與門禁管理辦法（草擬）

**文件編號：** H01
**制定日期：** 2026.04.27
**版本：** v0.2（草擬）
**參考依據：** 停車場管理辦法（114 年 11 月 14 日，第一版；115 年 04 月 21 日修訂）；門禁管理辦法（114 年 11 月 14 日，第一版）

---

## 第一章 總則

### 第一條（目的）

為維護本社區停車場秩序、保障全體住戶車輛安全及人員進出安全，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列規定制定：

一、《公寓大廈管理條例》第 16 條

二、《道路交通管理條例》及《道路交通安全規則》（車輛名詞定義準用）

三、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶（含區分所有權人、承租人）、訪客及施工人員，凡涉及車輛進出及門禁管制，均依本辦法辦理。

### 第四條（車輛定義）

本辦法所稱「汽車」、「重型機車」、「機車」及「自行車」，依《道路交通管理條例》及《道路交通安全規則》之定義認定。其中**紅牌、黃牌重型機車視同汽車**，應停放於汽車格位內，適用汽車相關規定。


---


## 第二章 人員門禁管制


---

### 第五條（24 小時管制）

一、本社區大門採 24 小時管制，人員及車輛進出均須接受服務中心管制。

二、住戶以門禁磁扣（卡）感應進出；車輛以 Etag 條碼感應進出地下停車場。

三、地下停車場入口 24 小時錄影監控。

### 第六條（訪客管制）

一、除住戶親自帶領或事先告知服務中心之訪客外，所有訪客須經住戶確認後，方得進入本社區。

二、住戶如已事先告知有訪客，服務中心待訪客抵達、確認身分後，即可通知住戶讓訪客進入。

三、住戶如有拒絕往來之訪客，可通知服務中心人員列入管制名單並納入移交事項。

四、夜間（22:00 至翌日 08:00）訪客，如無法聯繫受訪住戶，服務中心得拒絕其入場。

### 第七條（施工人員管制）

一、住戶之施工人員，需登記後方得進入社區；進場前尚須於車道辦理登記、換發工作證，並依指示前往指定樓層。

二、公共設施檢修維護人員，應有服務中心核發之工作證始得進入。

三、工作人員之工作證於當日工作完畢後，應交回換取原證件。若不慎毀壞或遺失，每張須賠償製作費**新臺幣 300 元**。

### 第八條（仲介人員管制）

房屋所有權人如有委託仲介人員出售或管理，該員應持所有權人委託書之正本，並依本社區 L01 租售暨仲介人員管理辦法辦理相關手續；委託書應影印乙份於服務中心存查，並書明委託終止日期。

### 第九條（門禁管制禁止行為）

一、任何宣傳品均不得於社區內外張貼、散發（未經服務中心同意）。

二、凡發現社區內可疑陌生人，請即時向服務中心通報並立即查證處理。

三、若有住戶違反管理規約或未繳交應納費用，得由管委會授權服務中心暫時停止其使用健身房、兒童遊戲室及球藝教室之權利，並依《公寓大廈管理條例》處置。


---


## 第三章 門禁磁扣（卡）管理


---

### 第十條（磁扣數量上限）

各棟每戶磁扣（卡）之數量上限如下：

| 棟別 | 上限張數 | 現行張數 |
|------|---------|---------|
| A 棟、C 棟 | 最多 **7 張** | 目前 5 張 |
| B 棟 | 最多 **9 張** | 目前 7 張 |

### 第十一條（磁扣申請及設定程序）

一、住戶如需申請或增設門禁磁扣（卡），應由房屋所有權人於官方 LINE 進行預約。

二、不受理單一戶別針對單張磁卡之增刪作業，所有異動均須以「整戶」重新設定程序辦理。

三、住戶可自行購買悠遊卡或具備感應功能之卡片，交由物業設定後，即可作為門禁磁控卡使用。

四、管理中心完成設定後，住戶應於現場立即核對，確認卡片及 Etag 皆能正常感應使用。

### 第十二條（磁扣遺失處理）

一、**公共磁卡**若不慎毀壞或遺失，每張須賠償設定費**新臺幣 350 元**。

二、**住戶磁扣、磁卡**遺失者，請攜帶現有之所有磁扣、卡片前往管理中心，確認遺失卡片內碼後辦理消磁，以確保社區及住家安全。


---


## 第四章 停車場基本規定


---

### 第十三條（一般使用規定）

一、各區分所有權人或住戶（含車位使用人），應依本辦法各項規定進入停車場停放。

二、車輛請按所有之停車位編號停放，如未按規定使用而導致任何損害，應由違規者負損害賠償責任。

三、本社區車輛之認定，以住戶登記於服務中心之車輛資料為依據；資料有任何變動，請至服務中心辦理變更。

四、非服務中心登記之車輛，須經住戶同意後，始得停放於住戶專有停車位。

### 第十四條（停車場行駛規定）

一、停車場內車速應保持 **15 公里以下**，注意警示標誌並開車燈依遵行方向減速慢行。

二、停車場內嚴禁長時間怠速熱車（不得超過 **3 分鐘**）或開足引擎，製造空氣污染。

三、停車場內禁止進行車輛清洗作業。

四、停車場內禁止儲存任何油料或易燃物品；如因此毀損他人車輛、公共設施或傷及人員，應負完全賠償及法律責任。

五、停車場內嚴禁嬉鬧遊憩、騎自行車、進行各式球類運動及遛寵物（貓、狗等動物），以避免危險發生。

### 第十五條（限高規定）

本停車場限高 **2.1 公尺**，超出此高度者請勿強行進入，若因此造成損害，駕駛人應負損害賠償責任。

### 第十六條（車輛事故責任）

除有約定管理責任外，住戶之車輛若發生事故、毀損、失竊或其他人身事故，概不得向服務中心請求賠償責任，但服務中心有協助追查責任原委之義務。


---


## 第五章 汽車及紅黃牌重型機車停車管理


---

### 第十七條（汽車停車管理費）

汽車停車位每位每月需繳付管理費**新臺幣 500 元整**，併入每期管理費收取。

### 第十八條（汽車停放規定）

一、車輛應停放於所屬專有車位，切勿佔用他人車位空間。

二、本停車場以「一車位一部車」為原則；如車主有兩部車以上，須向服務中心登記，輪流停放時不得佔用他人車位及車道。

三、車格內不得堆放私人物品、兒童嬰兒車等作其他類似用途使用。

四、停車位專供本社區車輛停車使用，不得用於其他用途。

五、離開時請確認門窗是否關妥，以防止失竊或損傷。

六、停車時請注意避免損壞牆面、邊柱及地坪等建築空間，否則須賠償維修費用。

### 第十九條（紅黃牌重型機車規定）

一、紅牌、黃牌重型機車視同汽車，應停放於汽車格位內；一汽車格位內**最多僅能停放兩輛**紅黃牌重型機車，不得與汽車同時停放。

二、停放紅黃牌重型機車時，建議於車輛側柱、中柱下方加墊橡膠軟墊或類似保護墊，以確保車格 epoxy 地坪完整性。

三、因本社區機車停放區未規劃多餘機車位，重機依規定視同汽車，不得停放於一般機車區。


---


## 第六章 一般機車停車管理


---

### 第二十條（機車停車管理費）

機車停車位每位每月需繳付管理費**新臺幣 100 元整**，併入每期管理費收取。

### 第二十一條（B1 機車位抽籤制度）

一、本社區 B1 機車位採每年登記抽籤方式，一年一抽。

二、抽中機車位者須先至服務中心登記相關資料（車籍資料、姓名、電話）。

三、機車車位並非固定綁定於戶別；住戶於抽籤中取得機車位後，方可申請 Etag 條碼設定。

四、Etag 條碼僅限當年度中籤且實際使用之戶別設定；**隔年度若未抽中機車位，該條碼將由物業統一停用並註銷**。

### 第二十二條（一般機車停放規定）

一、禁止一般機車（紅牌、黃牌重型機車除外）及自行車進入地下室 **B2-B4** 空間。

二、機車停放限「一車一位」，僅能停放一部白牌機車或電動機車，不得同時停放兩車。

三、停放時不得超出格線，亦不得佔用他人車位及車道。

四、車格內不得堆放私人物品、兒童嬰兒車等；雨衣及安全帽等亦不得放置地面。

五、一般機車停車位不得停放大型重型機車（黃牌、紅牌等）。

六、機車停車位中柱需放置橡膠墊（現暫以保護板取代），避免樓地板造成損傷，以利公設點交。

七、停車時請注意避免損壞牆面、邊柱及地坪等建築空間，否則須賠償維修費用。


---


## 第七章 Etag 系統管理


---

### 第二十三條（汽車 Etag 設定流程）

一、請住戶將車輛停放於車道口 Etag 感應設備前。

二、致電管理中心，協助掃描車輛上之**遠通 ETC 條碼**（內碼）。

三、管理服務人員將於當日完成 Etag 感應設定。

### 第二十四條（機車 Etag 設定流程）

一、請住戶將車輛停放至自家機車位。

二、於服務中心申請機車 Etag 條碼，並登記車牌號碼及機車位。

三、管理服務人員將於當日完成 Etag 感應設定。

### 第二十五條（Etag 數量上限）

| 車位類型 | 每位 Etag 上限 | 現行設定 |
|---------|--------------|---------|
| 汽車車位 | 最多 **2 個** | 2 個 |
| 機車車位 | 最多 **2 個** | 1 個 |


---


## 第八章 訪客臨停管理


---

### 第二十六條（訪客臨停程序）

一、訪客車輛請先至一樓服務中心登記，告知戶別、車牌號碼及停放車位。

二、因社區無設置訪客臨停車位，請由住戶提供自家車位，或商請鄰居借用車位。

三、訪客依照服務人員指示將車輛停放至住戶車位。

四、訪客臨時停車所需遵守之規定，與住戶停車管理辦法相同。

五、訪客車輛內請勿放置貴重物品，本社區恕不負保管責任。

### 第二十七條（搬家及公務車輛）

搬家、卸貨、維修之公務車輛，請依服務人員指示停放。


---


## 第九章 違規處理


---

### 第二十八條（停車違規處理程序）

| 違規情形 | 第一步 | 第二步 | 第三步 |
|---------|-------|-------|-------|
| 未停入指定車位（停他人車位） | 立即貼單勸導 | 3 日內未改善→公告欄及智生活公告 | 7 日內未改善→報請主管機關 |
| 停車位存放雜物 | 通知限 3 日內改善 | 貼單勸導→社區公告 | 第三次報請主管機關 |
| 停放廢棄車 | 發出公告通知 | 7 日內未改善→以廢棄物處理 | — |

### 第二十九條（Etag 暫停規定）

下列情形，管委會得暫停該戶車輛之 Etag 感應功能：

一、未繳納管理費者，暫停所有車輛 Etag，直至完成管理費繳納。

二、依管委會決議，因違規或其他事由需暫停 Etag 者。

### 第三十條（違規裁罰）

停車及車輛相關違規之罰款基準，依 **B02 違規管理與裁罰辦法**第九條（停車與車輛）之規定辦理。


---


## 第十章 附則


---

### 第三十一條（施行日期）

本辦法經管委會決議通過後公告施行，修訂時亦同。

### 第三十二條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理；管委會得視實際狀況隨時補充修訂相關規定。

---

  "和境心見社區-I01-資訊與資料安全管理辦法(草擬).md": `# 和境心見社區 — 資訊與資料安全管理辦法（草擬）

**文件編號：** I01
**制定日期：** 2026.04.26

## 第一章 總則

### 第一條（目的）

為保護本社區住戶個人資料之安全，規範管委會及相關人員對社區資訊系統、監視錄影資料及住戶個資之處理，防範資料外洩、系統遭入侵或不當使用，依據《個人資料保護法》及相關法規，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《個人資料保護法》全文

二、《公寓大廈管理條例》相關規定

三、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於管委會全體委員、總幹事及任何依職務接觸社區資訊系統或住戶個人資料之人員。

### 第四條（名詞定義）

一、**個人資料**：依《個人資料保護法》定義，包含姓名、出生年月日、身分證字號、住址、聯絡電話、電子郵件及其他足以辨識個人之資料。

二、**資訊系統**：本社區使用之門禁管理系統、監視錄影系統、住戶管理軟體及相關數位設備。

三、**資安事件**：因人為疏失、惡意攻擊或系統故障，導致個人資料外洩或資訊系統遭破壞之事件。


---


## 第二章 個人資料管理


---

### 第五條（個人資料之蒐集）

一、管委會蒐集住戶個人資料，以管理社區事務所必要者為限，不得過度蒐集。

二、蒐集個人資料時，應告知住戶蒐集目的、利用方式及住戶之權利。

三、住戶個資包含：戶別、姓名、聯絡電話、電子信箱、車輛資料及門禁設備資料。

### 第六條（個人資料之利用）

一、住戶個人資料僅得用於社區管理業務，不得提供予第三人或作其他用途。

二、如法院、檢察機關或主管機關依法調閱住戶資料，應取得主委書面授權後方得提供，並記錄提供日期、對象及資料範圍。

三、委外廠商（如清潔、保全公司）因業務需知悉住戶資料者，應在合約中訂明保密義務及違約責任。

### 第七條（個人資料之保存與銷毀）

一、住戶個人資料應妥善保管，紙本資料應上鎖存放，數位資料應設置訪問權限。

二、住戶遷出後，其個人資料保存期限以不超過一年為原則（如有法律糾紛，得延長至案件終結）。

三、超過保存期限之個人資料，應以安全方式銷毀（紙本碎紙處理，電子檔案徹底刪除）。

### 第八條（住戶之個資權利）

住戶依《個人資料保護法》享有下列權利：

一、查詢及請求閱覽自身之個人資料。

二、請求補充或更正不完整或不正確之個人資料。

三、請求停止蒐集、處理或利用個人資料（於合理範圍內）。

四、上述申請，管委會應於十五日內書面回覆，並依法辦理。


---


## 第三章 資訊系統安全


---

### 第九條（門禁系統安全）

一、門禁系統之管理員帳號及密碼，由主委及總幹事各持有一份，不得外洩或與他人共用。

二、管委會換屆時，應依 A03 交接辦法完成門禁系統帳號密碼之移交，並立即變更密碼。

三、門禁系統應定期更新韌體及軟體，以防範已知安全漏洞。

### 第十條（監視錄影系統）

一、監視錄影資料保存期限不少於三十日，期滿自動覆蓋，不得任意刪除。

二、調閱監視錄影資料，須有主委書面授權，並填具調閱申請單，記錄調閱人員、時間、目的及調閱片段。

三、調閱後不得複製留存，調閱申請單應保存六個月備查。

四、監視錄影資料嚴禁用於與社區安全無關之目的。

### 第十一條（社區數位通訊安全）

一、管委會使用之電子郵件、通訊群組或管理軟體，應設置適當之訪問控制，防止非授權存取。

二、不得透過公開社群媒體傳播住戶個人資料。

三、管委會之對外公文應以官方電子郵件或書面方式發送，不得以個人帳號代替官方聯絡。


---


## 第四章 資安事件處理


---

### 第十二條（資安事件之通報）

一、委員或總幹事如發現或疑似發生資安事件，應立即通報主委。

二、主委應於二十四小時內評估事件嚴重性，並視情況：

（一）通知受影響住戶。

（二）聯絡相關廠商修復系統。

（三）向主管機關（個人資料保護委員會或直轄市縣市政府）通報。

三、資安事件處理過程應完整記錄，包含：發現時間、影響範圍、處理措施及後續改善計畫。

### 第十三條（資安事件之調查）

一、資安事件調查由主委主導，必要時得委請外部資訊安全專業人員協助。

二、調查期間應保全相關證據，不得任意刪除或竄改資料。

三、如確認有人員違規導致資安事件，依本辦法第十五條及 B02 違規管理與裁罰辦法辦理。


---


## 第五章 違規處理


---

### 第十四條（個資違規之認定）

下列行為視為個資違規：

一、無授權存取或外洩住戶個人資料。

二、擅自調閱或複製監視錄影資料。

三、將住戶資料提供予非授權第三人。

四、未依規定辦理個資之銷毀。

### 第十五條（違規之處理）

一、個資違規情節輕微者，書面警告並要求改善。

二、情節重大（如主動外洩個資、牟取私利）者，依法移送司法機關，並依《個人資料保護法》第 28 條負損害賠償責任（每人每件最高新臺幣二萬元）。


---


## 第六章 附則


---

### 第十六條（教育訓練）

管委會應每年至少一次對委員及總幹事進行個人資料保護及資訊安全教育訓練。

### 第十七條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十八條（未盡事宜）

本辦法未盡事宜，依《個人資料保護法》、本社區住戶管理規約及相關法令規定辦理。

---

**文件編號：** J01
**制定日期：** 2026.04.26

## 第一章 總則

### 第一條（目的）

為促進本社區管委會與住戶間之良性溝通，提升服務品質，建立公開透明之資訊傳遞機制，確保住戶意見得到有效回應，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列規範制定：

一、《公寓大廈管理條例》第 36 條

二、本社區住戶管理規約（114 年正式版）

三、B01 住戶規約與各項管理辦法適用準則

### 第三條（適用範圍）

本辦法適用於管委會委員、總幹事及本社區全體住戶，凡涉及社區公告、住戶申訴、服務申請及溝通管道之使用，均依本辦法辦理。

### 第四條（溝通服務原則）

一、**公開透明**：管委會決策及財務資訊應定期公告，確保住戶知情權。

二、**即時回應**：住戶之服務申請及投訴，應於規定期限內完成回覆。

三、**平等對待**：對所有住戶一視同仁，不得因個人好惡差異服務品質。

四、**尊重隱私**：住戶個人資料之處理，依 I01 資訊與資料安全管理辦法辦理。


---


## 第二章 資訊公告管理


---

### 第五條（常規公告項目）

管委會應定期公告下列事項：

一、每月財務收支報告（於每月十五日前完成）。

二、管委會議紀錄摘要（於會後七日內公告）。

三、社區重大工程計畫及進度。

四、設施維護公告及停用通知（至少提前二十四小時）。

五、年度區權人會議召集通知及議案（依 A02 辦理）。

六、社區規章更新及重要政令宣導。

### 第六條（公告媒介）

一、**公布欄**：大廳及各樓層電梯廳，為主要公告位置，所有重要通知均應張貼。

二、**通訊群組**：管委會官方通訊群組（LINE 或其他平台），用於即時通知。

三、**電子郵件**：法定書面通知或重要公告，以電子郵件輔助傳送。

四、**書面通知**：個別住戶之裁罰、費用催繳等正式通知，應以書面方式送達。

### 第七條（公告之管理）

一、公布欄由總幹事負責管理，過期公告應及時撤除，保持整潔有序。

二、任何人不得擅自撕除或遮蔽管委會張貼之官方公告。

三、住戶如需於公布欄張貼非官方通知（如二手物品轉讓、徵求室友等），應向管理室申請，管委會視情況核准，每則公告張貼期限最長二週。


---


## 第三章 住戶申訴與建議


---

### 第八條（申訴管道）

住戶得透過下列管道向管委會提出申訴或建議：

一、向管理室填寫書面「住戶意見表」。

二、以電子郵件寄送至管委會官方信箱。

三、透過官方通訊群組傳送文字訊息（一般意見建議）。

四、於管委會議公開意見時間發言（需提前告知主委列入議程）。

### 第九條（申訴之受理與回覆）

一、書面申訴應於受理後七個工作日內完成初步回覆，說明是否受理及後續處理方式。

二、複雜案件（如涉及多方住戶之噪音糾紛、設施損壞責任認定）得延長至三十日，但應告知申訴住戶預計回覆時間。

三、所有申訴案件均應建立書面記錄，包含：申訴日期、內容摘要、處理措施及結案日期。

四、申訴住戶如對管委會回覆不滿意，得於收到回覆後十四日內提出書面覆議，提交全體管委會議討論，管委會應於三十日內作出最終決議並書面通知。

### 第十條（住戶意見之彙整）

管委會應每半年彙整住戶意見，於區權人會議或住戶說明會中報告，並說明已採納或無法採納之理由。


---


## 第四章 服務申請管理


---

### 第十一條（常見服務申請項目）

住戶得向管理室申請之服務包含：

一、門禁磁控卡補辦。

二、Etag 條碼申辦或更換。

三、搬遷預約（依 G01 辦理）。

四、停車格資料異動登記。

五、裝修施工申請（依 K01 辦理）。

六、財務報告查閱申請。

七、公布欄公告申請。

### 第十二條（服務申請之標準作業時限）

| 服務項目 | 辦理時限 |
|---------|---------|
| 磁控卡補辦 | 三個工作日內 |
| Etag 條碼申辦 | 五個工作日內 |
| 搬遷預約確認 | 二十四小時內回覆 |
| 停車格資料登記 | 五個工作日內 |
| 財務報告查閱 | 七個工作日內安排 |
| 裝修施工申請 | 七個工作日內核准或退件 |

### 第十三條（服務申請之記錄）

一、所有服務申請應填具申請單，由總幹事留存記錄。

二、記錄應包含：申請日期、戶別、申請事項、處理人員及完成日期。

三、服務申請紀錄至少保存一年。


---


## 第五章 住戶說明會


---

### 第十四條（住戶說明會之召開）

一、管委會每年至少召開一次住戶說明會（非正式區權人會議），向住戶報告社區現況、重大計畫及徵詢意見。

二、住戶說明會應於召開前七日公告，並以通訊群組通知。

三、住戶說明會之討論紀錄應公告於公布欄。

### 第十五條（區權人會議與住戶說明會之區別）

一、區權人會議具法定效力，依 A02 辦法召集，決議具拘束力。

二、住戶說明會為非正式溝通場合，意見供管委會參考，不具決議效力。


---


## 第六章 違規處理


---

### 第十六條（妨礙溝通秩序之處理）

住戶有下列行為，管委會得視情節依 B02 辦法處理：

一、於管委會議或住戶說明會中以言語或行為騷擾、威脅他人。

二、擅自撕除或破壞官方公告。

三、以虛偽事實散布損害管委會或他人名譽之訊息。


---


## 第七章 附則


---

### 第十七條（服務品質評估）

管委會應每年評估溝通服務之品質，包含：申訴回覆時限達成率、住戶滿意度調查，並於住戶說明會中公告評估結果。

### 第十八條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十九條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

---

## 第一章 總則

### 第一條（目的）

為維護本社區建築結構安全、保障鄰居居住品質，規範住戶室內裝修及施工作業之申請程序、施工時間及相關安全措施，依據《建築法》、《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。

### 第二條（法律依據）

本辦法依下列法規制定：

一、《建築法》第 77-2 條（室內裝修）

二、《公寓大廈管理條例》第 8 條、第 9 條

三、《噪音管制法》

四、本社區住戶管理規約（114 年正式版）

### 第三條（適用範圍）

本辦法適用於本社區全體住戶及其委任之施工廠商，凡在本社區專有部分或共用部分從事裝修、修繕或任何施工作業，均依本辦法辦理。

### 第四條（名詞定義）

一、**一般裝修**：不涉及建築結構及共用管道之室內裝修，如油漆、鋪設地板、更換門窗等。

二、**重大裝修**：涉及樓板、牆面、給排水管道、電力配線之工程，須依法申請建築師審查。

三、**維修工程**：非裝修性質之日常修繕（如修繕漏水、更換燈具、修理門鎖等），規模較小，程序簡化。


---


## 第二章 施工申請程序


---

### 第五條（施工申請義務）

一、住戶進行任何裝修或施工作業，均須於開工前完成申請，不得未申報逕行施工。

二、維修工程（如更換燈泡、修繕裂縫等小型工作）且預計施工時間不超過三小時者，得以口頭或電話通知管理室即可，毋需書面申請。

三、施工期間超過一日或涉及噪音之工程，均須填具書面施工申請單。

### 第六條（施工申請文件）

書面施工申請單應包含下列資訊，並備妥下列文件：

一、住戶姓名、戶別及聯絡電話。

二、施工內容說明（含工程性質、範圍及使用材料概述）。

三、預計施工起訖日期及每日施工時間。

四、施工廠商名稱、負責人及聯絡電話。

五、施工廠商之營業登記證明影本（一般裝修以上規模須提供）。

六、重大裝修須附建築師設計圖說及申請書（依《建築法》第 77-2 條規定）。

七、施工保證金（新臺幣**三萬元整**，以支票繳交，抬頭：**和境心見社區管理委員會**；或現金匯款至**永豐銀行泰山分行，帳號：175-018-0009553-8**）。

八、裝潢管理費（新臺幣**壹仟元整**，現金繳交）。

九、電梯廳保護切結書（施工期間應全程保護電梯廳地面及牆面）。

十、室內裝修許可前施作切結書（如有）。

十一、消防系統申請書（如工程涉及消防設備變更）。

### 第七條（施工申請之核准）

一、書面施工申請單提交後，管委會（由總幹事或主委代為審查）應於七個工作日內核准或退件，逾期未回覆視為核准。

二、退件應說明理由，申請人得於修正後重新申請。

三、所有施工申請須確認保證金及裝潢管理費均已繳交，方可核准開工。

### 第八條（電梯保護掛毯租用）

一、施工期間如需使用電梯搬運建材，住戶應向管理中心租用電梯保護掛毯，租金為**新臺幣 500 元 / 次**。

二、如未租用保護掛毯即使用電梯搬運建材，造成電梯損壞，應由住戶負賠償責任。


---


## 第三章 施工時間規定


---

### 第九條（施工時間限制）

一、**平日（週一至週五）**施工時間：

（一）上午場：08:00 至 12:00

（二）下午場：13:00 至 18:00

二、**週六**施工需事先向管理中心申請，且限**無噪音項目**（如貼磁磚收邊、油漆、安裝木作系統傢俱等）：

（一）上午場：09:00 至 12:00

（二）下午場：13:00 至 17:00

三、下列時間**禁止**施工：

（一）**週日及國定假日**（全日禁止）。

（二）農曆除夕及春節（初一至初三）。

（三）平日 12:00 至 13:00 午休時段。

四、如有緊急修繕危及住戶安全之工程，得個案向管委會申請延長施工時間。

### 第十條（噪音管制）

一、高噪音施工（電鑽、砂輪機、切割機等）應集中於平日 09:00 至 17:00 進行，且應盡量縮短連續噪音時間。

二、週六嚴禁高噪音施工，僅可進行無噪音作業。

三、施工前應主動通知相鄰住戶（至少提前一日），告知施工日期及可能產生之噪音，以示尊重。


---


## 第四章 施工安全與管理


---

### 第十一條（施工安全措施）

施工廠商進場前，應確認下列安全措施已完備：

一、施工區域已以圍欄或告示牌適當隔離，防止住戶或訪客誤入。

二、電梯廂、梯廳、走道地面均須鋪設保護板，並設置沉砂池；建材搬運全程使用電梯保護掛毯。

三、廠商人員均配戴管理室核發之工作識別證，進出社區須依 H01 車輛與門禁管理辦法於管理室登記，完工後識別證應繳回；如不慎遺失，須賠償製作費**新臺幣 300 元**。

四、電銲、切割等有明火作業，應備置滅火器於施工現場，並通知管理室；同時確認偵測感應器（煙霧/熱感）已做適當防護，以免觸發誤報。

五、施工人員車輛應依管理人員指示停放，不得任意占用公共區域。

### 第十二條（廢棄物清理）

一、施工廢棄物（廢料、包裝材料、廢棄建材等）應在每日施工結束前清除完畢，不得堆置於公共走廊、梯間或任何公共區域。

二、大量施工廢棄物應以施工用廢料袋或容器包裝，載運時不得污染公共設施。

三、施工廢棄物應依法定管道處理，不得混入一般垃圾丟棄。

四、廢棄物清理未完成，管委會得保留保證金，委請清潔人員代清，費用自保證金中扣除；逾期仍未清理者，依 B02 辦法計罰。

### 第十三條（施工廠商之管理責任）

一、施工廠商應遵守本辦法所有規定，住戶（所有權人）對廠商之違規行為連帶負責。

二、廠商人員進出社區應通過管理室登記，未登記之人員管理室有權拒絕入場。

三、廠商違規（如超時施工、廢棄物未清理等），由住戶負連帶責任，違規罰鍰依 **B02 違規管理與裁罰辦法第十三條及第十六條**辦理。


---


## 第五章 共用部分施工之特別規定


---

### 第十四條（共用部分之施工限制）

一、涉及共用牆面、地板（樓板）、屋頂、外牆、共用管道等共用部分之施工，須取得管委會書面同意，且不得違反建築安全要求。

二、管委會得要求提供結構技師或建築師之評估報告，方才核准。

三、嚴禁擅自更動消防設備、共用電氣管道及共用給排水系統；如確有必要，需依法申請並取得相關許可後，由合格技師施作。

### 第十五條（外牆及窗戶）

一、外牆之任何改動（含外推、添加外掛設施）均屬共用部分，嚴禁擅自施作，違者應自費恢復原狀，並依 B02 辦法計罰。

二、窗戶（含玻璃及窗框）如涉及外觀改變，須取得管委會及全體共同壁住戶同意。


---


## 第六章 違規處理


---

### 第十六條（違規裁罰）

施工相關違規之裁罰基準，依 **B02 違規管理與裁罰辦法第十三條（裝修與施工）及第十六條（裝修施工人員細項罰鍰）**之規定辦理。

管委會得視情節輕重命令施工廠商立即停工；施工廠商或住戶拒不停工者，管委會得向主管機關申請強制執行。


---


## 第七章 附則


---

### 第十七條（保證金之退還）

一、施工完工後，住戶應向管理中心申請退還保證金。

二、管委會（或總幹事）確認下列事項後，應於七日內退還保證金：

（一）公共設施（電梯、走道、梯廳）無損壞。

（二）施工廢棄物已清理完畢。

（三）工作識別證已全數繳回。

（四）無其他未解決之違規事項。

三、如有損壞公共設施，管委會得自保證金中扣除相應賠償費用後退還餘款；如損壞費用超過保證金，差額由住戶補繳。

### 第十八條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十九條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《建築法》、《公寓大廈管理條例》及相關法令規定辦理。

---

## 第一章 總則

### 第一條（目的）

為維護本社區住戶人身財產安全、社區秩序及公共設施，住戶如有委託仲介公司進行房屋租售行為者，須向服務中心報備，並請仲介公司及其人員遵守本社區相關管理辦法。

### 第二條（法律依據）

本辦法依下列規定制定：

一、本社區住戶管理規約（114 年正式版）第二十條（區分所有權人資格異動登記義務）

二、《公寓大廈管理條例》相關規定

### 第三條（適用範圍）

一、凡委託仲介公司進行本社區房屋、車位租售之住戶，以及受委託之仲介公司及其人員，均應遵守本辦法。

二、區分所有權人或住戶本身屬仲介營利單位或自行租售者，亦適用本辦法。

三、未依本辦法辦理報備登記者，均不得進入本社區從事仲介活動。

### 第四條（區分所有權人資格異動登記）

依住戶管理規約第二十條之規定，區分所有權人資格有異動時，取得資格者應以書面向服務中心提出登記資料，完成更新手續。


---


## 第二章 報備程序


---

### 第五條（仲介單位報備）

仲介公司辦理帶看前，應備下列文件向服務中心完成報備：

一、持「物件委託書、仲介簽約人員名片」影本向服務中心登記報備。

二、簽立「仲介業務承諾書」（詳見本辦法附件）。

三、提供負責本社區業務之員工聯絡資料備查，員工名冊如有變動應隨時更新。

### 第六條（仲介人員身份確認）

每次帶領客戶進入本社區時，仲介人員須出示員工識別證，向服務中心確認身份無誤後，方可辦理帶看手續；無授權書或審查不合格者，一律禁止進入社區。


---


## 第三章 帶看規定


---

### 第七條（帶看時間）

帶看時間限每日 09:00 至 19:00，逾時不得辦理帶看手續。

### 第八條（帶看人數限制）

一、同一仲介公司每次帶看，仲介人員以兩位為限，嚴禁進行教學或團看行為。

二、同時段如有他家仲介公司帶看同一戶時，必須等前一家離去後，另一家方可進入。

三、仲介人員須全程陪同看屋客戶，不得讓客戶在社區內自行走動。

### 第九條（帶看範圍）

一、帶看動線僅限委託戶之室內專有部分及停車場，嚴禁參觀其他樓層或任何公共設施。

二、非經管委會許可，嚴禁擅闖公共設施並拍攝或錄影（如必要，可請業主提供實際照片）。

三、帶看期間應保持安靜，不得在社區內高聲喧嘩、擴音、播放音樂。

### 第十條（禁止行為）

下列行為一律嚴禁：

一、將本社區做為銷售講習訓練場所。

二、於外牆或室內專有部分之玻璃，由內向外張貼銷售海報。

三、於社區內住戶信箱、公共區域投遞、張貼、置放任何銷售資料。

四、散發不利於本社區房地產行情之言論或文宣廣告。

五、社區內禁止吸菸、吃檳榔、喝酒。


---


## 第四章 費用與清潔


---

### 第十一條（清潔費）

每戶每次帶看，將收取清潔費新臺幣 **100 元整**，由仲介公司或帶看人員於帶看時向服務中心繳納。


---


## 第五章 違規處理


---

### 第十二條（違規裁處）

一、仲介人員未依本辦法報備即擅自進入本社區，或到處遊走進行仲介工作者，嚴禁該仲介人員再次帶客戶至本社區。

二、仲介人員違反第三章（帶看規定）、第四章（禁止行為）等相關規定，經勸導後仍不依規定辦理者，禁止進入本社區帶看 **10 個工作日**。

三、仲介公司隨意散發廣宣至住戶信箱者，停止進入本社區帶看 **10 個工作日**。

四、情節重大者，得提交管委會決議永久禁止特定人員進入本社區從事仲介活動。


---


## 第六章 附則


---

### 第十三條（承諾書）

仲介公司首次報備時，應由員工簽立「仲介業務承諾書」（詳見附件），承諾遵守本辦法各項規定。

### 第十四條（施行日期）

本辦法經管委會通過後公告施行，修正時亦同。

### 第十五條（未盡事宜）

本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。

---

## 壹、火災防火應變處理

### 一、火警受信總機發報

1. 查看受信總機警示樓層位置，需先至發報樓層位置查看後如無異狀，將蜂鳴器、地區（警示）音響與主音響紅色鈕按至停止位置；同時依面板顯示之樓層用室內對講機查證是否有災情，並檢派保全攜帶對講機前往查證。（R 型火警受信總機請依其操作程序操作）
2. 受信總機發報時，需至發報現場查看，如經查證無災情，再檢查是否人為誤觸或設備故障。
3. 如係人為誤觸，即按下復歸，並將蜂鳴器、地區（警示）音響與主音響按至定位位置。

### 二、發現火苗、火源

即利用消防設備協力住戶立即撲滅。

### 三、大火無法撲滅時

1. 立即電話通報 **119** 與 **110** 告知詳細地址，並詳細記錄通報時間與接話人姓名。
2. 使用廣播設備通知各住戶立即脫離現場，並引導周圍住戶疏散；疏散時請住戶走安全梯，**嚴禁搭乘電梯**。
3. 利用滅火器與消防水龍帶噴水與住戶協力撲滅。
4. 電話通報管委會（主委、相關委員）、社區主任與公司勤務主管。
5. 消防人員到達即引導至失火地點實施搶救。
6. 協助維持現場秩序，以利搶救工作，並慎防宵小趁火打劫。

### 四、火災撲滅後

1. 保持（封鎖）現場。
2. 禁止無關人員出入。
3. 防止宵小趁火打劫。
4. 協助追查失火原因。
5. 工作人員均不得接受或對新聞媒體發表任何言論。

二、如係瓦斯管路外洩，即關閉瓦斯總開關，並立即通知**欣桃瓦斯公司**處理，電話：**03-335-2191** 派員檢修。

## 玖、颱風水災之應變處理

### 一、颱風來臨前

1. 建議計算出社區內地下室、機房門口、電梯門口、車道出入口等位置，購置沙包以備用。
2. 即運用社區佈告欄與智生活 APP 通告各住戶事先做好防颱準備，並搬開陽台之花盆。
3. 清潔人員疏通中庭及樓頂各排水孔，並加強固定社區之樹木。
4. 準備沙包並請機電人員檢測社區緊急發電機與緊急照明燈。
5. 檢查污水排放系統功能是否正常，並將廢水池污水以手動方式排放。
6. 通報管委會（主委、相關委員）、社區主任與公司勤務主管。
7. 完成社區大廳與公共設施區域防颱準備。
8. 颱風前應加檢查電梯機房窗戶、R 樓門窗、小型有對外窗逃生梯之窗戶關閉。

### 二、颱風來臨時

1. 加強注意社區地下室與中庭積水狀況，視積水狀況請清潔人員清除；如積水過深無法清除，除即通報桃園市政府防災中心請求協助支援清除積水外，並運用廣播系統廣播請住戶將地下室車輛駛離社區地下室，以維住戶車輛安全。
2. 若雨量較大，協助安裝車道及中庭門防水閘閥。
3. 保全人員加強公共設施區域之巡邏，並視風力大小實施室外機動巡邏勤務。

### 三、颱風過後

1. 巡視社區公共區域及設施是否損毀。
2. 視勤務狀況協助住戶處理災情。
3. 請清潔人員清理社區中庭與大樓四周之環境。
4. 社區狀況回報管委會（主委、相關委員）與社區主任。

/* ── helpers ── */
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function getSnippets(text, query, max = 3) {
  const lo = text.toLowerCase(), ql = query.toLowerCase();
  const snips = [];
  let pos = 0;
  while (snips.length < max) {
    const idx = lo.indexOf(ql, pos);
    if (idx === -1) break;
    const s = Math.max(0, idx - 40);
    const e = Math.min(text.length, idx + query.length + 60);
    let snip = (s > 0 ? '…' : '') + text.slice(s, e) + (e < text.length ? '…' : '');
    snip = snip.replace(new RegExp(escapeRe(query), 'gi'), m => `<mark>${m}</mark>`);
    snips.push(snip);
    pos = idx + query.length;
  }
  return snips;
}

function countMatches(text, query) {
  return (text.match(new RegExp(escapeRe(query), 'gi')) || []).length;
}

function fullTextSearch(query) {
  if (!query || query.length < 2) return [];
  const results = [];
  for (const doc of docs) {
    const content = mdContents[doc.file] || '';
    const titleHit = doc.name.toLowerCase().includes(query.toLowerCase());
    const bodyHit  = content.toLowerCase().includes(query.toLowerCase());
    if (titleHit || bodyHit) {
      results.push({
        doc,
        count: countMatches(content, query),
        snippets: bodyHit ? getSnippets(content, query) : []
      });
    }
  }
  results.sort((a, b) => b.count - a.count);
  return results;
}

/* ── render search panel ── */
function renderSearchResults(q) {
  const panel  = document.getElementById('searchResults');
  const header = document.getElementById('srHeader');
  const body   = document.getElementById('srBody');
  if (!q || q.length < 2) { panel.classList.remove('show'); return; }

  const results = fullTextSearch(q);
  panel.classList.add('show');
  if (!results.length) {
    header.textContent = '全文搜尋結果：無命中';
    body.innerHTML = `<div class="sr-none">找不到包含「${q}」的條文</div>`;
    return;
  }
  header.textContent = `全文搜尋「${q}」— 命中 ${results.length} 份文件`;
  body.innerHTML = results.map(({ doc, count, snippets }) => `
    <div class="sr-item" onclick="openDoc('${doc.file}','${doc.name}')">
      <div class="sr-doc-name">
        <span class="sr-code">${doc.num}</span>
        <span>${doc.name}</span>
        <span class="sr-count">共 ${count} 處</span>
      </div>
      ${snippets.map(s => `<div class="sr-snippet">${s}</div>`).join('')
        || '<div class="sr-snippet" style="color:#9ca3af">（命中標題）</div>'}
    </div>`).join('');
}

    empty.style.display = 'block';
    stats.textContent = '顯示 0 份文件';
    return;
  }
  empty.style.display = 'none';
  stats.textContent = `顯示 ${data.length} / ${docs.length} 份文件`;
  tbody.innerHTML = data.map(d => `
    <tr>
      <td class="num-cell">${d.num}</td>
      <td><span class="doc-link" onclick="openDoc('${d.file}','${d.name}')">${d.name}</span></td>
      <td><span class="category">${d.category}</span></td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td class="hide-mobile" style="color:#9ca3af;font-size:.84rem">${d.version}</td>
    </tr>`).join('');
}

function onSearch() {
  const q = (document.getElementById('searchInput').value || '').trim();
  renderTable(getFiltered());
  renderSearchResults(q);
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  onSearch();
}

/* ── viewer ── */
function openDoc(file, name) {
  if (location.protocol === 'file:') { window.open(file, '_blank'); return; }
  const overlay = document.getElementById('viewer-overlay');
  const content = document.getElementById('viewer-content');
  document.getElementById('viewer-title').textContent = name;
  content.innerHTML = '<div id="viewer-loading">載入中…</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  fetch(file)
    .then(r => { if (!r.ok) throw new Error('無法載入文件'); return r.text(); })
    .then(md => { content.innerHTML = marked.parse(md); content.scrollTop = 0; })
    .catch(e  => { content.innerHTML = `<p style="color:#dc2626">載入失敗：${e.message}</p>`; });
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('viewer-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

renderTable(docs);
</script>
</body>
</html>
