<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>和境心見社區 — 管理辦法總索引</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* ══ Reset & Base ══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f5f6fa;
      color: #2c2c3a;
      min-height: 100vh;
      font-size: 16px;
    }

    /* ══ Header ══ */
    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      color: white;
      padding: 1.8rem 2.5rem 1.4rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .3rem; line-height: 1.3; }
    header p  { font-size: .88rem; opacity: .8; }

    /* ══ Toolbar ══ */
    .toolbar {
      background: white;
      border-bottom: 1px solid #e0e4ed;
      padding: .85rem 2.5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: .55rem .9rem .55rem 2.2rem;
      border: 1px solid #ccd3e0;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      background: #fafbfd;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap input:focus {
      border-color: #2d6a9f;
      background: white;
      box-shadow: 0 0 0 3px rgba(45,106,159,.12);
    }
    .search-icon {
      position: absolute;
      left: .65rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: .95rem;
      pointer-events: none;
    }
    .filter-btns { display: flex; gap: .45rem; flex-wrap: wrap; }
    .filter-btns button {
      padding: .38rem .85rem;
      border: 1px solid #ccd3e0;
      border-radius: 20px;
      background: white;
      font-size: .84rem;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btns button:hover  { background: #eef3fb; border-color: #2d6a9f; }
    .filter-btns button.active { background: #2d6a9f; color: white; border-color: #2d6a9f; }

    /* ══ Main ══ */
    main { padding: 1.6rem 2.5rem 2rem; }
    .stats { font-size: .84rem; color: #6b7280; margin-bottom: 1rem; }

    /* ══ Full-text search results ══ */
    #searchResults {
      display: none;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 8px rgba(0,0,0,.08);
      margin-bottom: 1.4rem;
      overflow: hidden;
    }
    #searchResults.show { display: block; }
    .sr-header {
      background: #f0f4fb;
      padding: .65rem 1.1rem;
      font-size: .84rem;
      font-weight: 600;
      color: #1a3a5c;
      border-bottom: 1px solid #e4e8f0;
    }
    .sr-item {
      padding: .85rem 1.1rem;
      border-bottom: 1px solid #f0f2f8;
      cursor: pointer;
      transition: background .12s;
    }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover { background: #f8faff; }
    .sr-item:active { background: #eef3fb; }
    .sr-doc-name {
      font-size: .88rem;
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: .3rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: .3rem;
    }
    .sr-code {
      font-family: monospace;
      font-size: .78rem;
      background: #e0f2fe;
      color: #0369a1;
      padding: .1rem .4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .sr-count { font-size: .76rem; color: #9ca3af; }
    .sr-snippet {
      font-size: .82rem;
      color: #6b7280;
      line-height: 1.55;
      margin-top: .2rem;
    }
    .sr-snippet mark {
      background: #fef08a;
      color: #2c2c3a;
      border-radius: 2px;
      padding: 0 2px;
    }
    .sr-none {
      padding: 1.2rem 1.1rem;
      font-size: .88rem;
      color: #9ca3af;
      text-align: center;
    }

    /* ══ Table ══ */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    table {
      width: 100%;
      min-width: 480px;
      border-collapse: collapse;
      background: white;
    }
    thead tr { background: #f0f4fb; }
    th {
      text-align: left;
      padding: .75rem 1rem;
      font-size: .79rem;
      font-weight: 600;
      color: #556;
      letter-spacing: .03em;
      border-bottom: 1px solid #e4e8f0;
      white-space: nowrap;
    }
    td {
      padding: .88rem 1rem;
      border-bottom: 1px solid #f0f2f8;
      vertical-align: middle;
      font-size: .91rem;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }

    .col-num   { width: 4.2rem; text-align: center; }
    .col-ver   { width: 4.5rem; }
    .col-cat   { width: 6rem; }
    .col-sta   { width: 4rem; }

    .num-cell {
      font-family: monospace;
      font-size: .82rem;
      font-weight: 600;
      color: #6b7280;
      text-align: center;
    }
    .doc-link {
      color: #1a3a5c;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .doc-link:hover { color: #2d6a9f; text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: .18rem .55rem;
      border-radius: 12px;
      font-size: .77rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-草擬 { background: #e0f2fe; color: #0369a1; }
    .badge-正式 { background: #dcfce7; color: #166534; }
    .badge-罰則 { background: #fee2e2; color: #991b1b; }
    .category {
      font-size: .78rem;
      color: #6b7280;
      background: #f3f4f6;
      padding: .15rem .5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: .95rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .8rem;
      color: #9ca3af;
    }

    /* ══ Viewer Overlay ══ */
    #viewer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #viewer-overlay.open { display: flex; }
    #viewer-box {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      min-height: 200px;
      box-shadow: 0 8px 40px rgba(0,0,0,.22);
      display: flex;
      flex-direction: column;
    }
    #viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e4e8f0;
      background: #f8faff;
      border-radius: 12px 12px 0 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #viewer-title {
      font-size: .98rem;
      font-weight: 600;
      color: #1a3a5c;
      flex: 1;
      min-width: 0;
      word-break: break-all;
    }
    #viewer-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6b7280;
      line-height: 1;
      padding: .2rem .5rem;
      border-radius: 6px;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    #viewer-close:hover { background: #f0f2f8; color: #2c2c3a; }
    #viewer-content {
      padding: 1.8rem 2.2rem 2.5rem;
      line-height: 1.9;
      color: #2c2c3a;
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* Markdown styles */
    #viewer-content h1 {
      font-size: 1.35rem; font-weight: 700; color: #1a3a5c;
      margin-bottom: 1rem; padding-bottom: .5rem;
      border-bottom: 2px solid #e4e8f0;
    }
    #viewer-content h2 {
      font-size: 1.05rem; font-weight: 700; color: #1a3a5c;
      margin: 1.8rem 0 .6rem; padding-left: .7rem;
      border-left: 4px solid #2d6a9f;
    }
    #viewer-content h3 {
      font-size: .98rem; font-weight: 600; color: #2d4a6a;
      margin: 1.2rem 0 .4rem;
    }
    #viewer-content p { margin: .5rem 0; }
    #viewer-content strong { color: #1a3a5c; }
    #viewer-content hr { border: none; border-top: 1px solid #e4e8f0; margin: 1.2rem 0; }
    #viewer-content ul, #viewer-content ol { padding-left: 1.5rem; margin: .4rem 0; }
    #viewer-content li { margin: .3rem 0; }
    #viewer-content table {
      border-collapse: collapse; width: 100%; margin: .8rem 0;
      font-size: .88rem; display: block; overflow-x: auto;
    }
    #viewer-content th, #viewer-content td {
      border: 1px solid #e4e8f0; padding: .45rem .75rem; text-align: left;
    }
    #viewer-content th { background: #f0f4fb; font-weight: 600; }
    #viewer-content em { color: #6b7280; font-size: .9rem; }
    #viewer-loading { text-align: center; padding: 3rem; color: #9ca3af; }

    /* ══════════════════════════════
       MOBILE  (≤ 640px)
    ══════════════════════════════ */
    @media (max-width: 640px) {
      header { padding: 1.2rem 1.1rem 1rem; }
      header h1 { font-size: 1.15rem; }
      header p { font-size: .8rem; }

      .toolbar {
        padding: .7rem 1rem;
        flex-direction: column;
        align-items: stretch;
        gap: .6rem;
      }
      .search-wrap { min-width: 0; }
      .search-wrap input { font-size: .9rem; }
      .filter-btns { justify-content: flex-start; }
      .filter-btns button { font-size: .8rem; padding: .32rem .75rem; }

      main { padding: 1rem 1rem 1.5rem; }

      /* hide 版本 column on mobile */
      .col-ver, .hide-mobile { display: none; }

      td, th { padding: .75rem .7rem; }
      td { font-size: .87rem; }
      .num-cell { font-size: .78rem; }

      /* sr panel */
      .sr-item { padding: .75rem .9rem; }
      .sr-doc-name { font-size: .85rem; }
      .sr-snippet { font-size: .79rem; }

      /* viewer full-screen on mobile */
      #viewer-overlay {
        padding: 0;
        align-items: stretch;
      }
      #viewer-box {
        border-radius: 0;
        min-height: 100vh;
        max-width: 100%;
      }
      #viewer-header { padding: .85rem 1rem; border-radius: 0; }
      #viewer-title { font-size: .9rem; }
      #viewer-content { padding: 1.2rem 1.1rem 2rem; }
      #viewer-content h1 { font-size: 1.1rem; }
      #viewer-content h2 { font-size: .95rem; }
      #viewer-content h3 { font-size: .9rem; }
    }

    /* ══════════════════════════════
       TABLET  (641px – 1024px)
    ══════════════════════════════ */
    @media (min-width: 641px) and (max-width: 1024px) {
      header { padding: 1.5rem 1.8rem 1.2rem; }
      .toolbar { padding: .8rem 1.8rem; }
      main { padding: 1.4rem 1.8rem 2rem; }
      #viewer-overlay { padding: 1.5rem .75rem; }
    }
  </style>
</head>
<body>

    <div style="background:#1e3a5f;color:#fff;padding:10px 20px;text-align:center;font-size:14px;letter-spacing:0.5px;">
      ⚖️ 母法參考：

         style="color:#aaddff;font-size:12px;">
        法務部全國法規資料庫
      </a>
    </div>

<header>
  <h1>和境心見社區 — 管理辦法總索引</h1>
  <p>共 15 份管理辦法（A01–K01）｜ 最後更新：2026-04-26</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋辦法名稱或條文關鍵字…" oninput="onSearch()" autocomplete="off" />
  </div>
  <div class="filter-btns">
    <button class="active" onclick="setFilter('all', this)">全部</button>
    <button onclick="setFilter('草擬', this)">草擬</button>
    <button onclick="setFilter('正式', this)">正式</button>
    <button onclick="setFilter('罰則', this)">罰則</button>
  </div>
</div>

<main>
  <div class="stats" id="stats"></div>

  <div id="searchResults">
    <div class="sr-header" id="srHeader"></div>
    <div id="srBody"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-num">編號</th>
          <th>管理辦法名稱</th>
          <th class="col-cat">類別</th>
          <th class="col-sta">狀態</th>
          <th class="col-ver hide-mobile">版本</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="empty" id="emptyMsg" style="display:none;">查無符合條件的文件</div>
</main>

<footer>和境心見社區管委會@2026</footer>

<div id="viewer-overlay">
  <div id="viewer-box">
    <div id="viewer-header">
      <span id="viewer-title"></span>
      <button id="viewer-close" onclick="closeViewer()" aria-label="關閉">✕</button>
    </div>
    <div id="viewer-content">
      <div id="viewer-loading">載入中…</div>
    </div>
  </div>

<script>
const mdContents = {"和境心見社區-A01-管理委員會組織與運作辦法(草擬).md": "# 和境心見社區 — 管理委員會組織與運作辦法（草擬）\n\n**文件編號：** A01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為健全本社區管理委員會（以下簡稱管委會）之組織架構、明確職權分工、規範委員選任及會議運作，確保管委會依法合規、有效執行社區管理事務，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》（民國 84 年制定，歷次修正）\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、相關行政命令及主管機關解釋函令\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區管委會全體委員、主任委員（以下簡稱主委）、副主任委員（以下簡稱副主委）、監察委員（以下簡稱監委）及總幹事，凡涉及管委會組織、選任、職務執行及會議運作者，均依本辦法辦理。\n\n### 第四條（名詞定義）\n\n一、**管委會**：依規約及條例組成，負責執行區分所有權人會議決議及處理社區日常管理事務之機構。\n\n二、**主委**：管委會之當然代表人及主持人，對外代表社區處理公務。\n\n三、**副主委**：輔佐主委，於主委不能執行職務時代行其職務。\n\n四、**監委**：負責監督管委會財務收支及業務執行之委員。\n\n五、**總幹事**：由管委會聘任，負責執行日常管理業務之專業人員。\n\n\n---\n\n\n## 第二章 委員組成與選任\n\n\n---\n\n### 第五條（委員人數及任期）\n\n一、本社區管委會委員人數依住戶管理規約規定辦理，原則上設委員七至十一人，監察委員一至三人。\n\n二、委員任期為一年，得連選連任，但主委連任以二屆為限。\n\n三、委員任期屆滿前三十日，應召開區分所有權人會議完成改選。\n\n### 第六條（委員資格）\n\n一、凡本社區區分所有權人或其配偶、直系親屬，且實際居住或使用該戶者，具備委員候選資格。\n\n二、有下列情形之一者，不具委員資格：\n\n（一）欠繳管理費連續三個月以上，且未與管委會達成分期還款協議者。\n\n（二）曾因違規行為受管委會書面警告未改善，尚在紀錄期間者。\n\n（三）依法受監護宣告或輔助宣告尚未撤銷者。\n\n三、委員當選後，如發生前項各款情形，應自動辭職；拒不辭職者，由管委會決議解除其職務。\n\n### 第七條（主委、副主委及監委之選任）\n\n一、主委、副主委由全體委員互選產生，選任後應於七日內向主管機關辦理報備。\n\n二、監委由區分所有權人選任，不得兼任管委會委員。\n\n三、主委出缺時，由副主委代理，副主委亦出缺時，由全體委員互推一人代理，並於三十日內補選。\n\n### 第八條（委員辭職與補選）\n\n一、委員因故辭職，應以書面通知主委，自通知到達日起辭職生效。\n\n二、委員出缺達委員總額三分之一時，應於六十日內召開臨時區分所有權人會議補選之。\n\n三、補選委員之任期至原任期屆滿之日止。\n\n\n---\n\n\n## 第三章 委員職責\n\n\n---\n\n### 第九條（主委職責）\n\n主委應執行下列職務：\n\n一、召集並主持管委會議及臨時管委會議。\n\n二、對外代表管委會簽署公文、合約及相關法律文件。\n\n三、監督總幹事執行日常管理業務。\n\n四、處理社區緊急事故，必要時得先行決定應變措施，事後提報管委會追認。\n\n五、執行區分所有權人會議及管委會決議事項。\n\n### 第十條（副主委職責）\n\n一、輔佐主委處理社區管理事務。\n\n二、主委因故不能執行職務時，全權代理主委職務。\n\n三、受主委委託，執行特定管理業務。\n\n### 第十一條（監委職責）\n\n一、監督管委會財務收支，核閱每月財務報告。\n\n二、審查年度決算報告，並向區分所有權人會議提出審查意見。\n\n三、發現管委會有違規或不當行為時，應即通知主委改善，情節重大者得要求召開臨時區分所有權人會議。\n\n四、監委不得參與管委會日常決議，但得列席管委會議。\n\n### 第十二條（一般委員職責）\n\n一、出席管委會議，參與決議。\n\n二、依主委指派，分工負責特定管理業務（如：設施維護、停車管理等）。\n\n三、反映住戶意見，促進管委會與住戶間之溝通。\n\n四、對社區公共事務負有積極參與之義務。\n\n\n---\n\n\n## 第四章 管委會議\n\n\n---\n\n### 第十三條（例行會議）\n\n一、管委會例行會議每月至少召開一次，由主委召集並主持。\n\n二、例行會議應於召開七日前以書面或電子郵件通知全體委員，通知應載明會議時間、地點及議程。\n\n三、例行會議出席委員人數應達委員總額二分之一以上，方得召開；議案之通過應有出席委員過半數之同意。\n\n### 第十四條（臨時會議）\n\n一、有下列情形之一時，主委得召集臨時管委會議：\n\n（一）社區發生緊急事故，需立即決議處理者。\n\n（二）有委員三分之一以上聯署請求召開者。\n\n（三）監委依職權通知召開者。\n\n二、臨時會議得以電話、通訊軟體等方式緊急通知，惟應於會後七日內補發書面紀錄。\n\n### 第十五條（決議效力與迴避）\n\n一、管委會議決議須有出席委員過半數同意；正反票數相同時，由主委裁決。\n\n二、委員於特定議案有自身利益衝突者，應主動申報並迴避該議案之討論及表決，不計入出席人數。\n\n三、管委會決議不得牴觸區分所有權人會議之決議或現行法令規定。\n\n### 第十六條（會議紀錄）\n\n一、每次管委會議應製作會議紀錄，記載出席人員、討論事項、決議結果及執行期限。\n\n二、會議紀錄應於會後七日內完成，由主委及記錄人員簽名確認後，公告於社區公布欄至少七日，並保存備查。\n\n三、會議紀錄至少保存五年。\n\n\n---\n\n\n## 第五章 違規處理\n\n\n---\n\n### 第十七條（委員違規之認定）\n\n委員有下列行為之一者，視為違規：\n\n一、無故缺席例行會議連續三次以上。\n\n二、於執行職務時洩漏住戶個人資料或社區機密文件。\n\n三、藉職務之便謀取私利，或對承包商施以不當壓力。\n\n四、未依本辦法規定迴避利益衝突之議案。\n\n### 第十八條（違規之處理程序）\n\n一、委員違規情事，由監委或三分之一以上委員提出，交管委會議討論。\n\n二、被提出之委員應有陳述意見之機會，陳述期限不得少於七日。\n\n三、管委會議得依情節輕重，作成下列決議：\n\n（一）書面警告，要求限期改善。\n\n（二）暫停特定職務之執行。\n\n（三）提請臨時區分所有權人會議討論解除委員職務。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十九條（費用申報）\n\n委員因執行職務所生之必要費用（如：參加主管機關辦理之教育訓練、代表社區出席相關會議之交通費），得依實支實付原則向管委會申請核銷，單筆超過新臺幣一千元者須附單據。\n\n### 第二十條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。如涉及委員任期、選任方式等基本事項之修正，應提請區分所有權人會議決議。\n\n### 第二十一條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-A02-區分所有權人會議管理辦法(草擬).md": "# 和境心見社區 — 區分所有權人會議管理辦法（草擬）\n\n**文件編號：** A02\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為規範本社區區分所有權人會議（以下簡稱區權人會議）之召集程序、會議運作及決議效力，確保全體區分所有權人之參與權及知情權，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 25 條至第 32 條\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、相關主管機關解釋令及行政函釋\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體區分所有權人，凡涉及區權人會議之召集、出席、表決及決議執行者，均依本辦法辦理。\n\n### 第四條（名詞定義）\n\n一、**區分所有權人**：持有本社區各戶或停車位所有權狀者，簡稱所有權人。\n\n二、**應有部分**：所有權人依法持有之公共設施持分比例。\n\n三、**委任書**：所有權人委任他人代為出席並行使表決權之書面授權文件。\n\n四、**書面決議**：依法以書面徵詢方式取代召開實體會議所作成之決議。\n\n\n---\n\n\n## 第二章 會議類型與召集\n\n\n---\n\n### 第五條（會議類型）\n\n區權人會議分為下列兩種：\n\n一、**定期會議**：每年至少召開一次，通常於每年第一季或依規約規定之期間召開。\n\n二、**臨時會議**：有下列情形之一時召開：\n\n（一）管委會認有必要者。\n\n（二）區分所有權人五分之一以上及其應有部分合計五分之一以上，連署請求召集者。\n\n（三）監察委員依職權請求召開者。\n\n### 第六條（召集程序）\n\n一、定期會議由管委會主委召集；臨時會議由主委或依前條規定請求之人召集。\n\n二、召集通知應於會議召開十五日前，以書面方式寄達全體區分所有權人，通知應載明：\n\n（一）召集事由\n\n（二）會議時間、地點\n\n（三）議程（含所有提案事項）\n\n（四）出席或委任方式說明\n\n三、緊急情況下召開之臨時會議，通知期間得縮短為七日，但應於通知中說明緊急原因。\n\n### 第七條（書面決議之使用）\n\n一、下列事項得以書面決議方式辦理，無需召開實體會議：\n\n（一）管委會依法應提報區權人會議追認之緊急處置。\n\n（二）輕微規約修正，不涉及住戶權益重大變更者（須全體住戶四分之三以上同意）。\n\n二、書面決議應於截止日期前送達全體區分所有權人，並自截止日起三十日內統計結果公告。\n\n\n---\n\n\n## 第三章 出席與表決\n\n\n---\n\n### 第八條（出席門檻）\n\n一、區權人會議之召開，應有區分所有權人三分之一以上及其應有部分三分之一以上出席，方得開議。\n\n二、未達前項門檻時，主席得宣布延會，並於一小時內依原通知之時間、地點再次召開；第二次召集仍未達出席門檻時，得以實際出席人數開議，但決議事項以普通決議為限。\n\n### 第九條（表決權之計算）\n\n一、每一區分所有權人之表決權，依其應有部分比例計算，另依規約規定每戶亦各享有一票之人頭票，兩者取其多者適用。\n\n二、同一區分所有權人持有多戶者，其表決權依各戶應有部分合計計算，但人頭票不重複計算。\n\n### 第十條（委任出席）\n\n一、所有權人無法親自出席時，得出具委任書，委任成年之家屬或其他區分所有權人代理出席。\n\n二、受委任人以代理一人為限，委任書應記載委任事項、範圍及授權期限，並由委任人簽名或蓋章。\n\n三、現場無法確認委任書真實性時，主席得要求受委任人提出補充證明，確認無誤後方得入場。\n\n### 第十一條（普通決議）\n\n普通決議由出席之區分所有權人及其應有部分各過半數同意通過，適用於下列事項：\n\n一、管委會工作報告之審查。\n\n二、年度收支決算之承認。\n\n三、一般管理事項之決定。\n\n四、除特別決議以外之其他事項。\n\n### 第十二條（特別決議）\n\n特別決議須由全體區分所有權人四分之三以上及其應有部分四分之三以上同意通過，適用於下列事項：\n\n一、規約之制定或修正。\n\n二、公共設施重大改建或增設。\n\n三、拆除或重建建築物（須依條例第 13 條規定辦理）。\n\n四、其他法令規定應以特別決議通過之事項。\n\n\n---\n\n\n## 第四章 會議進行\n\n\n---\n\n### 第十三條（會議主席）\n\n一、區權人會議由主委擔任主席；主委未出席時，由副主委擔任；副主委亦未出席時，由出席所有權人互推一人擔任。\n\n二、主席負責維持會議秩序，決定議程之進行方式，並於表決結果相同時行使裁決權。\n\n### 第十四條（議事規則）\n\n一、發言應舉手示意，經主席許可後方得發言，每人每次發言以五分鐘為限。\n\n二、議案之修正動議，應於原案表決前提出，並有出席人數十分之一以上附議。\n\n三、程序動議（如：延期表決、散會等）得優先處理。\n\n### 第十五條（投票方式）\n\n一、一般事項以舉手或口頭方式表決。\n\n二、選任委員及監委，應以無記名投票方式辦理。\n\n三、出席人數十分之一以上要求記名投票時，主席應依請求辦理。\n\n### 第十六條（會議紀錄與公告）\n\n一、會議紀錄應於會後十四日內完成，由主席及紀錄人員簽名確認。\n\n二、會議紀錄應公告於社區公布欄至少三十日，並以書面或電子方式通知全體所有權人，無法送達者以公告代替通知。\n\n三、所有區權人會議紀錄應永久保存，並配合每次會議整理成冊，由管委會妥善保管。\n\n\n---\n\n\n## 第五章 決議執行與異議\n\n\n---\n\n### 第十七條（決議之執行）\n\n一、區權人會議決議，由管委會負責執行，並於決議後三十日內提出執行計畫。\n\n二、執行結果應於下次區權人會議中報告，或另行公告。\n\n三、決議之執行不得違反法令或侵害個別所有權人之合法權益。\n\n### 第十八條（決議之異議）\n\n一、所有權人對會議召集程序或決議方法有異議者，得於決議後三個月內，提起確認之訴或撤銷之訴。\n\n二、異議之所有權人應先以書面向管委會表達異議，管委會應於三十日內書面回覆。\n\n三、所有權人之異議不影響決議之效力，但法院判決確定前管委會應審慎評估是否暫緩執行。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十九條（會議費用）\n\n區權人會議相關費用（場地租借、通知郵寄等必要支出）由管理費支應，並列入年度預算。\n\n### 第二十條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。本辦法涉及區權人會議召集程序之重大修正，應提請區權人會議決議。\n\n### 第二十一條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-A03-管理委員會交接與移交作業辦法(草擬).md": "# 和境心見社區 — 管理委員會交接與移交作業辦法（草擬）\n\n**文件編號：** A03\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為確保本社區管理委員會（以下簡稱管委會）換屆交接作業之完整性、連續性及合法性，防範財務不清、資料遺失或業務中斷等風險，特制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 29 條第 2 項\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、A01 管理委員會組織與運作辦法\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區管委會全體委員、主任委員（主委）、副主任委員（副主委）、監察委員（監委）及總幹事，凡涉及任期屆滿、委員辭職、解職或其他原因所發生之職務移交，均依本辦法辦理。\n\n### 第四條（名詞定義）\n\n一、**交接期間**：自新任管委會選出之日起，至完成全部移交作業止，原則上不得超過三十日。\n\n二、**移交清冊**：記載所有應移交事項之書面清單，須由卸任主委及新任主委共同簽署確認。\n\n三、**移交監督人**：由監委擔任，負責全程監督移交作業之公正性及完整性。\n\n\n---\n\n\n## 第二章 移交事項範圍\n\n\n---\n\n### 第五條（財務事項之移交）\n\n下列財務相關事項，卸任管委會應完整移交：\n\n一、社區管理費帳戶、公共基金帳戶及所有存摺（含網路銀行帳號、密碼及印鑑）。\n\n二、截至移交日之財務結算報告，含應收未收管理費清單及應付未付款項明細。\n\n三、現金零用金（如有），應核實清點，以盤點單為憑。\n\n四、未結之應付帳款、合約義務及預付費用說明。\n\n五、最近三年之財務帳冊、憑證、傳票及相關報表。\n\n### 第六條（合約文件之移交）\n\n下列合約及協議文件須完整移交：\n\n一、清潔、保全、電梯維保、消防、水電等各項服務合約正本。\n\n二、保險合約及保單正本。\n\n三、尚在履約期間之承攬合約及施工合約。\n\n四、各合約之聯絡廠商資訊、合約到期日及注意事項說明。\n\n### 第七條（印信及鑰匙之移交）\n\n一、管委會印章、主委印章（如有）及相關官方文件用印。\n\n二、社區各公共設施之備用鑰匙，含機房、電梯機坑、屋頂、地下室管理室等。\n\n三、門禁系統管理員帳號、密碼及相關設備控制器。\n\n四、監控攝影系統之管理帳號及密碼。\n\n### 第八條（行政文件之移交）\n\n一、住戶名冊（含區分所有權人資料及租戶登記資料）。\n\n二、歷屆區權人會議及管委會議紀錄（至少五年）。\n\n三、歷年公告、通知、函文及往來信件存檔。\n\n四、政府主管機關函文及歷年報備資料。\n\n五、各類管理辦法、社區規約及相關法規彙整。\n\n六、違規記錄及尚未結案之申訴案件。\n\n七、工程維修紀錄及設備履歷。\n\n\n---\n\n\n## 第三章 移交作業程序\n\n\n---\n\n### 第九條（移交前準備）\n\n一、卸任主委應於任期屆滿前二十日，開始整理各項移交文件，並製作「移交清冊初稿」。\n\n二、移交清冊初稿應涵蓋第五條至第八條所列全部事項，並逐項說明現況。\n\n三、卸任主委應通知監委擔任移交監督人，並告知新任主委（或候任主委）移交時間表。\n\n### 第十條（移交清點作業）\n\n一、移交清點應由下列人員共同在場辦理：\n\n（一）卸任主委（或其指定之卸任委員）\n\n（二）新任主委（或其指定之新任委員）\n\n（三）移交監督人（監委）\n\n（四）總幹事（協助確認及說明）\n\n二、清點過程應逐項核對，如有疑義應當場提出，並記載於移交紀錄。\n\n三、財務清點應於銀行營業時間內至銀行當面辦理帳戶管理員更換手續，確保帳戶控制權即時移轉。\n\n### 第十一條（移交文件之簽署）\n\n一、移交清冊應於所有事項清點完畢後，由卸任主委、新任主委及監委共同簽署確認，一式三份，各存一份。\n\n二、移交清冊確認後，即視為移交完成，新任管委會承接全部管理責任。\n\n三、如有事項無法於規定期限內完成移交（如訴訟中文件、尚未收回之押金等），應在移交清冊中載明原因及後續處理計畫，由新任管委會繼續追蹤。\n\n### 第十二條（移交期限）\n\n一、一般換屆交接，應自新任委員選出之日起三十日內完成全部移交作業。\n\n二、委員因故中途辭職或解職，應於離職後十四日內完成個人保管事項之移交。\n\n三、超過前述期限仍未完成移交者，移交監督人應向區權人會議報告，必要時依法追究責任。\n\n\n---\n\n\n## 第四章 移交後之責任歸屬\n\n\n---\n\n### 第十三條（卸任委員之義務）\n\n一、移交完成後，卸任委員仍應保守在任期間所知悉之住戶個人資料及社區機密，不得洩漏或不當使用。\n\n二、卸任委員如知悉有未完成或未揭露之事項，應主動通知新任管委會，不得隱匿。\n\n三、移交清冊簽署後，如發現卸任委員隱匿或偽造資料，新任管委會得依法追究民事損害賠償責任。\n\n### 第十四條（新任委員之義務）\n\n一、新任管委會承接移交後，應於七日內完成對各事項之初步盤點確認，如有遺漏或不符，應立即告知卸任主委及移交監督人。\n\n二、移交紀錄簽署後七日內若未提出異議，視為承認移交完整，不得再向卸任委員追究責任（但卸任委員故意隱匿者不在此限）。\n\n\n---\n\n\n## 第五章 違規處理\n\n\n---\n\n### 第十五條（移交遲延之處理）\n\n一、卸任委員無正當理由逾期未完成移交者，移交監督人應提報區權人會議，並得依法聲請法院命其履行移交義務。\n\n二、因移交遲延導致社區管理業務中斷或損害者，遲延之卸任委員應負賠償責任。\n\n### 第十六條（移交文件不完整之處理）\n\n一、發現移交文件有缺漏或毀損，且確認係卸任委員責任者，新任管委會應要求限期補件；逾期不補者，得函請主管機關協處。\n\n二、財務帳目有不符情形，應交由專業會計人員查核，如有舞弊情事，應移送司法機關處理。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十七條（移交紀錄之保存）\n\n移交清冊及相關紀錄應由管委會永久保存，每次換屆均另行製作，不得覆蓋或銷毀。\n\n### 第十八條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十九條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-B01-住戶規約與各項管理辦法適用準則(草擬).md": "# 和境心見社區 — 住戶規約與各項管理辦法適用準則（草擬）\n\n**文件編號：** B01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n本準則作為本社區各項管理辦法之母法，用以明確本社區住戶管理規約、各項管理辦法之位階關係、適用順序及解釋原則，確保各辦法間不相牴觸，並保障全體住戶之合法權益。\n\n### 第二條（法律依據）\n\n本準則依下列法規制定：\n\n一、《公寓大廈管理條例》全文\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、相關法院判決及主管機關解釋函令\n\n### 第三條（適用範圍）\n\n本準則適用於本社區全體區分所有權人、住戶、承租人、使用人及其訪客，對本社區現行及未來制定之一切管理辦法，均依本準則之規定解釋與適用。\n\n### 第四條（位階體系）\n\n本社區管理文件之效力位階由高至低如下：\n\n一、**第一位階**：現行法令（《公寓大廈管理條例》、《建築法》、《消防法》及其他相關法規）\n\n二、**第二位階**：本社區住戶管理規約（114 年正式版）\n\n三、**第三位階**：區分所有權人會議決議\n\n四、**第四位階**：管委會通過之各項管理辦法（含本準則及 A01 至 K01 各辦法）\n\n五、**第五位階**：管委會發布之公告、通知及函文\n\n各位階文件不得牴觸上位法；如有牴觸，以上位法為準。\n\n\n---\n\n\n## 第二章 管理辦法之制定與修正\n\n\n---\n\n### 第五條（管理辦法之制定程序）\n\n一、管理辦法草案由管委會起草，提交管委會議討論，以委員過半數同意通過後公告施行。\n\n二、涉及住戶權益重大事項（如：罰款基準、使用限制等），應於公告後保留十四日之意見徵詢期，彙整意見後視需要修正再公告。\n\n三、涉及規約修正事項，依 A02 辦法召開區權人會議以特別決議辦理。\n\n### 第六條（管理辦法之修正程序）\n\n一、管理辦法之修正，由管委會委員二人以上提案，或由五位以上住戶聯署提案。\n\n二、提案應以書面敘明修正理由及修正對照表，送交主委後列入最近一次管委會議議程。\n\n三、修正案通過後，依第五條相同程序公告施行。\n\n### 第七條（管理辦法之廢止）\n\n一、管理辦法之廢止，須有管委會議出席委員三分之二以上同意。\n\n二、廢止前應評估是否有替代措施，以避免出現管理真空。\n\n三、廢止後應於公布欄公告，並更新社區文件索引。\n\n\n---\n\n\n## 第三章 適用原則\n\n\n---\n\n### 第八條（特別法優先原則）\n\n同一事項同時有多項辦法規定時，以較具體、特定之辦法優先適用；如停車管理事項，H01 車輛與門禁管理辦法優先於一般性規定。\n\n### 第九條（新法優先原則）\n\n針對同一事項，後制定或修正之辦法優先適用；但若明確指定排除適用之情形除外。\n\n### 第十條（從寬解釋原則）\n\n對住戶課予義務或限制住戶權利之規定，應從嚴解釋，不得類推適用至明文未規範之情形；賦予住戶權利之規定，得從寬解釋。\n\n### 第十一條（比例原則）\n\n管委會依本社區各辦法採取管理或裁罰措施時，應遵守下列原則：\n\n一、所採取之措施應能達成管理目的（適當性）。\n\n二、應選擇對住戶限制最小之措施（必要性）。\n\n三、措施對住戶造成之不利益，不得明顯超過所達成之管理目的（相稱性）。\n\n### 第十二條（正當程序原則）\n\n對住戶採取裁罰或限制措施前，應依下列正當程序辦理：\n\n一、確認違規事實，並留存相關證據。\n\n二、給予住戶至少七日之陳述意見期間。\n\n三、由管委會議作成決議，並以書面通知住戶。\n\n四、告知住戶申訴管道及期限。\n\n\n---\n\n\n## 第四章 住戶之基本權利與義務\n\n\n---\n\n### 第十三條（住戶之基本義務）\n\n本社區全體住戶應遵守下列基本義務：\n\n一、依時繳納管理費及相關費用。\n\n二、遵守社區規約及各項管理辦法。\n\n三、維護公共設施及共用部分之整潔，不得損壞。\n\n四、尊重其他住戶之安寧與隱私。\n\n五、配合管委會執行合法之管理業務。\n\n### 第十四條（住戶之基本權利）\n\n本社區全體住戶享有下列基本權利：\n\n一、依規定正常使用社區公共設施之權利。\n\n二、對管委會決策表達意見及申訴之權利。\n\n三、依規定出席區權人會議並行使表決權（限區分所有權人）。\n\n四、查閱管委會財務報告及會議紀錄之權利（依規定程序申請）。\n\n五、不受歧視，受公平對待之權利。\n\n### 第十五條（租戶之義務）\n\n承租人在租賃期間應遵守本社區規約及各項管理辦法，所有人（區分所有權人）應確保其承租人知悉並遵守相關規定；因承租人違規所致之法律責任，由所有人與承租人連帶負責。\n\n\n---\n\n\n## 第五章 公告與通知\n\n\n---\n\n### 第十六條（公告方式）\n\n管委會發布之管理辦法、公告及通知，依下列方式為之：\n\n一、張貼於社區公布欄（大廳及各樓層公告區）。\n\n二、以書面或電子郵件通知全體住戶。\n\n三、以社區通訊群組或 APP 等數位方式輔助通知。\n\n四、法定應書面通知事項（如裁罰通知），須以掛號郵件或親自送達。\n\n### 第十七條（公告效力）\n\n一、在公布欄張貼公告之日起算三日後，視為已通知全體住戶，住戶不得以不知為由拒絕遵守。\n\n二、個別住戶之裁罰通知，以住戶收受書面通知之日或掛號郵件受取日為準；如住戶拒不收受，以留置通知或公告代替送達。\n\n\n---\n\n\n## 第六章 違規處理\n\n\n---\n\n### 第十八條（本辦法之違規認定）\n\n違反本準則所定之適用原則或正當程序者，管委會所為之決議或措施得被認定無效，受影響之住戶得依第 A02 辦法規定申請區權人會議審查或循法律途徑救濟。\n\n### 第十九條（管委會之責任）\n\n管委會委員執行職務時，如有下列情形，應向社區負損害賠償責任：\n\n一、故意或重大過失違反本準則之規定，導致住戶受有損害者。\n\n二、未依正當程序對住戶實施裁罰，且無法補正者。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第二十條（現行辦法之銜接）\n\n本準則施行前已存在之管理辦法，若未與本準則牴觸，繼續有效；若有牴觸，應於本準則施行後六個月內完成修正，逾期未修正者，以本準則之規定為準。\n\n### 第二十一條（施行日期）\n\n本準則經管委會通過後公告施行，修正時亦同。\n\n### 第二十二條（未盡事宜）\n\n本準則未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-B02-違規管理與裁罰辦法(草擬).md": "# 和境心見社區 — 違規管理與裁罰辦法（草擬）\n\n**文件編號：** B02\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n> ⚠️ **重要法律說明**：依司法實務，規約罰款須經區分所有權人會議決議並明載於規約，方具法律效力。本辦法所列罰款，應於規約修訂時一併載入，始得執行。\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為維護本社區公共秩序、保障全體住戶生命財產安全，並依據《公寓大廈管理條例》相關規定，建立統一、公平、透明之違規處理機制，訂定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 25 條、第 47 條、第 49 條\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、B01 住戶規約與各項管理辦法適用準則\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體區分所有權人、住戶、承租人及訪客，凡在本社區範圍內發生之違規行為，均依本辦法處理。\n\n### 第四條（處理原則）\n\n一、**比例原則**：裁罰措施應與違規情節相符，輕微違規以勸導為優先。\n\n二、**程序正義**：給予住戶陳述意見之機會，重大案件提交管委會決議。\n\n三、**公開透明**：違規記錄依規定公告，維護社區知情權。\n\n四、**罰款用途**：收取之罰款一律存入社區公共基金，不得作其他用途。\n\n\n---\n\n\n## 第二章 管委會處理權限\n\n\n---\n\n### 第五條（兩層處理機制）\n\n本社區違規處理分為兩層：\n\n**第一層（管委會自治執行）：**\n\n一、口頭或書面勸導、警告。\n\n二、限期改善通知。\n\n三、停止或限制違規住戶使用特定公共設施。\n\n四、依規約向違規住戶收取罰款（需載入規約）。\n\n五、代為清除並追償費用。\n\n六、違規記錄公告。\n\n**第二層（向政府主管機關申請執行）：**\n\n一、依《公寓大廈管理條例》第 47、49 條裁處罰鍰。\n\n二、強制執行改善義務。\n\n### 第六條（罰款執行限制）\n\n管委會**不得**採取下列方式強制執行罰款：\n\n一、自住戶管理費中逕行扣抵（須住戶書面同意）。\n\n二、鎖車、扣押財物。\n\n三、斷水、斷電。\n\n如住戶拒繳，管委會得提起民事訴訟請求給付，或拒絕提供相關服務（如車輛移入登記等）。\n\n\n---\n\n\n## 第三章 違規分級與處理流程\n\n\n---\n\n### 第七條（違規分級）\n\n| 分級 | 定義 |\n|------|------|\n| **A 級（輕微）** | 情節輕微、初次發生、未造成立即危害 |\n| **B 級（一般）** | 反覆發生、造成他人困擾或損害公共利益 |\n| **C 級（重大）** | 危及公共安全、造成實際損害、持續拒不改善 |\n\n### 第八條（標準處理流程）\n\n| 步驟 | A 級輕微 | B 級一般 | C 級重大 |\n|------|---------|---------|---------|\n| 第一步 | 口頭勸導 | 書面警告 | 書面警告＋限期改善 |\n| 第二步 | 書面通知限期改善 | 限期改善＋依規約收取罰款 | 停用公共設施＋收取罰款 |\n| 第三步 | 公告違規記錄 | 停用公共設施＋報請主管機關 | 報請主管機關裁罰 |\n| 第四步 | — | 提報管委會決議 | 提起法律訴訟 |\n\n\n---\n\n\n## 第四章 各項違規裁罰基準\n\n\n---\n\n> 以下罰款金額需經區分所有權人會議決議通過後載入規約，方具執行效力。\n\n### 第九條（停車與車輛）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 停車超出格線、壓線影響鄰車 | 口頭勸導 | **500 元／次** | 勸導 3 次後開始計罰 |\n| 佔用他人停車格 | **500 元／次** | **1,000 元／次** | 逾期未移車得申請拖吊，費用自負 |\n| 停車格同時停放汽車＋機車（或腳踏車） | **500 元／次** | **1,000 元／次** | — |\n| 未登記車輛長期占用停車格 | 限期辦理 | **1,000 元／次** | 逾 30 日未辦理視同違規 |\n| 在非指定區域私接電源充電 | **1,000 元／次** | **2,000 元／次** | 涉及消防安全，直接計罰 |\n\n### 第十條（地下室防空避難空間）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 堆放私人雜物、家具、廢棄物 | 通知限 7 日清除 | **500 元／日**（逾期起算） | 代清費用另計 |\n| 停放非汽車車輛 | 通知限 3 日移出 | **500 元／次** | 逾期代為移置，費用自負 |\n| 設置固定或半固定占用設施 | 限期拆除 | **1,000 元／次** | 情節嚴重升 C 級 |\n| 阻塞緊急逃生出口 | **直接移除，不另通知** | 報請消防主管機關 | 不設首次寬限 |\n\n### 第十一條（公共空間與走廊）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 走廊、樓梯間堆放雜物 | 通知限 7 日清除 | **500 元／日**（逾期起算） | 代清費用另計 |\n| 未經許可占用公共空間 | 限期恢復 | **1,000 元／次** | — |\n| 損壞公共設施（非故意） | 要求賠償 | 報請主管機關 | — |\n| 故意毀損公共設施 | **賠償＋2,000 元** | 提起刑事告訴 | C 級，直接計罰 |\n\n### 第十二條（噪音與安寧）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 夜間（22:00—08:00）發出噪音 | 口頭勸導 | 書面警告 | 第 3 次起報請環保主管機關 |\n| 反覆噪音擾鄰（1 個月內 3 次） | 書面警告＋公告 | 報請環保主管機關 | 政府罰鍰 3,000—15,000 元 |\n| 裝修施工超出規定時間 | **1,000 元／次** | **2,000 元／次** | 同時勒令立即停工 |\n\n### 第十三條（裝修與施工）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 未申報逕行施工 | 立即停工＋補辦申報 | **2,000 元** | — |\n| 施工損及公共空間或他戶 | 要求賠償 | 報請主管機關 | C 級 |\n| 施工廢棄物未清理 | 通知限 3 日清除 | **500 元／日**（逾期起算） | — |\n\n### 第十四條（寵物管理）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 未清除寵物排泄物 | 口頭勸導 | 書面警告＋公告 | 第 3 次起報請主管機關 |\n| 寵物於公共空間攻擊他人 | 書面警告＋要求賠償 | 報請主管機關裁罰 | C 級 |\n| 飼養規約禁止之動物種類 | 限期移出 | 報請主管機關（罰 4—20 萬） | 依條例第 49 條裁罰 |\n\n\n---\n\n\n## 第五章 政府主管機關法定罰則（供參）\n\n\n---\n\n### 第十五條（條例第 47 條）\n\n由直轄市、縣（市）主管機關裁處**新臺幣 3,000 元以上 15,000 元以下罰鍰**：\n\n一、住戶違反第 16 條第一項（公共空間使用限制）。\n\n二、住戶違反第 6 條，經通知限期改善屆期仍未改善。\n\n### 第十六條（條例第 49 條）\n\n由直轄市、縣（市）主管機關裁處**新臺幣 4 萬元以上 20 萬元以下罰鍰**，並得連續處罰：\n\n一、住戶違反第 16 條第 2、3 項（飼養動物、丟棄垃圾、排放廢水等）。\n\n二、住戶擅自變更使用（第 8、9、15 條）。\n\n三、區分所有權人未繳納公共基金（第 18 條）。\n\n\n---\n\n\n## 第六章 陳述意見與申訴\n\n\n---\n\n### 第十七條（陳述意見）\n\n管委會發出書面警告或收取罰款前，應給予當事住戶至少**七日**之陳述意見期間。\n\n### 第十八條（申訴管道）\n\n住戶對處理決定有異議，得於收到通知後**十四日內**向主委提出書面申訴，管委會應於**三十日內**書面回覆，並告知申訴結果。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第十九條（違規記錄之保存）\n\n違規記錄應建檔保存，至少保存三年，並依住戶申請提供查閱（當事住戶本人）。\n\n### 第二十條（施行日期）\n\n本辦法經管委會通過後，提送區分所有權人會議決議並載入規約後施行。\n\n### 第二十一條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議及區分所有權人會議決議）*\n", "和境心見社區-C01-財務與預算暨基金管理辦法(草擬).md": "# 和境心見社區 — 財務與預算暨基金管理辦法（草擬）\n\n**文件編號：** C01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為健全本社區財務管理制度，確保管理費及公共基金之收支透明、帳目清晰、資金安全，保障全體住戶之共同財務權益，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 18 條至第 20 條\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、一般公認會計原則（GAAP）之相關規範\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區管委會，凡涉及社區財務收支、帳務處理、預算編製、資金保管及稽核，均依本辦法辦理。\n\n### 第四條（財務負責人）\n\n一、主委為本社區財務之最終負責人，對外代表管委會簽署財務文件。\n\n二、管委會得指定一名財務委員協助主委處理日常財務事務。\n\n三、總幹事負責財務帳目之日常登記、整理及報表製作。\n\n四、監委負責財務之獨立監督，每月核閱財務報告，並於年度決算時出具審查意見。\n\n\n---\n\n\n## 第二章 費用收取\n\n\n---\n\n### 第五條（管理費）\n\n一、管理費依各住戶建物坪數比例計算，或依規約規定之計算方式收取。\n\n二、管理費每月收取一次，繳費截止日為每月十日，逾期加收滯納金（每逾一日按應繳金額萬分之五計算），最高不得超過本金之百分之十。\n\n三、管理費費率之調整，應由管委會提案，經區權人會議普通決議通過後施行。\n\n### 第六條（公共基金）\n\n一、公共基金為依法提撥或區權人會議決議提列之社區儲備資金，用於公共設施重大修繕、緊急支出及其他區權人會議決議之用途。\n\n二、公共基金每年提列標準依規約規定辦理，或由區權人會議決議調整。\n\n三、公共基金帳戶應獨立設立，不得與管理費帳戶混用，動用公共基金應有區權人會議或三分之二以上委員決議同意。\n\n### 第七條（其他收入）\n\n一、設施使用費、場地租借費、廣告收入、違規罰款等其他收入，均應存入管理費帳戶，列入年度收支計算。\n\n二、所有收入均應開立統一收據，不得以私人名義收款。\n\n\n---\n\n\n## 第三章 預算管理\n\n\n---\n\n### 第八條（年度預算之編製）\n\n一、管委會應於每年年底（十二月）前完成次年度收支預算草案，提交區權人會議審議通過。\n\n二、年度預算應包含：\n\n（一）預計管理費收入及其他收入。\n\n（二）各項日常支出（清潔、保全、水電、設備維護等）。\n\n（三）公共基金提列額。\n\n（四）重大工程及設備更新計畫（如有）。\n\n三、預算草案應於區權人會議召開前七日以書面發給全體住戶。\n\n### 第九條（預算之執行）\n\n一、各項支出應在年度預算範圍內執行；超出預算百分之二十以上之單項支出，須提交管委會議追加核准。\n\n二、單筆支出超過新臺幣三萬元者，須取得至少三家廠商報價，並以書面記錄報價比較結果。\n\n三、單筆支出超過新臺幣十萬元者，須依 D01 資產與採購管理辦法之採購程序辦理。\n\n### 第十條（預算之變更）\n\n一、因緊急情況或業務需要，須變更年度預算時，得由管委會議以三分之二以上委員同意通過；變更幅度超過原預算百分之三十時，應於最近一次區權人會議追認。\n\n二、預算變更記錄應保存備查，並於下次區權人會議時報告。\n\n\n---\n\n\n## 第四章 支出管理\n\n\n---\n\n### 第十一條（支出原則）\n\n一、所有支出均須有合法憑證（發票、收據或付款證明）。\n\n二、金額在新臺幣一千元以下之雜項支出，得以白單自製憑證記帳，但每月合計不得超過新臺幣三千元。\n\n三、支出憑證須於發生後三十日內完成報銷，逾期須附說明。\n\n### 第十二條（簽核權限）\n\n| 金額 | 審核層級 |\n|------|---------|\n| 新臺幣 1 萬元以下 | 總幹事審核，主委備查 |\n| 新臺幣 1 萬元至 5 萬元 | 主委審核同意 |\n| 新臺幣 5 萬元至 10 萬元 | 主委及財務委員聯合審核 |\n| 新臺幣 10 萬元以上 | 管委會議決議通過 |\n\n### 第十三條（付款方式）\n\n一、所有支付款項，優先以銀行轉帳或支票方式辦理，以便留存紀錄；超過新臺幣一萬元以上之款項，不得以現金支付。\n\n二、零用金額度最高不得超過新臺幣五千元，由總幹事保管，定期報帳後補足。\n\n\n---\n\n\n## 第五章 帳務與報表\n\n\n---\n\n### 第十四條（帳務處理）\n\n一、所有財務收支應依時序登入帳冊（可使用電子表格或會計軟體），並保留原始憑證。\n\n二、帳目每月結算一次，製作月結報表，報表應包含：\n\n（一）收入明細（管理費、其他收入）。\n\n（二）支出明細（各分類）。\n\n（三）本月淨損益及累計結餘。\n\n（四）管理費帳戶及公共基金帳戶餘額。\n\n### 第十五條（財務報告之公告）\n\n一、月結報表應於每月十五日前完成，由主委確認後公告於社區公布欄及社區通訊群組。\n\n二、年度決算報告應於每年一月三十一日前完成，提交區權人會議審查，並於審查後公告全體住戶。\n\n三、住戶得申請查閱財務帳冊及憑證，申請後管委會應於七日內安排（查閱地點及時間由管委會指定，且須有總幹事在場）。\n\n\n---\n\n\n## 第六章 違規處理\n\n\n---\n\n### 第十六條（管理費拒繳之處理）\n\n一、住戶欠繳管理費，管委會應於逾期後七日內發出書面催繳通知。\n\n二、欠繳管理費連續三個月以上者，管委會得限制其使用特定公共設施（如停車位使用、場地借用等），但不得斷水電或鎖車。\n\n三、欠繳管理費連續六個月以上者，管委會得依法提起民事訴訟請求給付。\n\n### 第十七條（財務舞弊之處理）\n\n一、管委會委員或總幹事如有財務舞弊行為（含挪用公款、偽造憑證等），管委會應立即暫停其職務，並召開臨時區權人會議說明情況。\n\n二、查明有舞弊情事者，應依法移送司法機關追究刑事責任，並提起民事損害賠償訴訟。\n\n三、相關財務損失，優先由責任人賠償，不足之數方由社區保險理賠補足。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第十八條（財務帳冊之保存）\n\n財務帳冊、憑證及報表應至少保存七年；如涉及訴訟，應保存至訴訟終結後五年。\n\n### 第十九條（外部會計查核）\n\n區權人會議得決議委請外部會計師對社區財務進行專案查核，相關費用由管理費支應。\n\n### 第二十條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第二十一條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-D01-資產與採購管理辦法(草擬).md": "# 和境心見社區 — 資產與採購管理辦法（草擬）\n\n**文件編號：** D01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為建立本社區公共資產管理制度，規範採購作業流程，防止資源浪費、確保採購效益，並維護各項公共設備之正常運作，依據本社區住戶管理規約及 C01 財務與預算暨基金管理辦法，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列規範制定：\n\n一、本社區住戶管理規約（114 年正式版）\n\n二、C01 財務與預算暨基金管理辦法\n\n三、《政府採購法》相關原則（參考適用）\n\n### 第三條（適用範圍）\n\n本辦法適用於管委會辦理之一切採購行為，包含設備購置、工程發包、服務委外（清潔、保全、維保等），以及資產之登錄、保管、盤點及報廢。\n\n### 第四條（名詞定義）\n\n一、**公共資產**：本社區共同所有之設備、物品及設施，含維保中之固定資產及消耗性物品。\n\n二、**採購**：以契約取得財物、工程或勞務之行為。\n\n三、**廠商**：與管委會訂立採購合約之自然人、法人或機構。\n\n四、**採購委員**：由管委會指派，負責監督特定採購案之委員。\n\n\n---\n\n\n## 第二章 資產管理\n\n\n---\n\n### 第五條（資產登錄）\n\n一、本社區所有公共資產應登錄於「資產清冊」，記載下列事項：\n\n（一）資產名稱及型號。\n\n（二）取得日期及金額。\n\n（三）保管責任人（通常為總幹事）。\n\n（四）所在位置。\n\n（五）預估使用年限及現況。\n\n二、資產清冊由總幹事維護，主委每季確認一次，監委每年核查一次。\n\n### 第六條（資產保管）\n\n一、公共資產由總幹事負責日常保管，不得私自外借、挪用或轉讓。\n\n二、委員執行職務借用資產時，應填具借用申請，並於事畢歸還；如有損壞，依實際損害情形賠償。\n\n三、設備發生故障或異常，總幹事應立即通報主委，並依維保合約或維修計畫辦理修復。\n\n### 第七條（資產盤點）\n\n一、管委會應每年至少辦理一次全面資產盤點，時間通常安排於年底（十一至十二月）。\n\n二、盤點結果應記錄盤盈、盤虧情形，盤虧者應追查原因，由責任人說明並視情況賠償。\n\n三、盤點完成後，更新資產清冊，並附盤點報告提交管委會議核備。\n\n### 第八條（資產報廢）\n\n一、資產達下列條件之一時，得申請報廢：\n\n（一）使用年限屆滿且已無修復價值者。\n\n（二）修復費用超過重置成本百分之五十者。\n\n（三）已遭竊或滅失，有報案紀錄者。\n\n二、報廢申請須經管委會議決議，並填具報廢單，由主委及監委簽署後，從資產清冊中除名。\n\n三、報廢物品應依環保法規妥善處理，殘值得辦理拍賣或移交廢棄物處理業者，所得列入社區收入。\n\n\n---\n\n\n## 第三章 採購管理\n\n\n---\n\n### 第九條（採購分級）\n\n| 採購金額 | 採購方式 | 核准層級 |\n|---------|---------|---------|\n| 新臺幣 1 萬元以下 | 直接採購（附憑證） | 總幹事核准 |\n| 新臺幣 1 萬元至 3 萬元 | 詢價比較（至少 2 家） | 主委核准 |\n| 新臺幣 3 萬元至 10 萬元 | 詢價比較（至少 3 家，書面記錄） | 主委及採購委員核准 |\n| 新臺幣 10 萬元以上 | 公開招標或競標 | 管委會議決議 |\n\n### 第十條（採購作業程序）\n\n一、採購需求由總幹事或委員提出，填具採購申請單，載明採購品項、規格、數量、用途及預算。\n\n二、採購申請單依前條分級，送交相應審核層級同意後，方得辦理詢價或招標。\n\n三、詢價或招標結果應以書面彙整報告，標明各廠商報價及評選理由，以最低合理報價或最有利標決定廠商。\n\n四、採購完成後，應核對收到之財物、工程或服務是否符合規格，確認無誤後方得支付款項。\n\n### 第十一條（合約管理）\n\n一、新臺幣三萬元以上之採購，均應簽訂書面合約，合約應載明：採購標的、數量或工項、金額、交貨或完工期限、驗收標準、付款條件及違約責任。\n\n二、合約正本由主委保管，總幹事保存影本，並建立合約到期提醒機制，於合約到期前三個月提醒主委是否續約或重新招標。\n\n三、合約執行期間如有變更，須以書面附件方式辦理，雙方簽字確認。\n\n### 第十二條（廠商資格審核）\n\n一、新合作廠商應提供下列文件備查：公司登記證明（或商業登記）、統一編號、負責人資料、相關執照或證明。\n\n二、廠商如有下列情形，不得承接社區採購案：\n\n（一）與管委會委員有配偶、三親等以內親屬關係，且未迴避者。\n\n（二）曾因履約爭議被列為黑名單廠商者。\n\n（三）無法提供完整公司登記文件者。\n\n### 第十三條（緊急採購）\n\n一、如遇社區設施緊急故障（電梯、消防設備、給排水系統等），危及住戶安全或基本生活需求，得免除比價程序，由主委授權緊急採購。\n\n二、緊急採購金額以新臺幣五萬元以下為限；超過者，應事後七日內補提管委會議追認。\n\n三、緊急採購應留存緊急情況說明及採購憑證，列入財務帳目。\n\n\n---\n\n\n## 第四章 服務委外管理\n\n\n---\n\n### 第十四條（委外服務之管理）\n\n本社區委外服務包含清潔維護、保全服務、電梯維保、消防設備維保、給排水維保等，管委會應依下列原則管理：\n\n一、每年至少一次評估委外服務之品質與效益，決定是否續約或重新招標。\n\n二、委外服務合約應訂有明確之服務水準指標（KPI）及違約扣款機制。\n\n三、總幹事負責對委外廠商之日常監督，每月填具服務品質評核表，送主委核閱。\n\n四、發現委外廠商服務品質不符合約標準，應先發書面警告要求改善；屢勸不改者，依合約終止條款辦理並重新發包。\n\n\n---\n\n\n## 第五章 違規處理\n\n\n---\n\n### 第十五條（採購違規之認定）\n\n下列行為視為採購違規：\n\n一、未依本辦法規定辦理詢價或招標，逕行採購。\n\n二、採購委員或主委收受廠商饋贈或回扣。\n\n三、刻意分散採購以規避比價規定。\n\n四、偽造採購紀錄或憑證。\n\n### 第十六條（違規之處理）\n\n一、發現採購違規，監委應提報管委會議處理。\n\n二、情節輕微者，書面警告並要求補正程序。\n\n三、情節重大（如收受回扣、偽造紀錄）者，依 B02 違規管理與裁罰辦法辦理，並視情節移送司法機關。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十七條（採購紀錄之保存）\n\n採購申請單、報價比較表、合約及驗收紀錄，應至少保存五年。\n\n### 第十八條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十九條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-E01-社區安全與防災管理辦法(草擬).md": "# 和境心見社區 — 社區安全與防災管理辦法（草擬）\n\n**文件編號：** E01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為保障本社區全體住戶之生命財產安全，建立完善之防災準備、緊急應變及災後復原機制，依據《消防法》、《建築法》、《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《消防法》及其施行細則\n\n二、《建築法》第 77 條\n\n三、《公寓大廈管理條例》第 10 條、第 16 條\n\n四、本社區住戶管理規約（114 年正式版）\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶、管委會委員、總幹事及到訪人員，凡涉及社區安全管理、消防設備維護、緊急應變及防災演練，均依本辦法辦理。\n\n### 第四條（防災責任人）\n\n一、主委為社區防災第一責任人，負責統籌防災工作及緊急應變指揮。\n\n二、總幹事為防災日常管理執行人，負責消防設備日常維護、定期檢查及資料記錄。\n\n三、管委會應指定一名防災委員，協助主委推動防災教育及演練。\n\n\n---\n\n\n## 第二章 消防設備管理\n\n\n---\n\n### 第五條（消防設備種類）\n\n本社區消防設備包含但不限於：\n\n一、自動撒水系統（如有）。\n\n二、火警自動警報設備（煙霧偵測器、熱感應器）。\n\n三、室內消防栓及消防箱。\n\n四、緊急廣播系統。\n\n五、緊急照明設備及避難方向指示燈。\n\n六、滅火器（各樓層及停車場）。\n\n七、防火門及防煙垂壁。\n\n八、緊急發電機（如有）。\n\n### 第六條（消防設備定期維護）\n\n一、本社區消防設備應依《消防法》規定，委請合格消防設備師（士）定期辦理維護保養及申報：\n\n（一）每半年申報一次消防安全設備維護狀況（甲類場所標準）。\n\n（二）每月由總幹事進行目視自主檢查，確認設備外觀無異常、標示清晰。\n\n二、維保記錄應完整留存，至少保存五年，並配合主管機關查核。\n\n三、發現設備故障或異常，應於二十四小時內通報廠商修復，修復前應採取臨時補救措施（如增設臨時滅火器），並公告住戶。\n\n### 第七條（逃生通道管理）\n\n一、各樓層走廊、樓梯間及逃生通道，嚴禁堆放任何雜物，並應隨時保持暢通。\n\n二、防火門嚴禁使用門擋固定於開啟狀態，應保持自動關閉功能正常。\n\n三、緊急出口及逃生指示燈每月自主檢查一次，確保正常亮燈。\n\n四、違反前項規定者，依 B02 違規管理與裁罰辦法辦理。\n\n\n---\n\n\n## 第三章 監控與安全設備\n\n\n---\n\n### 第八條（監視錄影系統）\n\n一、本社區監視錄影系統（CCTV）設置於大廳、電梯、停車場、地下室出入口等公共區域，用於維護社區安全。\n\n二、監視錄影資料保存期限不少於三十日，期滿自動覆蓋。\n\n三、監視錄影資料僅供安全調查用途，不得作其他用途；調閱紀錄應有主委書面授權，並記錄調閱人員、時間及原因。\n\n四、監視錄影資料如涉及個人隱私爭議，應諮詢法律意見後再決定是否提供。\n\n### 第九條（門禁管理配合）\n\n社區門禁系統之管理，應與 H01 車輛與門禁管理辦法配合執行，以達整體安全管控效果。\n\n\n---\n\n\n## 第四章 緊急應變\n\n\n---\n\n### 第十條（緊急事故類型）\n\n本辦法所稱緊急事故包含：\n\n一、火災。\n\n二、地震及其引發之次生災害。\n\n三、水管爆裂、淹水。\n\n四、電梯故障（含人員受困）。\n\n五、煤氣洩漏。\n\n六、社區人員傷亡事件。\n\n七、其他危及公共安全之緊急事故。\n\n### 第十一條（緊急應變程序）\n\n發生緊急事故時，第一發現人應依下列程序處理：\n\n一、立即撥打消防（119）或警察（110）。\n\n二、通知總幹事或管理室值班人員。\n\n三、總幹事或值班人員啟動緊急廣播，通知住戶依逃生計畫疏散。\n\n四、主委統籌應變，並視情況啟動下列措施：\n\n（一）指定安全集合地點，清點住戶人數。\n\n（二）協助消防救援人員進入現場。\n\n（三）斷開相關電源（由具資格人員操作）。\n\n（四）聯絡緊急維修廠商（電梯、水電等）。\n\n### 第十二條（緊急聯絡資訊）\n\n管委會應維護並更新下列緊急聯絡名單，張貼於大廳管理室及各樓層公告欄：\n\n一、消防局（119）\n\n二、警察局（110）\n\n三、瓦斯公司緊急電話\n\n四、自來水公司緊急電話\n\n五、台電緊急電話\n\n六、電梯維保廠商緊急電話\n\n七、大樓管理緊急聯絡人（主委、副主委、總幹事）\n\n\n---\n\n\n## 第五章 防災演練與教育\n\n\n---\n\n### 第十三條（年度防災演練）\n\n一、管委會應每年至少辦理一次社區防災疏散演練，通常於九至十月間辦理（配合政府防災月）。\n\n二、演練前應公告全體住戶，說明演練時間、程序及注意事項，並邀請住戶踴躍參與。\n\n三、演練後應完成演練報告，記錄參與人數、演練過程及改善建議，並提交管委會議備查。\n\n### 第十四條（防災知識宣導）\n\n一、管委會應不定期透過公告、通訊群組或住戶大會，宣導防災常識（如地震避難、火災逃生、滅火器使用等）。\n\n二、新住戶遷入時，應發給防災資訊說明單，內容包含：逃生路線圖、緊急聯絡電話及基本避難程序。\n\n### 第十五條（防災物資儲備）\n\n一、管委會應於社區管理室備置基本防災物資，包含：急救箱、手電筒（含備用電池）、廣播器材及基本工具組。\n\n二、防災物資每半年盤點一次，過期或耗損者應即時補充。\n\n\n---\n\n\n## 第六章 違規處理\n\n\n---\n\n### 第十六條（安全違規之處理）\n\n一、住戶違反本辦法規定，危及社區安全者，依 B02 違規管理與裁罰辦法之 C 級重大違規處理，並得即時採取強制排除措施。\n\n二、阻塞逃生通道、破壞消防設備者，除依社區規定處理外，亦將依《消防法》向主管機關申請裁處，最高得處新臺幣三萬元罰鍰。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第十七條（防災文件之更新）\n\n本辦法附件「逃生路線圖」及「緊急聯絡名單」應於每年一月完成更新確認，並重新張貼於各公告位置。\n\n### 第十八條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十九條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《消防法》、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-F01-公共設施使用管理辦法(草擬).md": "# 和境心見社區 — 公共設施使用管理辦法（草擬）\n\n**文件編號：** F01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為維護本社區各項公共設施之正常運作、延長設備使用壽命、確保全體住戶公平使用權益，並防止設施損壞或不當占用，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 9 條至第 11 條\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、相關建築設備法規\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶及其訪客，凡使用社區公共設施者，均依本辦法規定辦理。\n\n### 第四條（公共設施範圍）\n\n本辦法所稱公共設施包含：\n\n一、**健身房**：設置於社區公設樓層，供住戶健身使用。\n\n二、**空調公共區域**：大廳、電梯廳、公共廊道等設有中央空調或分離式冷氣之區域。\n\n三、**地下室防空避難空間**：法定防空避難設施，兼供停車使用。\n\n四、**電梯**：供住戶垂直移動之搭乘設施。\n\n五、**大廳及公共廊道**：建築物公共進出通道。\n\n六、**管理室**：總幹事日常辦公及接待區域。\n\n七、**屋頂及機房**：設備維護區域，非授權人員不得進入。\n\n\n---\n\n\n## 第二章 健身房使用規範\n\n\n---\n\n### 第五條（健身房使用資格）\n\n一、健身房僅供本社區已完成登記之住戶及其同住家屬使用，訪客不得進入。\n\n二、使用前應完成健身房使用登記（向管理室申請感應門禁設定）。\n\n三、未滿十二歲之兒童，須有成年人陪同方可進入。\n\n### 第六條（健身房使用時間）\n\n一、健身房開放時間為每日 06:00 至 22:00。\n\n二、超過開放時間請立即離開，並確認門禁關閉。\n\n三、遇社區重大活動或設備維修，管委會得公告暫停開放，至少提前二十四小時通知。\n\n### 第七條（健身房使用規則）\n\n一、使用健身器材前，應確認器材狀況正常；如發現異常，應通知管理室，不得強行使用。\n\n二、使用後應將器材歸位，並以提供之清潔用品擦拭使用過之設備。\n\n三、健身房內嚴禁吸菸、飲食（飲水除外）、攜帶寵物入內。\n\n四、請穿著運動服及運動鞋，赤腳或穿夾腳拖鞋者不得使用器材。\n\n五、器材使用以三十分鐘為限（有人等候時），請主動讓出器材。\n\n六、健身房內請保持安靜，不得大聲喧嘩或播放外放音樂（耳機除外）。\n\n### 第八條（健身房設備損壞）\n\n住戶使用不當導致健身器材損壞，應負賠償責任，賠償金額由管委會依維修費用評估後通知當事人。\n\n\n---\n\n\n## 第三章 空調公共區域使用規範\n\n\n---\n\n### 第九條（空調開放時間）\n\n一、大廳及公共廊道空調（中央或分離式）之開放時間，由管委會依季節及用電效益訂定，並公告之。\n\n二、一般原則：夏季（五至九月）公共空調全天開啟；其餘季節視實際需要開啟。\n\n### 第十條（空調使用禁止事項）\n\n一、住戶及訪客不得擅自調整公共區域之空調設定溫度或模式。\n\n二、公共廊道請儘量關閉安全門，以維持空調效能、節約能源。\n\n三、任何人不得堵塞空調出風口或回風口。\n\n### 第十一條（節能原則）\n\n管委會應每季檢視公共空調之用電量，並適時調整開放時段，以在舒適與節能間取得平衡，降低住戶管理費負擔。\n\n\n---\n\n\n## 第四章 地下室使用規範\n\n\n---\n\n### 第十二條（地下室使用性質）\n\n地下室為法定防空避難設施，同時供車輛停放使用，詳細規範另依 H01 車輛與門禁管理辦法辦理，與本辦法共同適用。\n\n### 第十三條（地下室禁止行為）\n\n一、嚴禁任意堆放私人雜物、廢棄物或建材。\n\n二、嚴禁停放汽車以外之車輛（機車、腳踏車、電動車等），停放規範依 H01 辦理。\n\n三、嚴禁設置固定或半固定之占用設施。\n\n四、嚴禁阻塞緊急逃生出口。\n\n五、嚴禁在非指定區域充電或接電。\n\n\n---\n\n\n## 第五章 電梯使用規範\n\n\n---\n\n### 第十四條（電梯使用規則）\n\n一、電梯應依額定載重使用，不得超重搭乘。\n\n二、搬運大型家具、建材等大型物件，應使用貨梯或預約特定時段，並保護電梯內部不受損傷。\n\n三、嚴禁在電梯內吸菸、飲食，寵物應放置籠具或以牽繩控制。\n\n四、不得惡意破壞電梯設備（按鈕、鏡面、門軌等）。\n\n### 第十五條（電梯故障處理）\n\n一、發現電梯異常，應立即通知管理室，不得強行操作。\n\n二、如人員受困電梯，應按緊急對講機聯絡管理室，靜候救援，不得強行開門。\n\n三、電梯故障修復期間，管委會應公告預計修復時間，並確保行動不便住戶得到必要協助。\n\n\n---\n\n\n## 第六章 公共設施預約使用\n\n\n---\n\n### 第十六條（預約制設施）\n\n如管委會另設有多功能室、烤肉區、頂樓露台等需預約之公共設施，其預約規則另訂公告，並依下列原則辦理：\n\n一、每戶每月預約次數限制由管委會依設施狀況訂定。\n\n二、預約須於使用前七十二小時完成，並繳交押金（如有規定）。\n\n三、使用後應恢復原狀，未恢復原狀者，押金不予退還，並視情況追加賠償。\n\n\n---\n\n\n## 第七章 違規處理\n\n\n---\n\n### 第十七條（違規之認定）\n\n住戶或訪客違反本辦法規定者，依違規情節，依 B02 違規管理與裁罰辦法辦理，情節包含：\n\n一、A 級：初次輕微違規（如忘記清潔健身器材、小聲播放音樂等）。\n\n二、B 級：反覆違規或造成他人困擾。\n\n三、C 級：損壞設施、阻塞逃生通道等危害安全之行為。\n\n### 第十八條（暫停使用公共設施）\n\n住戶或其同住人如有下列情形，管委會得暫停其使用特定公共設施三個月至一年：\n\n一、違反本辦法規定達三次以上者。\n\n二、造成公共設施損壞，拒絕賠償者。\n\n三、有其他嚴重違規行為，經管委會議決議者。\n\n\n---\n\n\n## 第八章 附則\n\n\n---\n\n### 第十九條（公共設施定期維護）\n\n管委會應依各設施特性制定年度維護計畫，並確保維保合約完整有效，如發現設施有危險疑慮，應立即停止開放並進行修復。\n\n### 第二十條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第二十一條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-G01-住戶生活管理辦法(草擬).md": "# 和境心見社區 — 住戶生活管理辦法（草擬）\n\n**文件編號：** G01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為維護本社區居住環境品質、保障全體住戶之安寧與舒適，規範住戶日常生活行為，包含訪客管制、噪音防制、垃圾處理、寵物管理及搬遷作業，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 16 條\n\n二、《噪音管制法》\n\n三、《廢棄物清理法》\n\n四、《動物保護法》\n\n五、本社區住戶管理規約（114 年正式版）\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶（含區分所有權人、承租人）及其訪客，凡在本社區公共空間或涉及其他住戶權益之行為，均依本辦法規定辦理。\n\n\n---\n\n\n## 第二章 住戶基本生活規範\n\n\n---\n\n### 第四條（公共空間使用原則）\n\n一、走廊、樓梯間、大廳等公共空間，為全體住戶共用，應隨時保持整潔暢通，不得堆放任何私人物品。\n\n二、公共空間不得作為私人倉庫、擺攤或從事任何商業行為。\n\n三、不得在公共空間從事可能影響他人安全或造成環境污染之行為。\n\n### 第五條（門窗與陽台管理）\n\n一、住戶不得自陽台或窗戶向外拋物，違者依法負損害賠償責任。\n\n二、晾曬衣物應限於設計允許之晾衣區域，不得於公共廊道側或朝街立面懸掛，以維護社區外觀。\n\n三、陽台花盆應妥善固定，防止墜落危及行人安全。\n\n### 第六條（公共設備使用禁止事項）\n\n一、不得任意拆卸、改裝或使用社區共用設備之電源（含充電樁以外之電源）。\n\n二、電梯大廳及走廊請勿擺放鞋架、腳踏車、嬰兒車等物品，必要時應放置於自宅內。\n\n三、消防緊急設備箱嚴禁上鎖或遮蔽。\n\n\n---\n\n\n## 第三章 訪客管制\n\n\n---\n\n### 第七條（訪客入場管制）\n\n一、訪客進入本社區，應於大廳管理室登記，包含：到訪時間、受訪住戶樓號及戶號、訪客姓名（或聯絡電話）。\n\n二、受訪住戶得預先通知管理室，以簡化訪客入場程序。\n\n三、如住戶拒絕接受或無法聯繫受訪住戶，訪客應自行離去，管理室不得擅自放行。\n\n### 第八條（長期訪客之處理）\n\n一、訪客持續造訪超過七日或有長期使用社區設施之情形，視同住戶，應依承租人登記程序向管委會辦理登記。\n\n二、如有住戶違反本條規定，將視為轉租未申報，依 B02 違規管理與裁罰辦法辦理。\n\n### 第九條（夜間訪客管制）\n\n一、晚間 22:00 至翌日 08:00 為夜間管制時段，訪客進出應配合管理室確認。\n\n二、夜間訪客如無法聯繫受訪住戶，管理室得拒絕其入場，必要時得通知警察協處。\n\n\n---\n\n\n## 第四章 噪音防制\n\n\n---\n\n### 第十條（噪音管制時段）\n\n一、夜間安靜時間為每日 22:00 至翌日 08:00，此時段內應避免製造可能影響他人安眠之噪音。\n\n二、全日管制之噪音行為：\n\n（一）使用音量過大之音響設備（超過管制標準）。\n\n（二）鄰居投訴且屢勸不改之噪音行為。\n\n### 第十一條（裝修施工噪音）\n\n一、裝修施工噪音之管制時段，依 K01 裝修與施工管理辦法之規定辦理。\n\n二、非裝修性質之噪音（如：派對、音樂演奏、卡拉 OK），夜間管制時段內一律禁止。\n\n### 第十二條（噪音投訴處理程序）\n\n一、住戶遭受噪音侵擾，得向管理室投訴，管理室應立即記錄並通知施擾方改善。\n\n二、施擾方於五分鐘內未改善者，由總幹事親自確認並勸導。\n\n三、反覆投訴（一個月內三次以上），依 B02 違規管理與裁罰辦法辦理，並得函請環保主管機關裁罰。\n\n\n---\n\n\n## 第五章 垃圾及環境衛生管理\n\n\n---\n\n### 第十三條（垃圾分類與資源回收）\n\n一、本社區住戶應確實依規定進行垃圾分類，包含一般垃圾、資源回收物、廚餘、有害廢棄物及大型廢棄物等各類別之分類處理方式，詳見 **G02 垃圾分類與資源回收管理辦法**。\n\n二、嚴禁於公共走廊、樓梯間、地下室、電梯大廳及其他公共空間堆置垃圾或廢棄物；違者依 B02 違規管理與裁罰辦法處理。\n\n三、大型廢棄物（家具、電器等）不得丟棄於社區公共空間，應依 G02 辦法第十四條之規定預約清運。\n\n### 第十四條（資源回收集中點使用）\n\n一、本社區於指定地點設置資源回收集中點，住戶請將可回收物品依類別分類後集中放置；各類分類標準詳見 **G02 垃圾分類與資源回收管理辦法**。\n\n二、廚餘須放入指定廚餘桶，並區分生廚餘（堆肥用）與熟廚餘（飼料用），不得與一般垃圾混置；詳細分類方式見 G02 第四章。\n\n三、資源回收及廚餘清運時間由管委會公告，住戶請配合作業。\n\n### 第十五條（公共環境維護責任）\n\n住戶或其訪客造成公共空間污損，應自行清潔恢復；拒不清潔者，管委會得委請清潔人員代清，費用由責任住戶負擔，並依 B02 辦法計罰。\n\n\n---\n\n\n## 第六章 寵物管理\n\n\n---\n\n### 第十六條（寵物飼養資格）\n\n一、住戶得於自宅內飼養寵物，但飼養之動物種類及數量不得違反本社區規約及相關法令規定。\n\n二、飼養犬隻須向戶政主管機關完成寵物登記及晶片植入，並保持疫苗接種有效。\n\n三、規約禁止飼養之動物（依《公寓大廈管理條例》第 16 條第 4 項），絕對不得在社區內飼養。\n\n### 第十七條（寵物於公共空間之行為規範）\n\n一、帶寵物進出公共空間，應使用牽繩（犬隻）或提籠（貓及其他小動物）。\n\n二、寵物排泄物應由飼主立即清除乾淨，不得留置於公共空間。\n\n三、搭乘電梯時，應注意避免與其他住戶造成衝突；如有其他住戶表示不適，應禮讓或等下一班電梯。\n\n四、寵物不得進入健身房等非寵物區域之公共設施。\n\n### 第十八條（寵物攻擊事件之處理）\n\n寵物於社區公共空間攻擊他人時，飼主應：\n\n一、立即將寵物帶離現場，安撫受傷住戶，必要時協助就醫。\n\n二、負擔受害人之醫療費用及損失賠償。\n\n三、向管委會提出書面說明，並承諾採取防止再犯措施。\n\n四、情節嚴重者，管委會得要求限期將寵物移出社區。\n\n\n---\n\n\n## 第七章 搬遷作業管理\n\n\n---\n\n### 第十九條（搬遷預約）\n\n一、住戶進行搬入或搬出作業，應提前七十二小時向管理室提出搬遷申請，告知搬遷日期、時間及使用之電梯。\n\n二、管委會指定搬遷作業應使用貨梯（如有），或於允許之時段使用客梯，以避免影響其他住戶。\n\n三、搬遷時段以平日 08:00 至 17:00 為原則，週末及國定假日原則上不受理（管委會得視情況例外核准）。\n\n### 第二十條（搬遷作業規定）\n\n一、搬遷過程中應保護電梯內部（使用毯子或保護墊），不得造成公共設施損傷。\n\n二、搬運途中不得堵塞走廊超過三十分鐘，應盡快完成作業。\n\n三、搬遷完成後，應確認公共空間已清潔，無遺留物品或垃圾。\n\n四、如搬遷過程中造成公共設施損壞，應依實際損害賠償。\n\n\n---\n\n\n## 第八章 違規處理\n\n\n---\n\n### 第二十一條（違規處理程序）\n\n住戶違反本辦法各項規定，依違規情節輕重，依 B02 違規管理與裁罰辦法辦理：\n\n一、A 級輕微：口頭勸導或書面警告，限期改善。\n\n二、B 級一般：書面警告、限制使用公共設施、依規約收取罰款。\n\n三、C 級重大（如寵物攻擊人、蓄意損壞公設等）：直接裁罰，並得報請主管機關處理。\n\n\n---\n\n\n## 第九章 附則\n\n\n---\n\n### 第二十二條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第二十三條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-G02-垃圾分類與資源回收管理辦法(草擬).md": "# 和境心見社區 — 垃圾分類與資源回收管理辦法（草擬）\n\n**文件編號：** G02\n**制定日期：** 2026.04.26\n**版本：** v0.2（草擬）\n\n---\n\n> 📋 **垃圾分類參考資料（點擊開啟）**\n>\n> - [垃圾分類海報（圖示版）](./和境垃圾分類海報_20260424_PDF.pdf)\n> - [垃圾分類管理措施（說明版）](./垃圾分類管理措施_20260424_PDF.pdf)\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為落實垃圾減量、資源永續利用，維護本社區居住環境整潔，並依循桃園市政府垃圾分類政策，特制定本辦法，規範全體住戶之垃圾分類與資源回收行為。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《廢棄物清理法》\n\n二、《資源回收再利用法》\n\n三、桃園市政府環境保護局垃圾分類相關規定\n\n四、本社區住戶管理規約（114 年正式版）第十六條\n\n五、G01 住戶生活管理辦法\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶（含區分所有權人、承租人）及其訪客，凡在本社區範圍內產生之廢棄物，均應依本辦法規定分類處理。\n\n\n---\n\n\n## 第二章 社區垃圾處理設施與作業流程\n\n\n---\n\n### 第四條（社區垃圾處理設施）\n\n本社區設有下列垃圾處理設施，供住戶使用：\n\n一、**垃圾回收間**：位於地下一樓，設有垃圾冷藏設備，用於存放一般垃圾，防止垃圾腐敗發臭，維護環境衛生。\n\n二、**資源回收分類桶**：設置於垃圾回收間，依紙類、塑膠、金屬、玻璃等類別分別設置。\n\n三、**廚餘桶**：設置於垃圾回收間，供住戶投放廚餘。\n\n四、**有害廢棄物回收箱**：設置於管理室附近，供住戶投放廢電池、廢燈管等有害廢棄物。\n\n### 第五條（垃圾清運作業流程）\n\n一、本社區清潔人員配合桃園市公所清潔隊，於指定清運時間前，將地下一樓垃圾回收間之垃圾子母車拖至一樓，交由公所清潔隊統一清運。\n\n二、清運時間表由管委會依公所清潔隊之時刻表公告於垃圾回收間及大廳公布欄，住戶請配合公告時間投放垃圾。\n\n三、住戶應於垃圾清運前，自行將垃圾送至地下一樓垃圾回收間投放，**不得**將垃圾留置於走廊、電梯廳或其他公共空間等待清運。\n\n### 第六條（垃圾袋規定）\n\n一、桃園市政府目前**尚未實施專用垃圾袋制度**，住戶投放一般垃圾可使用一般塑膠袋盛裝，以束口密封為原則，防止滲漏。\n\n二、資源回收物及廚餘可另置於指定容器或清潔袋，分類放入對應回收桶。\n\n三、如桃園市政府日後正式公告實施專用垃圾袋制度，本辦法將配合修訂，以政府公告為準。\n\n\n---\n\n\n## 第三章 垃圾分類種類\n\n\n---\n\n### 第七條（垃圾分類五大類）\n\n本社區垃圾依性質分為以下五大類：\n\n一、**一般垃圾**：無法回收再利用之廢棄物。\n\n二、**資源回收物**：可回收再製之廢棄物，依本辦法第八條至第十二條分類處理。\n\n三、**廚餘**：廚房及飲食產生之剩餘食物，依本辦法第十三條規定處理。\n\n四、**有害廢棄物**：廢電池、廢燈管、廢藥品等，依本辦法第十五條規定處理。\n\n五、**大型廢棄物**：廢家具、廢家電等，依本辦法第十六條規定處理。\n\n\n---\n\n\n## 第四章 資源回收分類規定\n\n\n---\n\n### 第八條（紙類回收）\n\n一、**可回收紙類**：報紙、雜誌、書本、紙箱、紙板、牛奶盒、飲料紙盒（利樂包）。\n\n二、**特別說明：**\n\n（一）**乾淨紙餐盒、紙杯**（清洗壓扁後）→ **可回收**。\n\n（二）**嚴重油污、潰爛之紙餐盒**（無法清洗者）→ **丟一般垃圾**，不得放入回收桶。\n\n（三）**鋁箔包**（紙容器，如鋁箔包奶茶、牛奶盒等）清洗後 → **可回收**。\n\n（四）**鋁箔袋**（複合材質，如薯片包、面膜包裝袋）→ **丟一般垃圾**，不可回收。\n\n三、**回收前處理**：\n\n（一）報紙、雜誌請捆紮整齊後放置。\n\n（二）紙箱、紙板應拆平後放置，減少體積。\n\n（三）牛奶盒、飲料紙盒請清洗後壓扁，或剪開展平。\n\n四、**不可回收紙類**：\n\n（一）沾染嚴重油脂、食物殘渣之紙類（如：嚴重油污的速食包裝紙、披薩盒底部）。\n\n（二）衛生紙、紙巾、面紙。\n\n（三）複寫紙、感熱紙（如：一般超市收據）。\n\n### 第九條（塑膠類回收）\n\n一、**可回收塑膠類**：標示 1 至 7 號之塑膠容器（寶特瓶、塑膠袋、保鮮盒、塑膠瓶等）。\n\n二、**回收前處理**：\n\n（一）容器請先清洗乾淨，去除殘餘食物或液體。\n\n（二）寶特瓶請壓扁以節省空間。\n\n三、**不可回收塑膠**：\n\n（一）沾有食物殘渣且無法清洗之塑膠容器。\n\n（二）光碟片（CD/DVD，另有處理管道）。\n\n### 第十條（金屬類回收）\n\n一、**可回收金屬類**：鐵罐（奶粉罐、食品罐）、鋁罐（飲料鋁罐）、金屬鍋具、鐵片等。\n\n二、**回收前處理**：罐類請清洗後壓扁放置。\n\n三、**特別注意**：廢廚房刀具、針頭等鋒利物品，應以紙箱或厚紙包裹並標明「利器」，再行投放。\n\n### 第十一條（玻璃類回收）\n\n一、**可回收玻璃類**：玻璃瓶、玻璃罐（醬油瓶、玻璃飲料瓶、調味料瓶等）。\n\n二、**回收前處理**：請先清洗乾淨，瓶蓋應拆下分別放入對應回收桶。\n\n三、**不可回收玻璃**：\n\n（一）鏡子、燈泡（另見有害廢棄物處理）等非瓶罐類玻璃。\n\n（二）碎玻璃：應以厚紙箱包裹並標明「碎玻璃」，以一般垃圾處理。\n\n### 第十二條（其他資源回收物）\n\n一、**布料與舊衣物**：整理打包後，放置於社區公告之舊衣回收箱。\n\n二、**廢光碟片**：整批裝袋，標明「光碟回收」，放置資源回收區。\n\n\n---\n\n\n## 第五章 廚餘處理規定\n\n\n---\n\n### 第十三條（廚餘投放規定）\n\n一、廚餘包含廚房及飲食過程產生之剩餘食物，包含：蔬菜葉皮、水果皮、果核、蛋殼、剩飯剩菜、麵包糕點、魚骨、肉骨、茶葉渣、咖啡渣等。\n\n二、廚餘請投放至垃圾回收間之廚餘桶。\n\n三、投放前應瀝除多餘水分，以密封袋或容器盛裝，防止滲漏及異味。\n\n四、**下列物品不得投入廚餘桶**：\n\n（一）竹籤、牙籤等尖銳木竹製品。\n\n（二）硬質大型果核（如龍眼核、橄欖核、椰殼等）。\n\n（三）大量鹽分食物之原汁（如醃漬物汁液）。\n\n（四）塑膠袋、包裝材料等非食物類廢棄物。\n\n### 第十四條（廚餘桶清潔管理）\n\n廚餘桶由管委會安排每日清運及定期清洗消毒，住戶請依公告時間投放，避免廚餘桶滿溢。\n\n\n---\n\n\n## 第六章 有害廢棄物與大型廢棄物處理\n\n\n---\n\n### 第十五條（有害廢棄物處理）\n\n下列有害廢棄物不得與一般垃圾或資源回收物混放，應送至社區指定收集點或政府公告之收受機構：\n\n一、**廢電池**（乾電池、充電電池、鈕扣電池、鋰電池）：放置於管理室設置之廢電池回收箱。\n\n二、**廢日光燈管、省電燈泡**：放置於管理室設置之廢燈管回收桶（請勿打破）。\n\n三、**廢藥品**（過期藥、剩餘處方藥）：交由管理室，或送至附近指定藥局之藥品回收箱。\n\n四、**廢油漆、強酸、強鹼等化學品**：禁止直接丟棄，請聯繫管委會或桃園市環保局安排特殊清運。\n\n五、**廢輪胎、廢機油**：依政府規定送至汽機車維修廠或指定回收點處理。\n\n### 第十六條（大型廢棄物處理）\n\n一、廢棄家具、床墊、家電（冰箱、洗衣機、冷氣等）屬大型廢棄物，**嚴禁**丟棄於社區公共空間、停車場或垃圾回收間周邊。\n\n二、預約清運方式：\n\n（一）電話預約桃園市大型廢棄物清運專線：**0800-085-717**。\n\n（二）網路預約桃園市環保局官網線上申辦。\n\n三、廢家電（冷氣、電視、冰箱、洗衣機、電腦等）可申請政府「四合一回收」計畫，免費清運。\n\n四、住戶需自行將大型廢棄物移至社區大門口或指定地點，配合清運人員作業。\n\n\n---\n\n\n## 第七章 禁止行為\n\n\n---\n\n### 第十七條（禁止行為）\n\n下列行為嚴格禁止，違者依第十九條規定處理：\n\n一、於社區公共走廊、樓梯間、電梯大廳、地下室停車場等公共空間任意堆置垃圾或廢棄物。\n\n二、將垃圾或廢棄物棄置於他人門前或車位旁。\n\n三、將有害廢棄物（電池、燈管、藥品、化學品等）混入一般垃圾或資源回收桶。\n\n四、於社區外牆或公共設施附近棄置大型廢棄物。\n\n五、故意污損或損壞社區垃圾處理設施（廚餘桶、回收桶、冷藏設備等）。\n\n六、未配合清運時間，將垃圾留置於地下室垃圾回收間以外之公共場所。\n\n\n---\n\n\n## 第八章 垃圾分類宣導與設施維護\n\n\n---\n\n### 第十八條（垃圾分類宣導）\n\n一、管委會應於垃圾回收間及大廳張貼清晰易懂之垃圾分類海報，並提供本辦法附件（垃圾分類海報圖示版、管理措施說明版）供住戶參閱。\n\n二、垃圾分類海報及說明文件如有更新，管委會應及時更換，並於社區通訊群組通知住戶。\n\n三、管委會得視需要舉辦垃圾分類宣導活動，提升住戶環保意識。\n\n### 第十九條（資源回收設施維護）\n\n一、垃圾回收間之回收桶應明確標示種類，每週清潔不少於一次。\n\n二、廚餘桶應每日清運，並定期清洗消毒，防止異味及蟲害。\n\n三、垃圾冷藏設備由管委會負責維護保養，發現故障應即通報廠商修復。\n\n四、住戶不得任意移動或損壞回收設施；造成損壞者，應負擔修復或賠償費用。\n\n\n---\n\n\n## 第九章 違規處理\n\n\n---\n\n### 第二十條（違規裁處）\n\n住戶違反本辦法，依違規情節，依 B02 違規管理與裁罰辦法辦理：\n\n一、初次違規：書面勸導，限期改善。\n\n二、再次違規：書面警告，並依 B02 辦法裁處罰款。\n\n三、屢次違規（三次以上）：移送主管機關，並公告違規情形於社區公布欄。\n\n### 第二十一條（情節重大之即時裁處）\n\n下列行為視為情節重大，無需書面勸導，得直接依 B02 辦法裁罰並函請主管機關處理：\n\n一、棄置有害廢棄物（電池、化學品等）於公共空間或環境中。\n\n二、非法棄置大型廢棄物致阻礙逃生通道或消防設施。\n\n三、故意破壞垃圾冷藏設備或回收設施。\n\n\n---\n\n\n## 第十章 附則\n\n\n---\n\n### 第二十二條（與其他辦法之關係）\n\n一、本辦法為 G01 住戶生活管理辦法第五章「垃圾及環境衛生管理」之細則辦法，兩者應併同適用。\n\n二、本辦法未規定事項，依 G01 住戶生活管理辦法、B02 違規管理與裁罰辦法及相關法令規定辦理。\n\n### 第二十三條（修訂程序）\n\n本辦法由管委會依實際需要修訂，包含配合政府政策調整（如桃園市實施專用垃圾袋制度時），修訂後公告施行，並適時更新張貼於社區公布欄及社區網路通訊群組。\n\n### 第二十四條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-H01-車輛與門禁管理辦法(草擬).md": "# 和境心見社區 — 車輛與門禁管理辦法（草擬）\n\n**文件編號：** H01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為維護本社區停車秩序、保障全體住戶之行車安全，並規範門禁磁控卡及 Etag 條碼之申請與使用，確保社區進出安全，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《公寓大廈管理條例》第 9 條、第 16 條\n\n二、《道路交通管理處罰條例》（社區內道路交通管理之參考）\n\n三、本社區住戶管理規約（114 年正式版）\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶、車位所有人、承租人及其訪客，凡涉及社區停車場使用及門禁設備之申請與使用，均依本辦法辦理。\n\n### 第四條（名詞定義）\n\n一、**磁控卡**：本社區發行之門禁感應卡，供住戶進出建築物大門及電梯使用。\n\n二、**Etag 條碼**：貼附於車輛擋風玻璃，供車輛感應進出地下停車場之辨識標籤。\n\n三、**停車格**：依產權登記屬個人所有之停車位，或依規約規定之公共停車格。\n\n四、**訪客停車格**：由管委會統一管理，供臨時訪客使用之停車位（如有）。\n\n\n---\n\n\n## 第二章 門禁磁控管理\n\n\n---\n\n### 第五條（磁控卡發放）\n\n一、本社區每戶發放磁控卡片數依規約或管委會規定辦理，一般每戶發放二至四張。\n\n二、住戶申請磁控卡，應填具申請書，並提供區分所有權人身分證明或租賃合約（承租人）。\n\n三、磁控卡工本費及遺失補辦費用，依管委會公告之收費標準收取。\n\n### 第六條（磁控卡使用規定）\n\n一、磁控卡僅供本人使用，不得轉讓或借予他人。\n\n二、磁控卡遺失，應立即向管理室申報，管理室應即停用原卡，並協助申請補發。\n\n三、住戶遷出時，應將磁控卡繳回管理室；未繳回者，管委會得於遷出後停用相關設定，並自押金中扣除補辦費用。\n\n### 第七條（訪客門禁管制）\n\n一、訪客進入社區，應依 G01 住戶生活管理辦法第七條之訪客登記程序辦理。\n\n二、住戶得透過對講機或預先授權，允許指定訪客進入；授權僅限當次有效，不得設定長期開放。\n\n三、外送、維修等服務人員，應在管理室登記後由受訪住戶確認後進入。\n\n\n---\n\n\n## 第三章 Etag 條碼管理\n\n\n---\n\n### 第八條（Etag 條碼申請）\n\n一、車位所有人或使用人得申請 Etag 條碼，貼附於車輛擋風玻璃以供感應進出。\n\n二、申請時應提供：車輛行照影本、車主身分證明、停車格號碼。\n\n三、每一停車格僅得申請對應車輛之 Etag 條碼，多輛車共用一格者，得申請多個條碼，但需一併說明。\n\n### 第九條（Etag 條碼更換）\n\n一、Etag 條碼因損壞、車輛更換等原因需補發時，應向管理室申請，並繳回舊條碼（如無法繳回應說明原因）。\n\n二、補發工本費依管委會公告之收費標準收取。\n\n三、Etag 條碼更換後，舊條碼即失效，未申報之閒置條碼管委會得逕行停用。\n\n### 第十條（Etag 條碼管制）\n\n一、Etag 條碼僅供登記車輛使用，不得轉貼或借給非登記車輛使用。\n\n二、發現未登記車輛以有效 Etag 條碼進出，管委會得啟動調查，並依 B02 辦法對條碼所有人處理。\n\n\n---\n\n\n## 第四章 停車場使用管理\n\n\n---\n\n### 第十一條（停車格使用規定）\n\n一、停車格僅供登記車輛停放，不得停放其他車輛，亦不得讓予他人使用（租賃情形依第十三條辦理）。\n\n二、停車應完全停入格線內，不得壓線或跨格停放，影響相鄰車位之使用。\n\n三、每一停車格限停一輛汽車，不得同時停放汽車與機車或腳踏車。\n\n### 第十二條（充電管理）\n\n一、電動車充電應使用管委會指定之充電設備（如有設置充電樁），不得自行私接電源充電。\n\n二、非指定位置之充電行為，無論功率大小，均視為危險行為，依 B02 辦法直接計罰，首次新臺幣一千元，再次新臺幣二千元。\n\n三、充電樁之申請設置，依管委會另訂之充電設備申請辦法辦理。\n\n### 第十三條（停車格租賃）\n\n一、停車格所有人得依 B01 準則及相關規定，將停車格出租予他人，但承租人應向管委會完成登記。\n\n二、停車格租賃登記應附：出租合約影本、承租人車輛行照，登記後方得核發 Etag 條碼。\n\n三、停車格租賃合約終止時，所有人應立即通知管委會辦理登記變更，逾期未辦理者，停車格後續發生之違規仍由所有人負責。\n\n### 第十四條（訪客停車）\n\n一、訪客車輛停入訪客停車格（如有設置），應於管理室登記車號及預計停放時間，以每次最長四小時為限。\n\n二、無訪客停車格或訪客停車格已滿，訪客車輛不得占用住戶之停車格，應至社區外停放。\n\n三、未登記之車輛停放訪客停車格逾時，管委會得依法申請拖吊，費用由車輛所有人負擔。\n\n### 第十五條（停車場行駛規定）\n\n一、車輛於停車場內行駛速度不得超過每小時 10 公里。\n\n二、停車場內應遵守標示之行駛方向，不得逆向行駛。\n\n三、停車場內禁止鳴喇叭（緊急情況除外）。\n\n四、車輛進出停車場應禮讓行人，禁止強行通過。\n\n\n---\n\n\n## 第五章 違規處理\n\n\n---\n\n### 第十六條（違規類型及裁罰基準）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 停車超出格線，壓線影響鄰車 | 口頭勸導 | **500 元／次** | 勸導 3 次後計罰 |\n| 佔用他人停車格 | **500 元／次** | **1,000 元／次** | 逾期未移車得申請拖吊 |\n| 一格同停汽車與機車（或腳踏車） | **500 元／次** | **1,000 元／次** | — |\n| 非指定區域充電 | **1,000 元／次** | **2,000 元／次** | 直接計罰 |\n| 未登記車輛長期占格（逾 30 日） | 通知限期辦理 | **1,000 元／次** | — |\n| 轉讓磁控卡或 Etag 給非授權人 | 書面警告＋停用 | 停用＋**1,000 元** | — |\n\n### 第十七條（違規車輛之處理）\n\n一、違規停車於他人停車格超過二十四小時，管委會得於通知無效後，依法申請警察機關協助拖吊。\n\n二、拖吊費用及相關費用，由違規車輛所有人（或使用人）負擔。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十八條（磁控系統及 Etag 系統之維護）\n\n管委會應確保門禁感應系統及 Etag 讀取系統之正常運作，如有故障應於二十四小時內通報廠商修復，並採取臨時管制措施。\n\n### 第十九條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第二十條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-I01-資訊與資料安全管理辦法(草擬).md": "# 和境心見社區 — 資訊與資料安全管理辦法（草擬）\n\n**文件編號：** I01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為保護本社區住戶個人資料之安全，規範管委會及相關人員對社區資訊系統、監視錄影資料及住戶個資之處理，防範資料外洩、系統遭入侵或不當使用，依據《個人資料保護法》及相關法規，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《個人資料保護法》全文\n\n二、《公寓大廈管理條例》相關規定\n\n三、本社區住戶管理規約（114 年正式版）\n\n### 第三條（適用範圍）\n\n本辦法適用於管委會全體委員、總幹事及任何依職務接觸社區資訊系統或住戶個人資料之人員。\n\n### 第四條（名詞定義）\n\n一、**個人資料**：依《個人資料保護法》定義，包含姓名、出生年月日、身分證字號、住址、聯絡電話、電子郵件及其他足以辨識個人之資料。\n\n二、**資訊系統**：本社區使用之門禁管理系統、監視錄影系統、住戶管理軟體及相關數位設備。\n\n三、**資安事件**：因人為疏失、惡意攻擊或系統故障，導致個人資料外洩或資訊系統遭破壞之事件。\n\n\n---\n\n\n## 第二章 個人資料管理\n\n\n---\n\n### 第五條（個人資料之蒐集）\n\n一、管委會蒐集住戶個人資料，以管理社區事務所必要者為限，不得過度蒐集。\n\n二、蒐集個人資料時，應告知住戶蒐集目的、利用方式及住戶之權利。\n\n三、住戶個資包含：戶別、姓名、聯絡電話、電子信箱、車輛資料及門禁設備資料。\n\n### 第六條（個人資料之利用）\n\n一、住戶個人資料僅得用於社區管理業務，不得提供予第三人或作其他用途。\n\n二、如法院、檢察機關或主管機關依法調閱住戶資料，應取得主委書面授權後方得提供，並記錄提供日期、對象及資料範圍。\n\n三、委外廠商（如清潔、保全公司）因業務需知悉住戶資料者，應在合約中訂明保密義務及違約責任。\n\n### 第七條（個人資料之保存與銷毀）\n\n一、住戶個人資料應妥善保管，紙本資料應上鎖存放，數位資料應設置訪問權限。\n\n二、住戶遷出後，其個人資料保存期限以不超過一年為原則（如有法律糾紛，得延長至案件終結）。\n\n三、超過保存期限之個人資料，應以安全方式銷毀（紙本碎紙處理，電子檔案徹底刪除）。\n\n### 第八條（住戶之個資權利）\n\n住戶依《個人資料保護法》享有下列權利：\n\n一、查詢及請求閱覽自身之個人資料。\n\n二、請求補充或更正不完整或不正確之個人資料。\n\n三、請求停止蒐集、處理或利用個人資料（於合理範圍內）。\n\n四、上述申請，管委會應於十五日內書面回覆，並依法辦理。\n\n\n---\n\n\n## 第三章 資訊系統安全\n\n\n---\n\n### 第九條（門禁系統安全）\n\n一、門禁系統之管理員帳號及密碼，由主委及總幹事各持有一份，不得外洩或與他人共用。\n\n二、管委會換屆時，應依 A03 交接辦法完成門禁系統帳號密碼之移交，並立即變更密碼。\n\n三、門禁系統應定期更新韌體及軟體，以防範已知安全漏洞。\n\n### 第十條（監視錄影系統）\n\n一、監視錄影資料保存期限不少於三十日，期滿自動覆蓋，不得任意刪除。\n\n二、調閱監視錄影資料，須有主委書面授權，並填具調閱申請單，記錄調閱人員、時間、目的及調閱片段。\n\n三、調閱後不得複製留存，調閱申請單應保存六個月備查。\n\n四、監視錄影資料嚴禁用於與社區安全無關之目的。\n\n### 第十一條（社區數位通訊安全）\n\n一、管委會使用之電子郵件、通訊群組或管理軟體，應設置適當之訪問控制，防止非授權存取。\n\n二、不得透過公開社群媒體傳播住戶個人資料。\n\n三、管委會之對外公文應以官方電子郵件或書面方式發送，不得以個人帳號代替官方聯絡。\n\n\n---\n\n\n## 第四章 資安事件處理\n\n\n---\n\n### 第十二條（資安事件之通報）\n\n一、委員或總幹事如發現或疑似發生資安事件，應立即通報主委。\n\n二、主委應於二十四小時內評估事件嚴重性，並視情況：\n\n（一）通知受影響住戶。\n\n（二）聯絡相關廠商修復系統。\n\n（三）向主管機關（個人資料保護委員會或直轄市縣市政府）通報。\n\n三、資安事件處理過程應完整記錄，包含：發現時間、影響範圍、處理措施及後續改善計畫。\n\n### 第十三條（資安事件之調查）\n\n一、資安事件調查由主委主導，必要時得委請外部資訊安全專業人員協助。\n\n二、調查期間應保全相關證據，不得任意刪除或竄改資料。\n\n三、如確認有人員違規導致資安事件，依本辦法第十五條及 B02 違規管理與裁罰辦法辦理。\n\n\n---\n\n\n## 第五章 違規處理\n\n\n---\n\n### 第十四條（個資違規之認定）\n\n下列行為視為個資違規：\n\n一、無授權存取或外洩住戶個人資料。\n\n二、擅自調閱或複製監視錄影資料。\n\n三、將住戶資料提供予非授權第三人。\n\n四、未依規定辦理個資之銷毀。\n\n### 第十五條（違規之處理）\n\n一、個資違規情節輕微者，書面警告並要求改善。\n\n二、情節重大（如主動外洩個資、牟取私利）者，依法移送司法機關，並依《個人資料保護法》第 28 條負損害賠償責任（每人每件最高新臺幣二萬元）。\n\n\n---\n\n\n## 第六章 附則\n\n\n---\n\n### 第十六條（教育訓練）\n\n管委會應每年至少一次對委員及總幹事進行個人資料保護及資訊安全教育訓練。\n\n### 第十七條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十八條（未盡事宜）\n\n本辦法未盡事宜，依《個人資料保護法》、本社區住戶管理規約及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-J01-社區溝通與住戶服務管理辦法(草擬).md": "# 和境心見社區 — 社區溝通與住戶服務管理辦法（草擬）\n\n**文件編號：** J01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為促進本社區管委會與住戶間之良性溝通，提升服務品質，建立公開透明之資訊傳遞機制，確保住戶意見得到有效回應，依據《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列規範制定：\n\n一、《公寓大廈管理條例》第 36 條\n\n二、本社區住戶管理規約（114 年正式版）\n\n三、B01 住戶規約與各項管理辦法適用準則\n\n### 第三條（適用範圍）\n\n本辦法適用於管委會委員、總幹事及本社區全體住戶，凡涉及社區公告、住戶申訴、服務申請及溝通管道之使用，均依本辦法辦理。\n\n### 第四條（溝通服務原則）\n\n一、**公開透明**：管委會決策及財務資訊應定期公告，確保住戶知情權。\n\n二、**即時回應**：住戶之服務申請及投訴，應於規定期限內完成回覆。\n\n三、**平等對待**：對所有住戶一視同仁，不得因個人好惡差異服務品質。\n\n四、**尊重隱私**：住戶個人資料之處理，依 I01 資訊與資料安全管理辦法辦理。\n\n\n---\n\n\n## 第二章 資訊公告管理\n\n\n---\n\n### 第五條（常規公告項目）\n\n管委會應定期公告下列事項：\n\n一、每月財務收支報告（於每月十五日前完成）。\n\n二、管委會議紀錄摘要（於會後七日內公告）。\n\n三、社區重大工程計畫及進度。\n\n四、設施維護公告及停用通知（至少提前二十四小時）。\n\n五、年度區權人會議召集通知及議案（依 A02 辦理）。\n\n六、社區規章更新及重要政令宣導。\n\n### 第六條（公告媒介）\n\n一、**公布欄**：大廳及各樓層電梯廳，為主要公告位置，所有重要通知均應張貼。\n\n二、**通訊群組**：管委會官方通訊群組（LINE 或其他平台），用於即時通知。\n\n三、**電子郵件**：法定書面通知或重要公告，以電子郵件輔助傳送。\n\n四、**書面通知**：個別住戶之裁罰、費用催繳等正式通知，應以書面方式送達。\n\n### 第七條（公告之管理）\n\n一、公布欄由總幹事負責管理，過期公告應及時撤除，保持整潔有序。\n\n二、任何人不得擅自撕除或遮蔽管委會張貼之官方公告。\n\n三、住戶如需於公布欄張貼非官方通知（如二手物品轉讓、徵求室友等），應向管理室申請，管委會視情況核准，每則公告張貼期限最長二週。\n\n\n---\n\n\n## 第三章 住戶申訴與建議\n\n\n---\n\n### 第八條（申訴管道）\n\n住戶得透過下列管道向管委會提出申訴或建議：\n\n一、向管理室填寫書面「住戶意見表」。\n\n二、以電子郵件寄送至管委會官方信箱。\n\n三、透過官方通訊群組傳送文字訊息（一般意見建議）。\n\n四、於管委會議公開意見時間發言（需提前告知主委列入議程）。\n\n### 第九條（申訴之受理與回覆）\n\n一、書面申訴應於受理後七個工作日內完成初步回覆，說明是否受理及後續處理方式。\n\n二、複雜案件（如涉及多方住戶之噪音糾紛、設施損壞責任認定）得延長至三十日，但應告知申訴住戶預計回覆時間。\n\n三、所有申訴案件均應建立書面記錄，包含：申訴日期、內容摘要、處理措施及結案日期。\n\n四、申訴住戶如對管委會回覆不滿意，得於收到回覆後十四日內提出書面覆議，提交全體管委會議討論，管委會應於三十日內作出最終決議並書面通知。\n\n### 第十條（住戶意見之彙整）\n\n管委會應每半年彙整住戶意見，於區權人會議或住戶說明會中報告，並說明已採納或無法採納之理由。\n\n\n---\n\n\n## 第四章 服務申請管理\n\n\n---\n\n### 第十一條（常見服務申請項目）\n\n住戶得向管理室申請之服務包含：\n\n一、門禁磁控卡補辦。\n\n二、Etag 條碼申辦或更換。\n\n三、搬遷預約（依 G01 辦理）。\n\n四、停車格資料異動登記。\n\n五、裝修施工申請（依 K01 辦理）。\n\n六、財務報告查閱申請。\n\n七、公布欄公告申請。\n\n### 第十二條（服務申請之標準作業時限）\n\n| 服務項目 | 辦理時限 |\n|---------|---------|\n| 磁控卡補辦 | 三個工作日內 |\n| Etag 條碼申辦 | 五個工作日內 |\n| 搬遷預約確認 | 二十四小時內回覆 |\n| 停車格資料登記 | 五個工作日內 |\n| 財務報告查閱 | 七個工作日內安排 |\n| 裝修施工申請 | 七個工作日內核准或退件 |\n\n### 第十三條（服務申請之記錄）\n\n一、所有服務申請應填具申請單，由總幹事留存記錄。\n\n二、記錄應包含：申請日期、戶別、申請事項、處理人員及完成日期。\n\n三、服務申請紀錄至少保存一年。\n\n\n---\n\n\n## 第五章 住戶說明會\n\n\n---\n\n### 第十四條（住戶說明會之召開）\n\n一、管委會每年至少召開一次住戶說明會（非正式區權人會議），向住戶報告社區現況、重大計畫及徵詢意見。\n\n二、住戶說明會應於召開前七日公告，並以通訊群組通知。\n\n三、住戶說明會之討論紀錄應公告於公布欄。\n\n### 第十五條（區權人會議與住戶說明會之區別）\n\n一、區權人會議具法定效力，依 A02 辦法召集，決議具拘束力。\n\n二、住戶說明會為非正式溝通場合，意見供管委會參考，不具決議效力。\n\n\n---\n\n\n## 第六章 違規處理\n\n\n---\n\n### 第十六條（妨礙溝通秩序之處理）\n\n住戶有下列行為，管委會得視情節依 B02 辦法處理：\n\n一、於管委會議或住戶說明會中以言語或行為騷擾、威脅他人。\n\n二、擅自撕除或破壞官方公告。\n\n三、以虛偽事實散布損害管委會或他人名譽之訊息。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第十七條（服務品質評估）\n\n管委會應每年評估溝通服務之品質，包含：申訴回覆時限達成率、住戶滿意度調查，並於住戶說明會中公告評估結果。\n\n### 第十八條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十九條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n", "和境心見社區-K01-裝修與施工管理辦法(草擬).md": "# 和境心見社區 — 裝修與施工管理辦法（草擬）\n\n**文件編號：** K01\n**制定日期：** 2026.04.26\n**版本：** v0.1（草擬）\n\n---\n\n## 第一章 總則\n\n### 第一條（目的）\n\n為維護本社區建築結構安全、保障鄰居居住品質，規範住戶室內裝修及施工作業之申請程序、施工時間及相關安全措施，依據《建築法》、《公寓大廈管理條例》及本社區住戶管理規約，制定本辦法。\n\n### 第二條（法律依據）\n\n本辦法依下列法規制定：\n\n一、《建築法》第 77-2 條（室內裝修）\n\n二、《公寓大廈管理條例》第 8 條、第 9 條\n\n三、《噪音管制法》\n\n四、本社區住戶管理規約（114 年正式版）\n\n### 第三條（適用範圍）\n\n本辦法適用於本社區全體住戶及其委任之施工廠商，凡在本社區專有部分或共用部分從事裝修、修繕或任何施工作業，均依本辦法辦理。\n\n### 第四條（名詞定義）\n\n一、**一般裝修**：不涉及建築結構及共用管道之室內裝修，如油漆、鋪設地板、更換門窗等。\n\n二、**重大裝修**：涉及樓板、牆面、給排水管道、電力配線之工程，須依法申請建築師審查。\n\n三、**維修工程**：非裝修性質之日常修繕（如修繕漏水、更換燈具、修理門鎖等），規模較小，程序簡化。\n\n\n---\n\n\n## 第二章 施工申請程序\n\n\n---\n\n### 第五條（施工申請義務）\n\n一、住戶進行任何裝修或施工作業，均須於開工前完成申請，不得未申報逕行施工。\n\n二、維修工程（如更換燈泡、修繕裂縫等小型工作）且預計施工時間不超過三小時者，得以口頭或電話通知管理室即可，毋需書面申請。\n\n三、施工期間超過一日或涉及噪音之工程，均須填具書面施工申請單。\n\n### 第六條（施工申請文件）\n\n書面施工申請單應包含下列資訊：\n\n一、住戶姓名、戶別及聯絡電話。\n\n二、施工內容說明（含工程性質、範圍及使用材料概述）。\n\n三、預計施工起訖日期及每日施工時間。\n\n四、施工廠商名稱、負責人及聯絡電話。\n\n五、施工廠商之營業登記證明影本（一般裝修以上規模須提供）。\n\n六、重大裝修須附建築師設計圖說及申請書（依《建築法》第 77-2 條規定）。\n\n### 第七條（施工申請之核准）\n\n一、書面施工申請單提交後，管委會（由總幹事或主委代為審查）應於七個工作日內核准或退件，逾期未回覆視為核准。\n\n二、退件應說明理由，申請人得於修正後重新申請。\n\n三、核准後，管委會得要求申請人繳交保證金（新臺幣三千元至一萬元，視施工規模訂定），以確保施工完成後公共設施之損壞賠償及廢棄物清理。\n\n\n---\n\n\n## 第三章 施工時間規定\n\n\n---\n\n### 第八條（施工時間限制）\n\n一、平日（週一至週五）施工時間：08:00 至 17:00。\n\n二、週六施工時間：09:00 至 16:00。\n\n三、下列時間**禁止**施工：\n\n（一）週日及國定假日（全日禁止）。\n\n（二）農曆除夕及春節（初一至初三）。\n\n（三）平日 12:00 至 13:00 午休時段（依管委會另訂公告為準）。\n\n四、下列特殊工程可申請延長至 18:00（需管委會個案核准）：\n\n（一）廠商安裝需一次性完成之設備。\n\n（二）緊急修繕危及住戶安全之工程。\n\n### 第九條（噪音管制）\n\n一、高噪音施工（電鑽、砂輪機、切割機等）應集中於 09:00 至 16:00 進行，且應盡量縮短連續噪音時間。\n\n二、週六之高噪音施工，應更為謹慎，如鄰居反映過大噪音干擾，應立即評估並調整工序。\n\n三、施工前應主動通知相鄰住戶（至少提前一日），告知施工日期及可能產生之噪音，以示尊重。\n\n\n---\n\n\n## 第四章 施工安全與管理\n\n\n---\n\n### 第十條（施工安全措施）\n\n施工廠商進場前，應確認下列安全措施已完備：\n\n一、施工區域已以圍欄或告示牌適當隔離，防止住戶或訪客誤入。\n\n二、電梯及公共走廊已鋪設保護墊，防止建材搬運過程中造成損壞。\n\n三、廠商人員均配戴工作識別證（管理室核發或廠商自行製作），進出須登記。\n\n四、電銲、切割等有明火作業，應備置滅火器於施工現場，並通知管理室。\n\n### 第十一條（廢棄物清理）\n\n一、施工廢棄物（廢料、包裝材料、廢棄建材等）應在每日施工結束前清除完畢，不得堆置於公共走廊或樓梯間。\n\n二、大量施工廢棄物應以施工用廢料袋或容器包裝，載運時不得污染公共設施。\n\n三、施工廢棄物應依法定管道處理，不得混入一般垃圾丟棄。\n\n四、廢棄物清理未完成，管委會得保留保證金，委請清潔人員代清，費用自保證金中扣除。\n\n### 第十二條（施工廠商之管理責任）\n\n一、施工廠商應遵守本辦法所有規定，住戶（所有權人）對廠商之違規行為連帶負責。\n\n二、廠商人員進出社區應通過管理室登記，未登記之人員管理室有權拒絕入場。\n\n三、廠商違規（如超時施工、廢棄物未清理等），由住戶負連帶責任，依 B02 辦法計罰。\n\n\n---\n\n\n## 第五章 共用部分施工之特別規定\n\n\n---\n\n### 第十三條（共用部分之施工限制）\n\n一、涉及共用牆面、地板（樓板）、屋頂、外牆、共用管道等共用部分之施工，須取得管委會書面同意，且不得違反建築安全要求。\n\n二、管委會得要求提供結構技師或建築師之評估報告，方才核准。\n\n三、嚴禁擅自更動消防設備、共用電氣管道及共用給排水系統；如確有必要，需依法申請並取得相關許可後，由合格技師施作。\n\n### 第十四條（外牆及窗戶）\n\n一、外牆之任何改動（含外推、添加外掛設施）均屬共用部分，嚴禁擅自施作，違者應自費恢復原狀，並依 B02 辦法計罰。\n\n二、窗戶（含玻璃及窗框）如涉及外觀改變，須取得管委會及全體共同壁住戶同意。\n\n\n---\n\n\n## 第六章 違規處理\n\n\n---\n\n### 第十五條（違規類型及裁罰基準）\n\n| 違規行為 | 首次 | 再次 | 備註 |\n|---------|------|------|------|\n| 未申報逕行施工 | 立即停工＋補辦申報 | **2,000 元** | — |\n| 超出核准時間施工 | **1,000 元／次** | **2,000 元／次** | 同時勒令停工 |\n| 施工廢棄物未清理（逾期） | 通知限 3 日清除 | **500 元／日**（逾期起算） | 代清費用另計 |\n| 損壞公共設施 | 要求賠償 | 報請主管機關 | C 級 |\n| 擅自更動共用部分 | 限期恢復原狀 | 提起法律訴訟 | C 級 |\n\n### 第十六條（強制停工）\n\n一、施工違反安全規定、超出核准時間或產生重大噪音擾鄰且拒不改善時，管委會得命令立即停工。\n\n二、施工廠商或住戶拒不停工者，管委會得向主管機關申請強制執行。\n\n\n---\n\n\n## 第七章 附則\n\n\n---\n\n### 第十七條（保證金之退還）\n\n施工完成，住戶確認公共設施無損壞、廢棄物已清理完畢，且無其他違規後，管委會應於七日內退還保證金。\n\n### 第十八條（施行日期）\n\n本辦法經管委會通過後公告施行，修正時亦同。\n\n### 第十九條（未盡事宜）\n\n本辦法未盡事宜，依本社區住戶管理規約、《建築法》、《公寓大廈管理條例》及相關法令規定辦理。\n\n---\n\n*（草擬版本，尚待管委會審議通過）*\n"};

let currentFilter = 'all';

/* ── helpers ── */
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function getSnippets(text, query, max = 3) {
  const lo = text.toLowerCase(), ql = query.toLowerCase();
  const snips = [];
  let pos = 0;
  while (snips.length < max) {
    const idx = lo.indexOf(ql, pos);
    if (idx === -1) break;
    const s = Math.max(0, idx - 40);
    const e = Math.min(text.length, idx + query.length + 60);
    let snip = (s > 0 ? '…' : '') + text.slice(s, e) + (e < text.length ? '…' : '');
    snip = snip.replace(new RegExp(escapeRe(query), 'gi'), m => `<mark>${m}</mark>`);
    snips.push(snip);
    pos = idx + query.length;
  }
  return snips;
}

function countMatches(text, query) {
  return (text.match(new RegExp(escapeRe(query), 'gi')) || []).length;
}

function fullTextSearch(query) {
  if (!query || query.length < 2) return [];
  const results = [];
  for (const doc of docs) {
    const content = mdContents[doc.file] || '';
    const titleHit = doc.name.toLowerCase().includes(query.toLowerCase());
    const bodyHit  = content.toLowerCase().includes(query.toLowerCase());
    if (titleHit || bodyHit) {
      results.push({
        doc,
        count: countMatches(content, query),
        snippets: bodyHit ? getSnippets(content, query) : []
      });
    }
  }
  results.sort((a, b) => b.count - a.count);
  return results;
}

/* ── render search panel ── */
function renderSearchResults(q) {
  const panel  = document.getElementById('searchResults');
  const header = document.getElementById('srHeader');
  const body   = document.getElementById('srBody');
  if (!q || q.length < 2) { panel.classList.remove('show'); return; }

  const results = fullTextSearch(q);
  panel.classList.add('show');
  if (!results.length) {
    header.textContent = '全文搜尋結果：無命中';
    body.innerHTML = `<div class="sr-none">找不到包含「${q}」的條文</div>`;
    return;
  }
  header.textContent = `全文搜尋「${q}」— 命中 ${results.length} 份文件`;
  body.innerHTML = results.map(({ doc, count, snippets }) => `
    <div class="sr-item" onclick="openDoc('${doc.file}','${doc.name}')">
      <div class="sr-doc-name">
        <span class="sr-code">${doc.num}</span>
        <span>${doc.name}</span>
        <span class="sr-count">共 ${count} 處</span>
      </div>
      ${snippets.map(s => `<div class="sr-snippet">${s}</div>`).join('')
        || '<div class="sr-snippet" style="color:#9ca3af">（命中標題）</div>'}
    </div>`).join('');
}

/* ── render table ── */
function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let data = currentFilter === 'all' ? docs : docs.filter(d => d.status === currentFilter);
  if (q.length >= 2)
    data = data.filter(d => d.name.toLowerCase().includes(q)
                         || d.category.toLowerCase().includes(q)
                         || d.num.toLowerCase().includes(q));
  return data;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const stats = document.getElementById('stats');
  if (!data.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    stats.textContent = '顯示 0 份文件';
    return;
  }
  empty.style.display = 'none';
  stats.textContent = `顯示 ${data.length} / ${docs.length} 份文件`;
  tbody.innerHTML = data.map(d => `
    <tr>
      <td class="num-cell">${d.num}</td>
      <td><span class="doc-link" onclick="openDoc('${d.file}','${d.name}')">${d.name}</span></td>
      <td><span class="category">${d.category}</span></td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td class="hide-mobile" style="color:#9ca3af;font-size:.84rem">${d.version}</td>
    </tr>`).join('');
}

function onSearch() {
  const q = (document.getElementById('searchInput').value || '').trim();
  renderTable(getFiltered());
  renderSearchResults(q);
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  onSearch();
}

/* ── viewer ── */
function openDoc(file, name) {
  if (location.protocol === 'file:') { window.open(file, '_blank'); return; }
  const overlay = document.getElementById('viewer-overlay');
  const content = document.getElementById('viewer-content');
  document.getElementById('viewer-title').textContent = name;
  content.innerHTML = '<div id="viewer-loading">載入中…</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  fetch(file)
    .then(r => { if (!r.ok) throw new Error('無法載入文件'); return r.text(); })
    .then(md => { content.innerHTML = marked.parse(md); content.scrollTop = 0; })
    .catch(e  => { content.innerHTML = `<p style="color:#dc2626">載入失敗：${e.message}</p>`; });
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('viewer-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

renderTable(docs);
</script>
