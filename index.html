<script>
const docs = [
  { num:"規約", name:"114年正式版住戶管理規約", file:"和境心見社區-規約-114年正式版住戶管理規約.md", category:"規約", status:"正式", version:"v1.0" },
  { num:"A01", name:"管理委員會組織與運作辦法",       file:"和境心見社區-A01-管理委員會組織與運作辦法(草擬).md",       category:"基礎治理", status:"草擬", version:"v0.1" },
  { num:"A02", name:"區分所有權人會議管理辦法",       file:"和境心見社區-A02-區分所有權人會議管理辦法(草擬).md",       category:"基礎治理", status:"草擬", version:"v0.1" },
  { num:"A03", name:"管理委員會交接與移交作業辦法",   file:"和境心見社區-A03-管理委員會交接與移交作業辦法(草擬).md",   category:"基礎治理", status:"草擬", version:"v0.1" },
  { num:"B01", name:"住戶規約與各項管理辦法適用準則", file:"和境心見社區-B01-住戶規約與各項管理辦法適用準則(草擬).md", category:"法務治理", status:"草擬", version:"v0.1" },
  { num:"B02", name:"違規管理與裁罰辦法",             file:"和境心見社區-B02-違規管理與裁罰辦法(草擬).md",             category:"法務治理", status:"罰則",  version:"v0.1" },

  { num:"D01", name:"資產與採購管理辦法",             file:"和境心見社區-D01-資產與採購管理辦法(草擬).md",             category:"資產採購", status:"草擬", version:"v0.1" },
  { num:"E01", name:"社區安全與防災管理辦法",         file:"和境心見社區-E01-社區安全與防災管理辦法(草擬).md",         category:"防災安全", status:"草擬", version:"v0.1" },
  { num:"F01", name:"公共設施使用管理辦法",           file:"和境心見社區-F01-公共設施使用管理辦法(草擬).md",           category:"設施使用", status:"草擬", version:"v0.1" },

  { num:"G02", name:"垃圾分類與資源回收管理辦法",     file:"和境心見社區-G02-垃圾分類與資源回收管理辦法(草擬).md",     category:"生活管理", status:"草擬", version:"v0.1" },
  { num:"H01", name:"車輛與門禁管理辦法",             file:"和境心見社區-H01-車輛與門禁管理辦法(草擬).md",             category:"車輛門禁", status:"草擬", version:"v0.1" },
  { num:"I01", name:"資訊與資料安全管理辦法",         file:"和境心見社區-I01-資訊與資料安全管理辦法(草擬).md",         category:"資訊資安", status:"草擬", version:"v0.1" },
  { num:"J01", name:"社區溝通與住戶服務管理辦法",     file:"和境心見社區-J01-社區溝通與住戶服務管理辦法(草擬).md",     category:"溝通服務", status:"草擬", version:"v0.1" },
  { num:"K01", name:"裝修與施工管理辦法",             file:"和境心見社區-K01-裝修與施工管理辦法(草擬).md",             category:"裝修施工", status:"草擬", version:"v0.1" },
];

/* ══ md 快取：頁面載入後背景 fetch 所有文件 ══ */
const mdCache = {};      // file -> 文字內容
let   cacheReady = false;
let   cachePromise = null;

function loadAllMd() {
  if (cachePromise) return cachePromise;
  cachePromise = Promise.all(
    docs.map(d =>
      fetch(d.file)
        .then(r => r.ok ? r.text() : '')
        .catch(() => '')
        .then(text => { mdCache[d.file] = text; })
    )
  ).then(() => { cacheReady = true; });
  return cachePromise;
}

/* ── helpers ── */
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function getSnippets(text, query, max = 3) {
  const lo = text.toLowerCase(), ql = query.toLowerCase();
  const snips = [];
  let pos = 0;
  while (snips.length < max) {
    const idx = lo.indexOf(ql, pos);
    if (idx === -1) break;
    const s = Math.max(0, idx - 40);
    const e = Math.min(text.length, idx + query.length + 60);
    let snip = (s > 0 ? '\u2026' : '') + text.slice(s, e) + (e < text.length ? '\u2026' : '');
    snip = snip.replace(new RegExp(escapeRe(query), 'gi'), m => `<mark>${m}</mark>`);
    snips.push(snip);
    pos = idx + query.length;
  }
  return snips;
}

function countMatches(text, query) {
  return (text.match(new RegExp(escapeRe(query), 'gi')) || []).length;
}

/* ── 全文搜尋（從快取查） ── */
function fullTextSearch(query) {
  if (!query || query.length < 2) return [];
  const results = [];
  for (const doc of docs) {
    const content = mdCache[doc.file] || '';
    const titleHit = doc.name.toLowerCase().includes(query.toLowerCase());
    const bodyHit  = content.toLowerCase().includes(query.toLowerCase());
    if (titleHit || bodyHit) {
      results.push({
        doc,
        count: countMatches(content, query),
        snippets: bodyHit ? getSnippets(content, query) : []
      });
    }
  }
  results.sort((a, b) => b.count - a.count);
  return results;
}

/* ── render search panel ── */
let currentFilter = 'all';
let searchDebounce = null;

function renderSearchResults(q) {
  const panel  = document.getElementById('searchResults');
  const header = document.getElementById('srHeader');
  const body   = document.getElementById('srBody');
  if (!q || q.length < 2) { panel.classList.remove('show'); return; }

  // 若快取還沒好，顯示載入中並等待
  if (!cacheReady) {
    panel.classList.add('show');
    header.textContent = '全文搜尋中…';
    body.innerHTML = '<div class="sr-none">正在載入所有文件，請稍候…</div>';
    loadAllMd().then(() => renderSearchResults(q));
    return;
  }

  const results = fullTextSearch(q);
  panel.classList.add('show');
  if (!results.length) {
    header.textContent = '全文搜尋結果：無命中';
    body.innerHTML = `<div class="sr-none">找不到包含「${q}」的條文</div>`;
    return;
  }
  header.textContent = `全文搜尋「${q}」— 命中 ${results.length} 份文件`;
  body.innerHTML = results.map(({ doc, count, snippets }) => `
    <div class="sr-item" onclick="openDoc('${doc.file}','${doc.name}')">
      <div class="sr-doc-name">
        <span class="sr-code">${doc.num}</span>
        <span>${doc.name}</span>
        <span class="sr-count">共 ${count} 處</span>
      </div>
      ${snippets.map(s => `<div class="sr-snippet">${s}</div>`).join('')
        || '<div class="sr-snippet" style="color:#9ca3af">（命中標題）</div>'}
    </div>`).join('');
}

/* ── render table ── */
function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let data = currentFilter === 'all' ? docs : docs.filter(d => d.status === currentFilter);
  if (q.length >= 2)
    data = data.filter(d => d.name.toLowerCase().includes(q)
                         || d.category.toLowerCase().includes(q)
                         || d.num.toLowerCase().includes(q));
  return data;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const stats = document.getElementById('stats');
  if (!data.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    stats.textContent = '顯示 0 份文件';
    return;
  }
  empty.style.display = 'none';
  stats.textContent = `顯示 ${data.length} / ${docs.length} 份文件`;
  tbody.innerHTML = data.map(d => `
    <tr>
      <td class="num-cell">${d.num}</td>
      <td><span class="doc-link" onclick="openDoc('${d.file}','${d.name}')">${d.name}</span></td>
      <td><span class="category">${d.category}</span></td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td class="hide-mobile" style="color:#9ca3af;font-size:.84rem">${d.version}</td>
    </tr>`).join('');
}

function onSearch() {
  const q = (document.getElementById('searchInput').value || '').trim();
  renderTable(getFiltered());
  renderSearchResults(q);
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  onSearch();
}

/* ── viewer ── */
function openDoc(file, name) {
  const overlay = document.getElementById('viewer-overlay');
  const content = document.getElementById('viewer-content');
  document.getElementById('viewer-title').textContent = name;
  content.innerHTML = '<div id="viewer-loading">載入中…</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // 優先從快取取，否則直接 fetch
  const cached = mdCache[file];
  if (cached !== undefined) {
    content.innerHTML = marked.parse(cached);
    content.scrollTop = 0;
  } else {
    fetch(file)
      .then(r => { if (!r.ok) throw new Error('無法載入文件'); return r.text(); })
      .then(md => {
        mdCache[file] = md;
        content.innerHTML = marked.parse(md);
        content.scrollTop = 0;
      })
      .catch(e => { content.innerHTML = `<p style="color:#dc2626">載入失敗：${e.message}</p>`; });
  }
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('viewer-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

/* ── 初始化 ── */
renderTable(docs);
loadAllMd(); // 背景靜默載入所有 md，為全文搜尋預熱
</script>
</body>
</html>
