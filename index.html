    main { padding: 1.8rem 2.5rem; }

    .stats {
      font-size: .85rem;
      color: #6b7280;
      margin-bottom: 1.2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);

    thead tr { background: #f0f4fb; }
    th {
      text-align: left;
      padding: .75rem 1rem;
      font-size: .8rem;
      font-weight: 600;
      color: #556;
      letter-spacing: .03em;
      text-transform: uppercase;
      border-bottom: 1px solid #e4e8f0;
    }
    td {
      padding: .85rem 1rem;
      border-bottom: 1px solid #f0f2f8;
      vertical-align: middle;
      font-size: .92rem;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }

    .num { width: 3rem; text-align: center; color: #9ca3af; font-size: .85rem; }

    .doc-link {
      color: #1a3a5c;
      text-decoration: none;
      font-weight: 500;
    }
    .doc-link:hover { color: #2d6a9f; text-decoration: underline; }

    .badge {

      padding: .2rem .6rem;
      border-radius: 12px;
      font-size: .78rem;
      font-weight: 600;
    }
    .badge-草案 { background: #fef3c7; color: #92400e; }
    .badge-草擬 { background: #e0f2fe; color: #0369a1; }
    .badge-正式 { background: #dcfce7; color: #166534; }

    .category {
      font-size: .8rem;
      color: #6b7280;
      background: #f3f4f6;
      padding: .15rem .5rem;
      border-radius: 4px;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: .95rem;
    }

    footer {

      padding: 1.5rem;
      font-size: .8rem;
      color: #9ca3af;
    }

let currentFilter = 'all';

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const stats = document.getElementById('stats');

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    stats.textContent = '顯示 0 份文件';
    return;
  }
  empty.style.display = 'none';
  stats.textContent = `顯示 ${data.length} / ${docs.length} 份文件`;

  tbody.innerHTML = data.map(d => `
    <tr data-status="${d.status}">
      <td class="num">${d.num}</td>
      <td><a class="doc-link" href="${d.file}">${d.name}</a></td>
      <td><span class="category">${d.category}</span></td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td style="color:#9ca3af;font-size:.85rem">${d.version}</td>
    </tr>
  `).join('');
}

function filterDocs() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let data = docs;
  if (currentFilter !== 'all') {
    data = data.filter(d => d.status === currentFilter);
  }
  if (q) {
    data = data.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.category.toLowerCase().includes(q)
    );
  }
  renderTable(data);
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterDocs();
}

// 初始渲染
renderTable(docs);
